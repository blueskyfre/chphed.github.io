<!DOCTYPE html>

<head>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }

    /* ── 스켈레톤 애니메이션 ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.5rem;
    }
    .skeleton-btn  { height: 32px; width: 80px; display: inline-block; margin: 4px; }
    .skeleton-card { height: 90px; width: 100%; margin-bottom: 10px; }
    .skeleton-text { height: 16px; width: 60%; margin-bottom: 8px; }

    /* ── 카드 전환 애니메이션 ── */
    .subject-card { transition: all 0.3s ease; }
    .subject-card.disabled {
      background: #f9fafb;
      opacity: 0.55;
    }
    .subject-card.disabled .card-body { pointer-events: none; }

    /* ── 선택 버튼 스타일 ── */
    .subj-btn {
      transition: all 0.15s ease;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      border-radius: 0.375rem;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
    }
    .subj-btn:hover { background: #eff6ff; border-color: #93c5fd; }
    .subj-btn.selected {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
      font-weight: 600;
    }

    /* ── 응시/미응시 토글 버튼 ── */
    .toggle-btn {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid transparent;
      font-weight: 500;
    }
    .toggle-btn.active-yes {
      background: #2563eb; color: #fff;
    }
    .toggle-btn.active-no {
      background: #6b7280; color: #fff;
    }
    .toggle-btn.inactive {
      background: #f3f4f6; color: #9ca3af;
      border-color: #e5e7eb;
    }
    .toggle-btn.inactive:hover {
      background: #e5e7eb; color: #6b7280;
    }

    /* ── 선택 요약 태그 ── */
    .summary-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      background: #eff6ff;
      color: #2563eb;
      font-weight: 500;
    }
    .subject-card.disabled .summary-tag {
      background: #f3f4f6;
      color: #9ca3af;
    }

    /* ── 수능응시여부 카드 강조 애니메이션 ── */
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(37,99,235,0); }
    }
    .highlight-card {
      animation: pulse-border 1.5s ease-in-out 3;
    }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 28px; border-radius: 12px; color: #fff; font-weight: 600;
      z-index: 9999; opacity: 0; transition: opacity 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast-success { background: #22c55e; }
    .toast-error   { background: #ef4444; }

    /* ── 모달 ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center; z-index: 9990;
    }

    /* ── 참고내용 textarea 래퍼 ── */
    .note-wrapper {
      position: relative;
    }
    .note-wrapper textarea {
      padding-bottom: 2.8rem;
    }

    /* ── 초기 모달 스타일 ── */
    .init-modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 10000;
    }
    .init-modal-card {
      background: white; border-radius: 1rem; padding: 2rem;
      max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .init-modal-title {
      font-size: 1.25rem; font-weight: 700; color: #1f2937; margin-bottom: 1rem;
    }
    .init-modal-desc {
      font-size: 0.875rem; color: #6b7280; margin-bottom: 1.5rem;
    }
    .init-modal-btn {
      padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600;
      transition: all 0.15s; cursor: pointer; border: none;
    }
    .init-modal-btn.yes {
      background: #2563eb; color: white; margin-right: 0.5rem;
    }
    .init-modal-btn.yes:hover { background: #1d4ed8; }
    .init-modal-btn.no {
      background: #f3f4f6; color: #6b7280;
    }
    .init-modal-btn.no:hover { background: #e5e7eb; }
  </style>
</head>

    var showInitModal = true;


    /* ══════════════════════════════════════════════════════════════
       📡 API 호출 공통 함수 (fetch 방식)
       ✅ 수정: google.script.run 대신 fetch + DEPLOY_URL 사용
       ══════════════════════════════════════════════════════════════ */
    async function _callGetAPI(action, params) {
      params = params || {};
      var url = new URL(DEPLOY_URL);
      url.searchParams.set('action', action);
      for (var key in params) {
        if (params.hasOwnProperty(key)) {
          url.searchParams.set(key, params[key]);
        }
      }
      var resp = await fetch(url.toString());
      if (!resp.ok) throw new Error('서버 응답 오류: ' + resp.status);
      return await resp.json();
    }

    async function _callPostAPI(action, payload) {
      payload = payload || {};
      payload.action = action;
      var resp = await fetch(DEPLOY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) throw new Error('서버 응답 오류: ' + resp.status);
      return await resp.json();
    }


    /* ── 초기화 ──────────────────────────── */
    function init() {
      // URL 파라미터에서 학생 정보 추출
      var params = new URLSearchParams(window.location.search);
      studentId = params.get('studentId') || '';
      userName  = params.get('name')      || '';

      // 네비게이션 바 사용자 정보 표시
      var navInfo = document.getElementById('nav-user-info');
      if (navInfo) navInfo.textContent = userName ? (userName + ' 학생') : '';

      // 서버에서 옵션 목록 + 기존 데이터 동시 로드
      _loadData();
    }

    /* ═══════════════════════════════  ═  ════════════════════════════
       📥 데이터 로드
       ✅ 수정: google.script.run → fetch (async/await) 방식으로 전면 교체
       ══════════════════════════════════════════════════════════════ */
    async function _loadData() {
      var studentData = null;

      try {
        // 3개 요청을 동시에 병렬 실행 (Promise.allSettled)
        var results = await Promise.allSettled([
          _callGetAPI('suselGetOptions'),
          _callGetAPI('suselGetStudentData', { studentId: studentId }),
          _callGetAPI('suselGetStudentClass', { studentId: studentId })
        ]);

        // 1) 옵션 목록
        if (results[0].status === 'fulfilled' && results[0].value.success) {
          optionsData = results[0].value.data || {};
        } else {
          console.error('옵션 로드 실패:', results[0].reason || results[0].value);
        }

        // 2) 기존 학생 데이터
        if (results[1].status === 'fulfilled' && results[1].value.success) {
          studentData = results[1].value.data;
        } else {
          console.error('학생 데이터 로드 실패:', results[1].reason || results[1].value);
        }

        // 3) 반 정보
        if (results[2].status === 'fulfilled' && results[2].value.success) {
          classNum = results[2].value.data || '';
        } else {
          console.error('반 정보 로드 실패:', results[2].reason || results[2].value);
        }

      } catch (e) {
        console.error('데이터 로드 중 오류:', e);
      }

      // 렌더링
      _renderAll(studentData);
    }

    /* ── 전체 렌더링 ─────────────────────── */
    function _renderAll(existingData) {
      // 수능응시여부 카드 (미응시/응시 토글 버튼)
      _renderSuneungYnButtons();

      // 과목 선택 카드들
      _renderOptionButtons('card-language', 'language', optionsData.language || []);
      _renderOptionButtons('card-math',     'math',     optionsData.math     || []);
      _renderOptionButtons('card-inquiry1', 'inquiry1', optionsData.inquiry1 || []);
      _renderOptionButtons('card-inquiry2', 'inquiry2', optionsData.inquiry2 || []);
      _renderOptionButtons('card-foreign',  'foreign',  optionsData.foreign  || []);

      // 기존 데이터 복원
      if (existingData) {
        if (existingData.classNum) classNum = existingData.classNum;

        // 수능응시여부 복원
        if (existingData.suneungYn) {
          selections.suneungYn = existingData.suneungYn;
          showInitModal = false; // 기존 데이터가 있으면 초기 모달 표시 안 함
          _highlightSuneungBtn(existingData.suneungYn);
          _updateSubjectSection();
        }

        // 각 영역 선택 상태 복원
        var areaKeys = ['language','math','english','inquiry1','inquiry2','foreign'];
        areaKeys.forEach(function (k) {
          if (existingData[k]) {
            // 기존 저장된 값이 '미응시'인 경우 처리
            if (existingData[k] === '미응시') {
              selections[k] = '미응시';
              areaExam[k] = false;
              _applyAreaToggle(k, false);
              _highlightSubjBtn(k, '');
              _updateSummaryTag(k, '미응시');
            } else {
              // 값이 있으면 응시로 처리
              selections[k] = existingData[k];
              areaExam[k] = true;
              _applyAreaToggle(k, true);
              _highlightSubjBtn(k, existingData[k]);
              _updateSummaryTag(k, existingData[k]);
            }
          }
        });

        // 참고내용 복원
        if (existingData.note) {
          document.getElementById('note-textarea').value = existingData.note;
        }
      }

      // 스켈레톤 숨기고 메인 표시
      document.getElementById('skeleton-ui').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');

      // 초기 모달 표시 (기존 데이터가 없거나 suneungYn이 없으면 표시)
      var initModal = document.getElementById('init-modal');
      if (!existingData || !existingData.suneungYn) {
        initModal.classList.remove('hidden');
      } else {
        initModal.classList.add('hidden');
      }

      // 전체 요약 갱신
      _updateGlobalSummary();
    }

    /* ── 수능응시여부 버튼 렌더링 ────────── */
    function _renderSuneungYnButtons() {
      var container = document.getElementById('card-suneungYn');
      if (!container) return;
      container.innerHTML = '';

      ['응시', '미응시'].forEach(function(label) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.id = 'suneung-btn-' + (label === '응시' ? 'yes' : 'no');
        btn.className = 'toggle-btn inactive';
        btn.style.fontSize = '0.8rem';
        btn.style.padding = '0.3rem 0.9rem';
        btn.addEventListener('click', function() {
          selections.suneungYn = label;
          _highlightSuneungBtn(label);
          _updateSubjectSection();
          _updateGlobalSummary();
        });
        container.appendChild(btn);
      });
    }

    function _highlightSuneungBtn(val) {
      var yesBtn = document.getElementById('suneung-btn-yes');
      var noBtn  = document.getElementById('suneung-btn-no');
      if (!yesBtn || !noBtn) return;
      if (val === '응시') {
        yesBtn.className = 'toggle-btn active-yes';
        yesBtn.style.fontSize = '0.8rem'; yesBtn.style.padding = '0.3rem 0.9rem';
        noBtn.className  = 'toggle-btn inactive';
        noBtn.style.fontSize = '0.8rem'; noBtn.style.padding = '0.3rem 0.9rem';
        var keys = ['language','math','english','inquiry1','inquiry2','foreign'];
        keys.forEach(function (k) {
          areaExam[k] = null;
          selections[k] = '';
          _highlightSubjBtn(k, '');
          _updateSummaryTag(k, '');
          var yBtn = document.getElementById('tog-' + k + '-yes');
          var nBtn = document.getElementById('tog-' + k + '-no');
          if (yBtn) yBtn.className = 'toggle-btn inactive';
          if (nBtn) nBtn.className = 'toggle-btn inactive';
          var wrap = document.getElementById('card-' + k + '-wrap');
          if (wrap) {
            wrap.classList.remove('disabled');
            var body = wrap.querySelector('.card-body');
            if (body) body.classList.remove('hidden');
          }
        });
        _updateGlobalSummary();
      } else if (val === '미응시') {
        yesBtn.className = 'toggle-btn inactive';
        yesBtn.style.fontSize = '0.8rem'; yesBtn.style.padding = '0.3rem 0.9rem';
        noBtn.className  = 'toggle-btn active-no';
        noBtn.style.fontSize = '0.8rem'; noBtn.style.padding = '0.3rem 0.9rem';
      } else {
        yesBtn.className = 'toggle-btn inactive';
        yesBtn.style.fontSize = '0.8rem'; yesBtn.style.padding = '0.3rem 0.9rem';
        noBtn.className  = 'toggle-btn inactive';
        noBtn.style.fontSize = '0.8rem'; noBtn.style.padding = '0.3rem 0.9rem';
      }
    }

    /* ── 과목 버튼 렌더링 ────────────────── */
    function _renderOptionButtons(containerId, key, items) {
      var container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';

      items.forEach(function (label) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.className = 'subj-btn';
        btn.dataset.key   = key;
        btn.dataset.value = label;
        btn.addEventListener('click', function () {
          _onSubjClick(key, label);
        });
        container.appendChild(btn);
      });
    }

    /* ── 초기 모달에서 수능응시여부 선택 ── */
    function setInitSuneung(val) {
      selections.suneungYn = val;
      _highlightSuneungBtn(val);
      _updateSubjectSection();
      _updateGlobalSummary();
      document.getElementById('init-modal').classList.add('hidden');
      showInitModal = false;
    }

    /* ── 영역별 응시/미응시 토글 (Public) ── */
    function toggleArea(key, isYes) {
      areaExam[key] = isYes;
      _applyAreaToggle(key, isYes);
      if (!isYes) {
        selections[key] = '미응시';
        _highlightSubjBtn(key, '');
        _updateSummaryTag(key, '미응시');
      }
      _updateGlobalSummary();
    }

    function _applyAreaToggle(key, isYes) {
      var wrapId = 'card-' + key + '-wrap';
      var wrap = document.getElementById(wrapId);
      var yesBtn = document.getElementById('tog-' + key + '-yes');
      var noBtn  = document.getElementById('tog-' + key + '-no');
      var bodyEl = wrap ? wrap.querySelector('.card-body') : null;

      if (isYes === true) {
        if (wrap) wrap.classList.remove('disabled');
        if (yesBtn) { yesBtn.className = 'toggle-btn active-yes'; }
        if (noBtn)  { noBtn.className  = 'toggle-btn inactive'; }
        if (bodyEl) bodyEl.classList.remove('hidden');
      } else if (isYes === false) {
        if (wrap) wrap.classList.add('disabled');
        if (yesBtn) { yesBtn.className = 'toggle-btn inactive'; }
        if (noBtn)  { noBtn.className  = 'toggle-btn active-no'; }
        if (bodyEl) bodyEl.classList.add('hidden');
      } else {
        if (wrap) wrap.classList.remove('disabled');
        if (yesBtn) { yesBtn.className = 'toggle-btn inactive'; }
        if (noBtn)  { noBtn.className  = 'toggle-btn inactive'; }
        if (bodyEl) bodyEl.classList.remove('hidden');
      }
    }

    /* ── 과목 버튼 클릭 ──────────────────── */
    function _onSubjClick(key, value) {
      if (areaExam[key] === false) return; // 미응시 상태면 무시
      if (selections[key] === value) {
        selections[key] = '';
        _highlightSubjBtn(key, '');
        _updateSummaryTag(key, '');
        if (areaExam[key] === true) {
          areaExam[key] = null;
          _applyAreaToggle(key, null);
        }
      } else {
        selections[key] = value;
        _highlightSubjBtn(key, value);
        _updateSummaryTag(key, value);
        if (areaExam[key] === null) {
          areaExam[key] = true;
          _applyAreaToggle(key, true);
        }
      }
      _updateGlobalSummary();
    }

    function _highlightSubjBtn(key, selectedValue) {
      var container = document.getElementById('card-' + key);
      if (!container) return;
      var btns = container.querySelectorAll('.subj-btn');
      btns.forEach(function (btn) {
        if (btn.dataset.value === selectedValue) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      });
    }

    /* ── 요약 태그 갱신 ──────────────────── */
    function _updateSummaryTag(key, value) {
      var el = document.getElementById('summary-' + key);
      if (!el) return;
      if (value) {
        el.textContent = value;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }

    /* ── 전체 요약 갱신 ──────────────────── */
    function _updateGlobalSummary() {
      var el = document.getElementById('global-summary');
      if (!el) return;
      var parts = [];
      var labels = { language:'국어', math:'수학', english:'영어', inquiry1:'탐구1', inquiry2:'탐구2', foreign:'제2외' };
      var keys = ['language','math','english','inquiry1','inquiry2','foreign'];
      keys.forEach(function(k) {
        if (areaExam[k] === true && selections[k]) {
          parts.push(labels[k] + ': ' + selections[k]);
        } else if (areaExam[k] === false) {
          parts.push(labels[k] + ': 미응시');
        }
      });
      el.textContent = parts.length > 0 ? parts.join('  |  ') : '과목을 선  해  세요';
    }

    /* ── 과목 섹션 활성/비활성 ────────────── */
    function _updateSubjectSection() {
      var section = document.getElementById('subject-section');
      if (!section) return;

      if (selections.suneungYn === '미응시') {
        section.style.opacity = '0.6';
        section.style.pointerEvents = '';
        var keys = ['language','math','english','inquiry1','inquiry2','foreign'];
        keys.forEach(function (k) {
          selections[k] = '미응시';
          areaExam[k] = false;
          _highlightSubjBtn(k, '');
          _updateSummaryTag(k, '미응시');
          var yBtn = document.getElementById('tog-' + k + '-yes');
          var nBtn = document.getElementById('tog-' + k + '-no');
          if (yBtn) yBtn.className = 'toggle-btn inactive';
          if (nBtn) nBtn.className = 'toggle-btn active-no';
          var wrap = document.getElementById('card-' + k + '-wrap');
          if (wrap) {
            wrap.classList.add('disabled');
            var body = wrap.querySelector('.card-body');
            if (body) body.classList.add('hidden');
          }
        });
        _updateGlobalSummary();
      } else if (selections.suneungYn === '응시') {
        section.style.opacity = '';
        section.style.pointerEvents = '';
        var keys = ['language','math','english','inquiry1','inquiry2','foreign'];
        keys.forEach(function (k) {
          var wrap = document.getElementById('card-' + k + '-wrap');
          if (wrap) {
            wrap.classList.remove('disabled');
            var body = wrap.querySelector('.card-body');
            if (body) body.classList.remove('hidden');
          }
        });
      } else {
        section.style.opacity = '0.4';
        section.style.pointerEvents = '';
      }
    }

    /* ══════════════════════════════════════════════════════════════
       💾 저장
       ✅ 수정: google.script.run → fetch POST 방식으로 교체
       ══════════════════════════════════════════════════════════════ */
    async function doSave() {
      // 유효성 검사
      if (!selections.suneungYn) {
        _showToast('수능 응시 여부를 선택해주세요.', 'error');
        return;
      }

      if (selections.suneungYn === '응시') {
        if (!selections.language) { _showToast('언어영역을 선택해주세요.', 'error'); return; }
        if (!selections.math)     { _showToast('수리영역을 선택해주세요.', 'error'); return; }
        if (areaExam.english  === null) { _showToast('영어 응시 여부를 선택해주세요.', 'error'); return; }
        if (areaExam.inquiry1 === null) { _showToast('탐구선택1 응시 여부를 선택해주세요.', 'error'); return; }
        if (areaExam.inquiry2 === null) { _showToast('탐구선택2 응시 여부를 선택해주세요.', 'error'); return; }
        if (areaExam.foreign  === null) { _showToast('제2외국어 응시 여부를 선택해주세요.', 'error'); return; }
        if (areaExam.inquiry1 === true  && !selections.inquiry1) { _showToast('탐구선택1 과목을 선택해주세요.', 'error'); return; }
        if (areaExam.inquiry2 === true  && !selections.inquiry2) { _showToast('탐구선택2 과목을 선택해주세요.', 'error'); return; }
        if (areaExam.foreign  === true  && !selections.foreign)  { _showToast('제2외국어를 선택해주세요.', 'error'); return; }
      }

      var payload = {
        classNum  : classNum,
        studentId : studentId,
        name      : userName,
        suneungYn : selections.suneungYn,
        language  : selections.suneungYn === '응시' ? selections.language  : '',
        math      : selections.suneungYn === '응시' ? selections.math      : '',
        english   : selections.suneungYn === '응시' ? (areaExam.english === true ? '응시' : (areaExam.english === false ? '미응시' : '')) : '',
        inquiry1  : selections.suneungYn === '응시' ? selections.inquiry1  : '',
        inquiry2  : selections.suneungYn === '응시' ? selections.inquiry2  : '',
        foreign   : selections.suneungYn === '응시' ? selections.foreign   : '',
        note      : selections.suneungYn === '응시' ? (document.getElementById('note-textarea').value || '') : ''
      };

      // 저장 버튼 비활성화 (중복 방지)
      var saveBtn = document.getElementById('save-btn');
      if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ 저장 중...'; }

      try {
        var result = await _callPostAPI('suselSaveSelections', payload);
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 저장하기'; }
        if (result && result.success) {
          _showToast('✅ ' + result.message, 'success');
        } else {
          _showToast('저장에 실패했습니다: ' + (result.message || ''), 'error');
        }
      } catch (e) {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 저장하기'; }
        _showToast('❌ 오류: ' + e.message, 'error');
      }
    }


    /* ══════════════════════════════════════════════════════════════
       🧭 네비게이션
       ✅ 수정: goHome()을 GitHub Pages URL로 이동하도록 변경
       ══════════════════════════════════════════════════════════════ */
    function navigateTo(page) {
      var params = new URLSearchParams({ studentId: studentId, name: userName });
      switch (page) {
        case 'schedule':
          window.location.href = GITHUB_URL + '/firstpage.html?' + params.toString();
          break;
        case 'suneung':
          // 현재 페이지 (새로고침)
          break;
        case 'university':
          window.location.href = GITHUB_URL + '/univer.html?' + params.toString();
          break;
        case 'record':
          window.location.href = GITHUB_URL + '/record.html?' + params.toString();
          break;
      }
    }

    function goHome() {
      var params = new URLSearchParams({ studentId: studentId, name: userName });
      // ✅ 수정: DEPLOY_URL → GITHUB_URL (GitHub Pages에서 호스팅되므로)
      window.location.href = GITHUB_URL + '/firstpage.html?' + params.toString();
    }

    function doLogout() {
      window.location.href = GITHUB_URL;
    }


    /* ── 모달 ────────────────────────────── */
    function showModal(msg) {
      document.getElementById('modal-message').textContent = msg;
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }

    /* ── 토스트 ──────────────────────────── */
    function _showToast(msg, type) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + (type === 'error' ? 'toast-error' : 'toast-success') + ' show';
      setTimeout(function () { toast.classList.remove('show'); }, 3000);
    }


    /* ── Public API ──────────────────────── */
    return {
      init        : init,
      doSave      : doSave,
      toggleArea  : toggleArea,
      setInitSuneung : setInitSuneung,
      navigateTo  : navigateTo,
      goHome      : goHome,
      doLogout    : doLogout,
      showModal   : showModal,
      closeModal  : closeModal
    };

  })();

  // ── 페이지 로드 시 초기화 ──
  document.addEventListener('DOMContentLoaded', SuselNS.init);
  </script>
