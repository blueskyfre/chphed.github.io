<!DOCTYPE html>

<head>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ── 스켈레톤 애니메이션 ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.5rem;
    }
    .skeleton-btn  { height: 40px; width: 100px; display: inline-block; margin: 4px; }
    .skeleton-card { height: 120px; width: 100%; margin-bottom: 16px; }
    .skeleton-text { height: 20px; width: 60%; margin-bottom: 8px; }

    /* ── 비활성 오버레이 ── */
    .disabled-overlay {
      opacity: 0.35;
      pointer-events: none;
      filter: grayscale(60%);
      transition: all 0.3s ease;
    }
    .enabled-section {
      opacity: 1;
      pointer-events: auto;
      filter: none;
      transition: all 0.3s ease;
    }

    /* ── 선택 버튼 스타일 ── */
    .opt-btn {
      transition: all 0.15s ease;
    }
    .opt-btn.selected {
      transform: scale(1.05);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.4);
    }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 28px; border-radius: 12px; color: #fff; font-weight: 600;
      z-index: 9999; opacity: 0; transition: opacity 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }
    .toast.show { opacity: 1; }
    .toast-success { background: #22c55e; }
    .toast-error   { background: #ef4444; }

    /* ── 모달 ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center; z-index: 9990;
    }
  </style>
</head>

  <!-- ============================================================ -->
  <!--  스크립트 (IIFE 네임스페이스: SuselNS) -->
  <!-- ============================================================ -->
  <script>
  var SuselNS = (function () {
    'use strict';

    /* ── 상수 & 상태 ────────────────────── */
    var DEPLOY_URL  = 'https://script.google.com/macros/s/AKfycbzJQQTEhSSGAilKc2KBk1n56jPOJE1H4Qbm72cN0vF8WoOCibp59WgPSHXo26Y_8NeZnw/exec';
    var GITHUB_URL  = 'https://blueskyfre.github.io/chphed.github.io';

    var studentId = '';
    var userName  = '';
    var classNum  = '';

    // 현재 선택 상태
    var selections = {
      suneungYn : '',
      language  : '',
      math      : '',
      english   : '',
      inquiry1  : '',
      inquiry2  : '',
      foreign   : ''
    };

    // 옵션 데이터
    var optionsData = {};

    // 카드 색상 매핑
    var cardColors = {
      suneungYn : { bg: 'bg-blue-100',    border: 'border-blue-300',   activeBg: 'bg-blue-600',   activeText: 'text-white', text: 'text-blue-700' },
      language  : { bg: 'bg-indigo-100',   border: 'border-indigo-300', activeBg: 'bg-indigo-600', activeText: 'text-white', text: 'text-indigo-700' },
      math      : { bg: 'bg-cyan-100',     border: 'border-cyan-300',   activeBg: 'bg-cyan-600',   activeText: 'text-white', text: 'text-cyan-700' },
      english   : { bg: 'bg-emerald-100',  border: 'border-emerald-300',activeBg: 'bg-emerald-600',activeText: 'text-white', text: 'text-emerald-700' },
      inquiry1  : { bg: 'bg-amber-100',    border: 'border-amber-300',  activeBg: 'bg-amber-600',  activeText: 'text-white', text: 'text-amber-700' },
      inquiry2  : { bg: 'bg-orange-100',   border: 'border-orange-300', activeBg: 'bg-orange-600', activeText: 'text-white', text: 'text-orange-700' },
      foreign   : { bg: 'bg-pink-100',     border: 'border-pink-300',   activeBg: 'bg-pink-600',   activeText: 'text-white', text: 'text-pink-700' }
    };


    /* ══════════════════════════════════════════════════════════════
       📡 API 호출 공통 함수 (fetch 방식)
       ✅ 수정: google.script.run 대신 fetch + DEPLOY_URL 사용
       ══════════════════════════════════════════════════════════════ */
    async function _callGetAPI(action, params) {
      params = params || {};
      var url = new URL(DEPLOY_URL);
      url.searchParams.set('action', action);
      for (var key in params) {
        if (params.hasOwnProperty(key)) {
          url.searchParams.set(key, params[key]);
        }
      }
      var resp = await fetch(url.toString());
      if (!resp.ok) throw new Error('서버 응답 오류: ' + resp.status);
      return await resp.json();
    }

    async function _callPostAPI(action, payload) {
      payload = payload || {};
      payload.action = action;
      var resp = await fetch(DEPLOY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) throw new Error('서버 응답 오류: ' + resp.status);
      return await resp.json();
    }


    /* ── 초기화 ──────────────────────────── */
    function init() {
      // URL 파라미터에서 학생 정보 추출
      var params = new URLSearchParams(window.location.search);
      studentId = params.get('studentId') || '';
      userName  = params.get('name')      || '';

      // 네비게이션 바 사용자 정보 표시
      var navInfo = document.getElementById('nav-user-info');
      if (navInfo) navInfo.textContent = userName ? (userName + ' 학생') : '';

      // 서버에서 옵션 목록 + 기존 데이터 동시 로드
      _loadData();
    }

    /* ══════════════════════════════════════════════════════════════
       📥 데이터 로드
       ✅ 수정: google.script.run → fetch (async/await) 방식으로 전면 교체
       ══════════════════════════════════════════════════════════════ */
    async function _loadData() {
      var studentData = null;

      try {
        // 3개 요청을 동시에 병렬 실행 (Promise.allSettled)
        var results = await Promise.allSettled([
          _callGetAPI('suselGetOptions'),
          _callGetAPI('suselGetStudentData', { studentId: studentId }),
          _callGetAPI('suselGetStudentClass', { studentId: studentId })
        ]);

        // 1) 옵션 목록
        if (results[0].status === 'fulfilled' && results[0].value.success) {
          optionsData = results[0].value.data || {};
        } else {
          console.error('옵션 로드 실패:', results[0].reason || results[0].value);
        }

        // 2) 기존 학생 데이터
        if (results[1].status === 'fulfilled' && results[1].value.success) {
          studentData = results[1].value.data;
        } else {
          console.error('학생 데이터 로드 실패:', results[1].reason || results[1].value);
        }

        // 3) 반 정보
        if (results[2].status === 'fulfilled' && results[2].value.success) {
          classNum = results[2].value.data || '';
        } else {
          console.error('반 정보 로드 실패:', results[2].reason || results[2].value);
        }

      } catch (e) {
        console.error('데이터 로드 중 오류:', e);
      }

      // 렌더링
      _renderAll(studentData);
    }

    /* ── 전체 렌더링 ─────────────────────── */
    function _renderAll(existingData) {
      // 수능응시여부 카드
      _renderOptionButtons('card-suneungYn', 'suneungYn', optionsData.suneungYn || []);

      // 과목 선택 카드들
      _renderOptionButtons('card-language', 'language', optionsData.language || []);
      _renderOptionButtons('card-math',     'math',     optionsData.math     || []);
      _renderOptionButtons('card-english',  'english',  optionsData.english  || []);
      _renderOptionButtons('card-inquiry1', 'inquiry1', optionsData.inquiry1 || []);
      _renderOptionButtons('card-inquiry2', 'inquiry2', optionsData.inquiry2 || []);
      _renderOptionButtons('card-foreign',  'foreign',  optionsData.foreign  || []);

      // 기존 데이터 복원
      if (existingData) {
        if (existingData.classNum) classNum = existingData.classNum;

        // 각 선택 상태 복원
        var keys = ['suneungYn','language','math','english','inquiry1','inquiry2','foreign'];
        keys.forEach(function (k) {
          if (existingData[k]) {
            selections[k] = existingData[k];
            _highlightButton(k, existingData[k]);
          }
        });

        // 참고내용 복원
        if (existingData.note) {
          document.getElementById('note-textarea').value = existingData.note;
        }

        // 응시 여부에 따른 섹션 활성/비활성
        _updateSubjectSection();
      }

      // 스켈레톤 숨기고 메인 표시
      document.getElementById('skeleton-ui').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
    }

    /* ── 옵션 버튼 렌더링 ────────────────── */
    function _renderOptionButtons(containerId, key, items) {
      var container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';

      var colors = cardColors[key] || cardColors.suneungYn;

      items.forEach(function (label) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.className = 'opt-btn px-5 py-2.5 rounded-lg font-semibold text-sm border-2 cursor-pointer '
                       + colors.bg + ' ' + colors.border + ' ' + colors.text
                       + ' hover:shadow-md';
        btn.dataset.key   = key;
        btn.dataset.value = label;
        btn.addEventListener('click', function () {
          _onOptionClick(key, label);
        });
        container.appendChild(btn);
      });
    }

    /* ── 옵션 클릭 핸들러 ────────────────── */
    function _onOptionClick(key, value) {
      // 토글: 같은 값 다시 클릭 시 해제
      if (selections[key] === value) {
        selections[key] = '';
        _highlightButton(key, '');
      } else {
        selections[key] = value;
        _highlightButton(key, value);
      }

      // 수능응시여부 변경 시 섹션 토글
      if (key === 'suneungYn') {
        _updateSubjectSection();
      }
    }

    /* ── 버튼 하이라이트 ─────────────────── */
    function _highlightButton(key, selectedValue) {
      var containerId = 'card-' + key;
      var container   = document.getElementById(containerId);
      if (!container) return;

      var colors = cardColors[key] || cardColors.suneungYn;
      var btns   = container.querySelectorAll('.opt-btn');

      btns.forEach(function (btn) {
        if (btn.dataset.value === selectedValue) {
          // 선택 상태
          btn.className = 'opt-btn selected px-5 py-2.5 rounded-lg font-semibold text-sm border-2 cursor-pointer '
                        + colors.activeBg + ' ' + colors.activeText + ' border-transparent shadow-lg';
        } else {
          // 미선택
          btn.className = 'opt-btn px-5 py-2.5 rounded-lg font-semibold text-sm border-2 cursor-pointer '
                        + colors.bg + ' ' + colors.border + ' ' + colors.text
                        + ' hover:shadow-md';
        }
      });
    }

    /* ── 과목 섹션 활성/비활성 ────────────── */
    function _updateSubjectSection() {
      var section = document.getElementById('subject-section');
      var saveBtn = document.getElementById('save-btn');
      if (!section) return;

      if (selections.suneungYn === '미응시') {
        section.classList.add('disabled-overlay');
        section.classList.remove('enabled-section');
        // 미응시 시 모든 과목 선택 초기화
        var keys = ['language','math','english','inquiry1','inquiry2','foreign'];
        keys.forEach(function (k) {
          selections[k] = '';
          _highlightButton(k, '');
        });
        document.getElementById('note-textarea').value = '';
      } else if (selections.suneungYn === '응시') {
        section.classList.remove('disabled-overlay');
        section.classList.add('enabled-section');
      } else {
        // 아직 미선택
        section.classList.add('disabled-overlay');
        section.classList.remove('enabled-section');
      }
    }

    /* ══════════════════════════════════════════════════════════════
       💾 저장
       ✅ 수정: google.script.run → fetch POST 방식으로 교체
       ══════════════════════════════════════════════════════════════ */
    async function doSave() {
      // 유효성 검사
      if (!selections.suneungYn) {
        _showToast('수능 응시 여부를 선택해주세요.', 'error');
        return;
      }

      if (selections.suneungYn === '응시') {
        if (!selections.language) { _showToast('언어영역을 선택해주세요.', 'error'); return; }
        if (!selections.math)     { _showToast('수리영역을 선택해주세요.', 'error'); return; }
        if (!selections.english)  { _showToast('영어를 선택해주세요.', 'error'); return; }
        if (!selections.inquiry1) { _showToast('탐구1 과목을 선택해주세요.', 'error'); return; }
        if (!selections.inquiry2) { _showToast('탐구2 과목을 선택해주세요.', 'error'); return; }
        if (!selections.foreign)  { _showToast('제2외국어를 선택해주세요.', 'error'); return; }
      }

      var payload = {
        classNum  : classNum,
        studentId : studentId,
        name      : userName,
        suneungYn : selections.suneungYn,
        language  : selections.suneungYn === '응시' ? selections.language  : '',
        math      : selections.suneungYn === '응시' ? selections.math      : '',
        english   : selections.suneungYn === '응시' ? selections.english   : '',
        inquiry1  : selections.suneungYn === '응시' ? selections.inquiry1  : '',
        inquiry2  : selections.suneungYn === '응시' ? selections.inquiry2  : '',
        foreign   : selections.suneungYn === '응시' ? selections.foreign   : '',
        note      : selections.suneungYn === '응시' ? (document.getElementById('note-textarea').value || '') : ''
      };

      // 저장 버튼 비활성화 (중복 방지)
      var saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '⏳ 저장 중...';

      try {
        var result = await _callPostAPI('suselSaveSelections', payload);
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 저장하기';
        if (result && result.success) {
          _showToast('✅ ' + result.message, 'success');
        } else {
          _showToast('저장에 실패했습니다: ' + (result.message || ''), 'error');
        }
      } catch (e) {
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 저장하기';
        _showToast('❌ 오류: ' + e.message, 'error');
      }
    }


    /* ══════════════════════════════════════════════════════════════
       🧭 네비게이션
       ✅ 수정: goHome()을 GitHub Pages URL로 이동하도록 변경
       ══════════════════════════════════════════════════════════════ */
    function navigateTo(page) {
      var params = new URLSearchParams({ studentId: studentId, name: userName });
      switch (page) {
        case 'suneung':
          // 현재 페이지 (새로고침)
          break;
        case 'university':
          showModal('응시희망대학 페이지는 준비 중입니다.');
          break;
        case 'record':
          showModal('생기부 기초자료 작성 페이지는 준비 중입니다.');
          break;
      }
    }

    function goHome() {
      var params = new URLSearchParams({ studentId: studentId, name: userName });
      // ✅ 수정: DEPLOY_URL → GITHUB_URL (GitHub Pages에서 호스팅되므로)
      window.location.href = GITHUB_URL + '/firstpage.html?' + params.toString();
    }

    function doLogout() {
      window.location.href = GITHUB_URL;
    }


    /* ── 모달 ────────────────────────────── */
    function showModal(msg) {
      document.getElementById('modal-message').textContent = msg;
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }

    /* ── 토스트 ──────────────────────────── */
    function _showToast(msg, type) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + (type === 'error' ? 'toast-error' : 'toast-success') + ' show';
      setTimeout(function () { toast.classList.remove('show'); }, 3000);
    }


    /* ── Public API ──────────────────────── */
    return {
      init        : init,
      doSave      : doSave,
      navigateTo  : navigateTo,
      goHome      : goHome,
      doLogout    : doLogout,
      showModal   : showModal,
      closeModal  : closeModal
    };

  })();

  // ── 페이지 로드 시 초기화 ──
  document.addEventListener('DOMContentLoaded', SuselNS.init);
  </script>

</body>
</html>
