<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── 글로벌 폰트 / 색감 ── */
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #0f172a;
      background: #f5f7fb;
      letter-spacing: -0.01em;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes skeleton-shimmer {      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 0.5rem;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* ── 사이드바 학생/영역 항목 ── */
    .student-item {
      border-radius: 10px;
      margin: 2px 8px;
      padding: 10px 12px;
      border: 1px solid transparent;
      transition: all 0.15s ease;
    }
    .student-item:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }
    .student-item.active {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border-color: #4338ca;
      box-shadow: 0 4px 12px -2px rgba(79, 70, 229, 0.35);
    }
    .student-item.active span { color: #fff !important; }
    .student-item.active .text-gray-400 { color: #c7d2fe !important; }

    .area-btn {
      border-radius: 10px;
      margin: 4px 8px;
      padding: 12px 14px !important;
      border: 1px solid #e2e8f0 !important;
      transition: all 0.15s ease;
    }
    .area-btn:hover {
      background: #eef2ff !important;
      border-color: #c7d2fe !important;
    }
    .area-btn.active {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%) !important;
      color: #fff !important;
      border-color: #4338ca !important;
      box-shadow: 0 4px 12px -2px rgba(79, 70, 229, 0.35);
    }

    /* ── 헤더 공통 ── */
    .site-header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
    }
    .site-header-inner {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 28px;
    }

    /* ── 인사 영역 ── */
    .header-greeting {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .header-auth {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #64748b;
      font-weight: 500;
    }

    /* ── 메뉴 탭 버튼 ── */
    .menu-btn {
      position: relative;
      padding: 0 10px;
      height: 60px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #475569;
      background: transparent;
      border: none;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .menu-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 8px;
      right: 8px;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #4f46e5);
      border-radius: 3px 3px 0 0;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.25s ease;
    }
    .menu-btn:hover { color: #4f46e5; }
    .menu-btn:hover::after { transform: scaleX(1); }
    .menu-btn.active {
      color: #4f46e5;
      font-weight: 700;
    }
    .menu-btn.active::after { transform: scaleX(1); }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 60px;
    }

    /* ── 액션 버튼 ── */
    .header-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 0.83rem;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.18s ease;
      border: 1px solid transparent;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .btn-download {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
      border-color: #059669;
      box-shadow: 0 2px 6px -1px rgba(16, 185, 129, 0.3);
    }
    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px -2px rgba(16, 185, 129, 0.4);
    }
    .btn-logout {
      background: #fff;
      color: #64748b;
      border-color: #e2e8f0;
    }
    .btn-logout:hover {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca;
    }
    .header-divider {
      width: 1px;
      height: 22px;
      background: #e2e8f0;
      margin: 0 4px;
    }

    /* ── 드롭다운 select ── */
    #class-dropdown {
      font-size: 0.82rem;
      font-weight: 600;
      color: #1e293b;
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      transition: all 0.18s;
    }
    #class-dropdown:hover { background: #e2e8f0; }
    #class-dropdown:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    /* ── 사이드바 ── */
    .app-sidebar {
      background: #ffffff;
      border-right: 1px solid #e2e8f0;
    }
    .sidebar-header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      border-bottom: 1px solid #e2e8f0;
    }
    .sidebar-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #4f46e5;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── 데이터 테이블 (수능선택 등) ── */
    .modern-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.875rem;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05), 0 1px 2px rgba(15, 23, 42, 0.03);
    }
    .modern-table thead tr {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
    }
    .modern-table thead th {
      color: #fff;
      font-weight: 600;
      padding: 12px 14px;
      text-align: center;
      font-size: 0.82rem;
      letter-spacing: -0.01em;
      border: none;
      white-space: nowrap;
    }
    .modern-table tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid #f1f5f9;
      text-align: center;
      color: #334155;
      white-space: nowrap;
    }
    .modern-table tbody tr:nth-child(even) { background: #fafbff; }
    .modern-table tbody tr:hover { background: #fef9c3; }
    .modern-table tbody tr:last-child td { border-bottom: none; }

    /* ── 관심대학 카드 ── */
    .univ-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .univ-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #10b981, #059669);
    }
    .univ-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -6px rgba(15, 23, 42, 0.12);
      border-color: #c7d2fe;
    }
    .univ-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #e2e8f0;
    }
    .univ-rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #fff;
      font-weight: 800;
      font-size: 0.95rem;
      box-shadow: 0 2px 6px -1px rgba(245, 158, 11, 0.4);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .univ-rank-badge:hover { transform: scale(1.05); }
    .univ-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
    }
    .univ-dept {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 2px;
    }
    .univ-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .tag-type { background: #eef2ff; color: #4338ca; }
    .tag-kind { background: #ecfdf5; color: #047857; }
    .tag-suneung { background: #fef3c7; color: #92400e; }
    .tag-judge { background: #fce7f3; color: #be185d; }
    .univ-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px 16px;
      margin-top: 6px;
    }
    .univ-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 0.82rem;
    }
    .univ-field-label {
      color: #94a3b8;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .univ-field-value {
      color: #1e293b;
      font-weight: 500;
      word-break: keep-all;
    }
    .univ-section-divider {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding-top: 8px;
      border-top: 1px dashed #e2e8f0;
      font-size: 0.72rem;
      font-weight: 700;
      color: #6366f1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .univ-memo {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      border-radius: 6px;
      font-size: 0.82rem;
      color: #78350f;
      white-space: pre-wrap;
    }

    /* ── 학생 정보 카드 (관심대학 상단) ── */
    .student-info-banner {
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      border: 1px solid #93c5fd;
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 18px;
      box-shadow: 0 1px 3px rgba(79, 70, 229, 0.08);
    }
    .student-info-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: #1e3a8a;
      letter-spacing: -0.02em;
    }
    .student-info-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .info-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #93c5fd;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #1d4ed8;
    }
    .info-pill-label {
      color: #2563eb;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .info-pill-value { color: #1e3a8a; }

    /* ── "전체 보기" 사이드바 항목 ── */
    .student-item-all {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      border: 1px solid #bae6fd !important;
      font-weight: 700;
      color: #075985;
    }
    .student-item-all.active {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%) !important;
      border-color: #0369a1 !important;
      box-shadow: 0 4px 12px -2px rgba(14, 165, 233, 0.35);
    }
    .student-item-all.active span { color: #fff !important; }

    /* ── 복사 버튼 (생기부) ── */
    .gibu-copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      border-radius: 7px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 6px -1px rgba(37,99,235,0.35);
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .gibu-copy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px -2px rgba(37,99,235,0.45);
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }
    /* ── 저장 버튼 (생기부 편집창) ── */
    .gibu-save-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      border-radius: 7px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 6px -1px rgba(16,185,129,0.35);
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .gibu-save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px -2px rgba(16,185,129,0.45);
    }
    .gibu-save-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── 생기부 개인별: 영역 구분 헤더 ── */
    .gibu-area-header {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      border-radius: 10px 10px 0 0;
      padding: 10px 16px;
      margin-bottom: 0;
    }
    .gibu-area-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .gibu-area-bytes {
      font-size: 0.75rem;
      font-weight: 600;
      color: #bfdbfe;
      margin-left: 2px;
    }
    .gibu-area-block {
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px -2px rgba(15,23,42,0.1);
      border: 1px solid #bfdbfe;
    }
    .gibu-area-body {
      background: #f0f7ff;
      padding: 12px;
    }

    /* ── 생기부 영역별: 학생 카드 구분 ── */
    .gibu-student-block {
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px -2px rgba(15,23,42,0.1);
      border: 1px solid #bfdbfe;
    }
    .gibu-student-header {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
      padding: 10px 16px;
    }
    .gibu-student-id {
      font-size: 0.82rem;
      font-weight: 700;
      color: #bfdbfe;
      font-family: monospace;
    }
    .gibu-student-name {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
    }
    .gibu-student-class {
      font-size: 0.78rem;
      font-weight: 600;
      color: #93c5fd;
    }
    .gibu-student-bytes {
      font-size: 0.75rem;
      color: #bfdbfe;
      margin-left: auto;
    }
    .gibu-student-body {
      background: #f0f7ff;
      padding: 12px;
    }

    /* ── 생기부 페이지 상단 배너 ── */
    .gibu-page-banner {
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      border: 1px solid #93c5fd;
      border-radius: 14px;
      padding: 16px 22px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .gibu-page-banner-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 1.1rem;
      box-shadow: 0 4px 10px -2px rgba(37,99,235,0.4);
      flex-shrink: 0;
    }
    .gibu-page-banner-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: #1e3a8a;
      letter-spacing: -0.02em;
    }
    .gibu-page-banner-sub {
      font-size: 0.82rem;
      color: #1d4ed8;
      font-weight: 600;
      margin-top: 2px;
    }

    /* ── 생기부 카드 헤더 버튼 행 ── */
    .gibu-card-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
    }
    .gibu-card-toolbar .gibu-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #1e40af;
      white-space: nowrap;
    }
    .gibu-card-toolbar .gibu-bytes-info {
      font-size: 0.74rem;
      color: #6b7280;
      white-space: nowrap;
    }
    .gibu-card-toolbar .gibu-spacer {
      flex: 1;
      display: inline-block;
      min-width: 60px;
      font-size: 0.74rem;
      color: #16a34a;
      font-weight: 600;
      text-align: right;
      white-space: nowrap;
    }
    /* ── 미리보기 (2줄) / 전체보기 토글 ── */
    .gibu-preview-box {
      position: relative;
      cursor: pointer;
    }
    .gibu-preview-text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .gibu-preview-text.expanded {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .gibu-ellipsis-hint {
      position: absolute;
      bottom: 0;
      right: 0;
      background: linear-gradient(to right, transparent, #f9fafb 40%);
      padding-left: 16px;
      font-size: 0.82rem;
      color: #94a3b8;
      pointer-events: none;
    }
    .gibu-preview-text.expanded + .gibu-ellipsis-hint { display: none; }
    .gibu-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 6px;
      border: 1px solid #c7d2fe;
      background: #eef2ff;
      color: #4338ca;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      margin-left: auto;
      flex-shrink: 0;
    }
    .gibu-toggle-btn:hover { background: #e0e7ff; border-color: #818cf8; }
    /* ── 생기부 작성 버튼 ── */
    .gibu-write-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      border-radius: 7px;
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 6px -1px rgba(109,40,217,0.35);
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .gibu-write-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px -2px rgba(109,40,217,0.45);
    }
    /* ── 생기부 작성 모달 ── */
    #gibu-write-modal {
      z-index: 200;
    }
    .gibu-modal-pane {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    .gibu-modal-pane-header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .gibu-modal-pane-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;

      font-weight: 600;

      background: #fff;

<body class="bg-gray-50 min-h-screen">
 
<script>
// ============================================================
// Admin 네임스페이스 (IIFE)
// ============================================================
var Admin = (function() {
 
  // ─── 설정 ────────────────────────────────────────────────────
  var _WEB_APP_URL = Config.DEPLOY;

// ─── 글자수 제한 표현 변수 ───────────────────────────────────────────────
  var _BYTE_LIMIT = {
  '자율활동':   1500,
  '동아리활동': 1500,
  '진로활동':   2100,
  '개인별세특': 1500,
  '행동발달':   1500
};

 
  // ─── 상태 변수 ───────────────────────────────────────────────
  var _state = {
    adminId:      '',
    adminName:    '',
    adminAuth:    '',
    adminClass:   '',
    allClasses:   [],
    currentClass: '',
    currentMenu:  '',
    currentArea:  '',
    currentStudentId: '',
    studentList:  [],
    suneungData:  null,  // 수능선택 원본 데이터 캐시 (개별/전체 전환용)
    hasUnsavedEdit: false // 미저장 편집 여부
  };

  // ─── 미저장 경고 (페이지 이탈 / 탭 닫기 / 새로고침) ──────────
  window.addEventListener('beforeunload', function(e) {
    if (_state.hasUnsavedEdit) {
      e.preventDefault();
      e.returnValue = '';
    }
  });
 
  // ─── API 호출 (GET) ──────────────────────────────────────────
  async function _apiGet(action, params) {
    params = params || {};
    var url = new URL(_WEB_APP_URL);
    url.searchParams.set('action', action);
    for (var key in params) {
      if (params.hasOwnProperty(key)) url.searchParams.set(key, params[key]);
    }
    var res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error('서버 응답 오류: ' + res.status);
    return await res.json();
  }
 
  // ─── 초기화 ──────────────────────────────────────────────────
  function _init() {
    var raw = sessionStorage.getItem('adminInfo');
    if (!raw) {
      alert('로그인 정보가 없습니다. 로그인 페이지로 이동합니다.');
      location.href = 'index.html';
      return;
    }
    var info = JSON.parse(raw);
    _state.adminId    = info.adminId    || '';
    _state.adminName  = info.adminName  || '';
    _state.adminAuth  = info.adminAuth  || '';
    _state.adminClass = info.adminClass || '';
    _state.allClasses = info.allClasses || [];
    _state.currentClass = (_state.adminAuth === '관리자') ? '전체' : _state.adminClass;
 
    _renderHeader();
    _loadStudentList();
  }
 
  // ─── 헤더 렌더링 ─────────────────────────────────────────────
  function _renderHeader() {
    document.getElementById('admin-greeting').textContent =
      _state.adminName + ' 선생님 접속했습니다.';
 
    if (_state.adminAuth === '관리자') {
      document.getElementById('auth-label').textContent = '권한 : ';
      var wrapper = document.getElementById('class-select-wrapper');
      wrapper.innerHTML = '';
      var select = document.createElement('select');
      select.id = 'class-dropdown';
      var optAll = document.createElement('option');
      optAll.value = '전체'; optAll.textContent = '전체';
      select.appendChild(optAll);
      _state.allClasses.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c; opt.textContent = c + '반';
        select.appendChild(opt);
      });
      select.value = _state.currentClass;
      select.addEventListener('change', function() {
        _state.currentClass = this.value;
        _loadStudentList();
        _refreshContent();
      });
      wrapper.appendChild(select);
    } else {
      document.getElementById('auth-label').textContent = '권한 : ';
      document.getElementById('class-select-wrapper').innerHTML =
        '<span style="font-size:0.78rem;font-weight:600;color:#475569;">' + _state.adminClass + '반</span>';
    }
  }
 
  // ─── 학생 명단 로드 ──────────────────────────────────────────
  async function _loadStudentList() {
    _showSidebarSkeleton();
    try {
      var res = await _apiGet('adminGetStudentList', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass
      });
      if (res.success) {
        _state.studentList = res.data;
        if (_state.currentMenu === 'gibu_area') {
          _renderAreaButtons();
        } else {
          _renderStudentList(res.data);
        }
      } else {
        document.getElementById('student-list').innerHTML =
          '<p class="text-red-400 text-xs p-3">' + res.message + '</p>';
      }
    } catch (err) {
      document.getElementById('student-list').innerHTML =
        '<p class="text-red-400 text-xs p-3">오류: ' + err.message + '</p>';
    }
  }
 
  function _showSidebarSkeleton() {
    var html = '';
    for (var i = 0; i < 8; i++) {
      html += '<div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">'
            + '<div class="skeleton-box w-10 h-3"></div>'
            + '<div class="skeleton-box flex-1 h-3"></div>'
            + '</div>';
    }
    document.getElementById('student-list').innerHTML = html;
  }
 
  function _renderStudentList(students) {
    var ul = document.getElementById('student-list');
    if (!students || students.length === 0) {
      ul.innerHTML = '<p class="text-gray-400 text-sm p-3 text-center">학생 명단을 불러오는 중입니다.</p>';
      return;
    }
    ul.innerHTML = '';

    // ── 수능선택 메뉴일 때 최상단에 "전체 학생" 항목 노출 ──
    if (_state.currentMenu === 'suneung') {
      var liAll = document.createElement('div');
      liAll.className = 'student-item student-item-all flex items-center gap-2 cursor-pointer';
      liAll.dataset.id = '__ALL__';
      liAll.innerHTML =
        '<span class="flex items-center justify-center w-7 h-7 rounded-lg bg-sky-100 text-sky-600 shrink-0">'
        + '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-5.13a4 4 0 11-8 0 4 4 0 018 0zm6 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>'
        + '</span>'
        + '<span class="text-sm font-bold truncate">전체 학생</span>';
      liAll.addEventListener('click', function() {
        document.querySelectorAll('.student-item').forEach(function(el) { el.classList.remove('active'); });
        liAll.classList.add('active');
        _state.currentStudentId = '';
        _renderSuneung(_state.suneungData, null);
      });
      ul.appendChild(liAll);
      // 기본은 "전체 학생" 활성 상태
      if (!_state.currentStudentId) liAll.classList.add('active');
    }

    students.forEach(function(s) {
      var li = document.createElement('div');
      li.className = 'student-item flex items-center gap-2 cursor-pointer';
      li.dataset.id = s.studentId;
      li.innerHTML =
        '<span class="text-xs text-gray-400 w-12 shrink-0 font-mono">' + s.studentId + '</span>' +
        '<span class="text-sm font-semibold text-gray-800 truncate">' + s.name + '</span>';
      li.addEventListener('click', function() {
        document.querySelectorAll('.student-item').forEach(function(el) { el.classList.remove('active'); });
        li.classList.add('active');
        _state.currentStudentId = s.studentId;
        if (_state.currentMenu === 'gibu_personal') {
          _renderGibuPersonalForStudent(s.studentId);
        } else if (_state.currentMenu === 'univ') {
          _renderUnivForStudent(s);
        } else if (_state.currentMenu === 'suneung') {
          _renderSuneung(_state.suneungData, s.studentId);
        }
      });
      ul.appendChild(li);
    });
  }
 
  // ─── 메뉴 클릭 ───────────────────────────────────────────────
  function _onMenuClick(menu) {
    if (_state.hasUnsavedEdit) {
      _showUnsavedModal('페이지를 이동하면 저장하지 않은 편집 내용이 사라집니다.', function() {
        _state.hasUnsavedEdit = false;
        _doMenuClick(menu);
      });
      return;
    }
    _doMenuClick(menu);
  }

  function _doMenuClick(menu) {
    _state.currentMenu = menu;
    _state.currentStudentId = '';
 
    document.querySelectorAll('.menu-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('btn-' + menu).classList.add('active');
 
    document.getElementById('sidebar-title').textContent =
      menu === 'gibu_area' ? '생기부 영역' : '학생 명단';
 
    if (menu === 'gibu_area') {
      _renderAreaButtons();
      _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-100"><svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 shadow-sm">좌측에 있는 생기부 영역을 클릭하여 데이터를 조회하세요.</p></div>');
    } else if (menu === 'gibu_personal') {
      _renderStudentList(_state.studentList);
      _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-100"><svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 shadow-sm">좌측에서 학생을 선택하세요.</p></div>');
    } else if (menu === 'suneung') {
      _state.currentStudentId = '';
      _renderStudentList(_state.studentList);
      _loadSuneung();
    } else if (menu === 'univ') {
      _renderStudentList(_state.studentList);
      _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-emerald-100"><svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-xl px-5 py-3 shadow-sm">좌측에서 학생을 선택하세요.</p></div>');
    }
  }
 
  function _refreshContent() {
    if (!_state.currentMenu) return;
    if (_state.currentMenu === 'suneung')           { _state.currentStudentId = ''; _loadSuneung(); }
    else if (_state.currentMenu === 'univ')         { _state.currentStudentId = ''; _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-emerald-100"><svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-xl px-5 py-3 shadow-sm">좌측에서 학생을 선택하세요.</p></div>'); }
    else if (_state.currentMenu === 'gibu_personal') _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-100"><svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 shadow-sm">좌측에서 학생을 선택하세요.</p></div>');
    else if (_state.currentMenu === 'gibu_area')    { _renderAreaButtons(); _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-100"><svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 shadow-sm">좌측에 있는 생기부 영역을 클릭하여 데이터를 조회하세요.</p></div>'); }
  }
 
  // ─── 콘텐츠 영역 유틸 ────────────────────────────────────────
  function _showContentSkeleton(rows) {
    var html = '<div class="p-4 space-y-3">';
    for (var i = 0; i < (rows || 6); i++) {
      html += '<div class="skeleton-box h-4 ' + (i % 2 === 0 ? 'w-full' : 'w-3/4') + '"></div>';
    }
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
  }
 
  function _clearContent(msg) {
    document.getElementById('content-area').innerHTML =
      msg || '<div class="flex flex-col items-center justify-center h-64 text-gray-400">'
           + '<p class="text-sm">상단 메뉴를 클릭하여 데이터를 조회하세요.</p></div>';
  }
 
  function _showError(msg) {
    document.getElementById('content-area').innerHTML =
      '<div class="p-6 text-center">'
      + '<div class="text-4xl mb-3">⚠️</div>'
      + '<p class="text-red-600 font-medium">' + (msg || '오류가 발생했습니다.') + '</p>'
      + '</div>';
  }
 
  // ─── 수능선택 ─────────────────────────────────────────────────
  async function _loadSuneung() {
    _showContentSkeleton(10);
    try {
      var res = await _apiGet('adminGetSuneungData', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass
      });
      if (res.success) {
        _state.suneungData = res.data;
        _renderSuneung(res.data, _state.currentStudentId || null);
      } else {
        _showError(res.message);
      }
    } catch (err) { _showError(err.message); }
  }

  function _renderSuneung(data, filterStudentId) {
    if (!data || !data.rows || data.rows.length === 0) {
      _clearContent('<p class="text-gray-400 text-center mt-20">데이터가 없습니다.</p>');
      return;
    }

    var rowsToShow = data.rows;
    var bannerHtml = '';
    if (filterStudentId) {
      rowsToShow = data.rows.filter(function(r){
        return String(r.studentId) === String(filterStudentId);
      });
      if (rowsToShow.length === 0) {
        _clearContent('<p class="text-gray-400 text-center mt-20">선택한 학생의 데이터가 없습니다.</p>');
        return;
      }
      var s = rowsToShow[0];
      bannerHtml =
        '<div class="student-info-banner" style="background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);border-color:#93c5fd;">'
        + '<div class="flex items-center gap-3">'
        + '<div>'
        + '<div style="display:flex;align-items:baseline;gap:10px;">'
        + '<div style="font-size:1rem;font-weight:700;color:#1d4ed8;">' + s.studentId + '</div>'
        + '<div class="student-info-name" style="color:#1e3a8a;">' + s.name + ' 학생</div>'
        + '</div>'
        + '<div style="font-size:0.82rem;color:#1e40af;font-weight:600;">' + s.studentClass + '반</div>'
        + '</div></div></div>';
    } else {
      bannerHtml =
        '<div class="student-info-banner" style="background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);border-color:#93c5fd;">'
        + '<div class="flex items-center gap-3">'
        + '<div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#0284c7);display:flex;align-items:center;justify-content:center;color:#fff;">'
        + '<svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-5.13a4 4 0 11-8 0 4 4 0 018 0zm6 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>'
        + '</div>'
        + '<div>'
        + '<div class="student-info-name" style="color:#0c4a6e;">전체 학생 수능선택</div>'
        + '<div style="font-size:0.82rem;color:#075985;font-weight:600;">총 ' + rowsToShow.length + '명</div>'
        + '</div></div></div>';
    }

    var html = '<div class="p-5">' + bannerHtml
             + '<div class="overflow-x-auto rounded-xl" style="box-shadow:0 1px 3px rgba(15,23,42,0.05);"><table class="modern-table">'
             + '<thead><tr>'
             + '<th>반</th>'
             + '<th>학번</th>'
             + '<th>이름</th>';
    data.headers.forEach(function(h) {
      html += '<th>' + h + '</th>';
    });
    html += '</tr></thead><tbody>';
    rowsToShow.forEach(function(row) {
      html += '<tr>'
            + '<td>' + row.studentClass + '</td>'
            + '<td>' + row.studentId + '</td>'
            + '<td style="font-weight:600;color:#1e293b;">' + row.name + '</td>';
      row.values.forEach(function(v) {
        html += '<td>' + (v || '-') + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
    document.getElementById('content-area').innerHTML = html;
  }
 
  // ─── 관심대학 (학생 개별 조회) ───────────────────────────────
  async function _renderUnivForStudent(student) {
    _showContentSkeleton(10);
    try {
      var res = await _apiGet('adminGetUnivByStudent', {
        adminId:   _state.adminId,
        studentId: student.studentId
      });
      if (!res.success) { _showError(res.message); return; }

      var data = res.data;
      var rows = data.rows || [];

      // ── 지원가능전형: 모든 row에 동일하게 들어있는 값을 한 번만 추출 ──
      // (10개 중복 데이터에서 유일값을 뽑기 위해 Set 사용)
      var availSet = {};
      var availList = [];
      rows.forEach(function(r) {
        var v = (r['지원가능전형'] !== undefined && r['지원가능전형'] !== null) ? String(r['지원가능전형']).trim() : '';
        if (v && !availSet[v]) { availSet[v] = true; availList.push(v); }
      });
      var availTypeText = availList.length > 0 ? availList.join(', ') : '-';

      // ── 선호전형: row의 '선호전형' 컬럼 우선, 없으면 data.prefType ──
      var prefSet = {};
      var prefList = [];
      rows.forEach(function(r) {
        var v = (r['선호전형'] !== undefined && r['선호전형'] !== null) ? String(r['선호전형']).trim() : '';
        if (v && !prefSet[v]) { prefSet[v] = true; prefList.push(v); }
      });
      var prefTypeText = prefList.length > 0 ? prefList.join(', ') : (data.prefType || '-');

      // ── 상단 학생 정보 배너 (지원가능전형 → 선호전형 순서) ──
      var html = '<div class="p-5">'
               + '<div class="student-info-banner">'
               + '<div class="flex items-center gap-3">'
               + '<div style="flex:1;">'
               + '<div style="display:flex;align-items:baseline;gap:10px;">'
               + '<div style="font-size:1rem;font-weight:700;color:#1d4ed8;">' + student.studentId + '</div>'
               + '<div class="student-info-name">' + student.name + ' 학생</div>'
               + '</div>'
               + '<div style="font-size:0.82rem;color:#1d4ed8;font-weight:600;margin-top:2px;"></div>'
               + '</div>'
               + '<div style="font-size:0.78rem;color:#1d4ed8;font-weight:700;background:#fff;padding:6px 12px;border-radius:999px;border:1px solid #93c5fd;">'

  // ─── 관심대학 순위 편집 ────────────────────────────────────
  function _editUnivRank(cell) {
    var currentVal = cell.dataset.current || '';
    var input = document.createElement('input');
    input.type = 'text';
    input.value = currentVal;
    input.className = 'w-12 text-center border border-emerald-400 rounded px-1 py-0.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400';
    input.style.width = '50px';

    function _commit() {
      var newVal = input.value.trim();
      if (newVal === currentVal) { cell.textContent = currentVal ? currentVal + '순위' : '-'; return; }
      var studentId = cell.dataset.studentid;
      var rowIndex  = cell.dataset.rowindex;
      cell.textContent = '저장 중...';
      _apiGet('adminSaveUnivRank', {
        adminId:   _state.adminId,
        studentId: studentId,
        rowIndex:  rowIndex,
        newRank:   newVal
      }).then(function(res) {
        if (res.success) {
          cell.textContent = newVal ? newVal + '순위' : '-';
          cell.dataset.current = newVal;
        } else {
          alert('저장 실패: ' + res.message);
          cell.textContent = currentVal ? currentVal + '순위' : '-';
        }
      }).catch(function(err) {
        alert('오류: ' + err.message);
        cell.textContent = currentVal ? currentVal + '순위' : '-';
      });
    }

    input.addEventListener('blur', _commit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { input.removeEventListener('blur', _commit); cell.textContent = currentVal ? currentVal + '순위' : '-'; }
    });

    cell.textContent = '';
    cell.appendChild(input);
    input.focus();
    input.select();
  }
 
  // ─── 생기부 편집/복사 헬퍼 ───────────────────────────────────────
  function _calcBytes(str) {
    if (!str) return 0;
    try { return new TextEncoder().encode(String(str)).length; }
    catch (e) {
      var s = String(str), b = 0;
      for (var i = 0; i < s.length; i++) {
        var c = s.charCodeAt(i);
        b += c < 0x80 ? 1 : (c < 0x800 ? 2 : 3);
      }
      return b;
    }
  }

  function _escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function _gibuFallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  function _copyGibuContent(areaKey) {
    var srcEl = document.getElementById('gibu-original-' + areaKey);
    if (!srcEl) return;
    var text = srcEl.getAttribute('data-raw') || '';
    var fb = document.getElementById('copy-feedback-' + areaKey);
    function _showFeedback() {
      if (!fb) return;
      fb.textContent = '복사 완료';
      clearTimeout(fb._hideTimer);
      fb._hideTimer = setTimeout(function() { fb.textContent = ''; }, 2000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(_showFeedback, function() {
        _gibuFallbackCopy(text); _showFeedback();
      });
    } else {
      _gibuFallbackCopy(text); _showFeedback();
    }
  }

  function _copyGibuEdit(areaKey) {
    // 카드 화면의 편집 복사 (미리보기 div 에서 텍스트)
    // 모달이 열려있으면 모달 textarea 우선
    var modalTa = document.getElementById('gibu-modal-textarea');
    var fb = document.getElementById('copy-feedback-edit-' + areaKey);
    var text = '';
    if (modalTa && !document.getElementById('gibu-write-modal').classList.contains('hidden')) {
      text = modalTa.value;
    } else {
      // 카드 편집창 미리보기 div 에서 data-editor 텍스트 읽기
      // areaKey 로 편집 미리보기를 직접 찾기
      var previewDivs = document.querySelectorAll('.gibu-preview-text[data-iseditor="1"]');
      // find the one near gibu-edit-bytes-{areaKey}
      var bytesEl = document.getElementById('gibu-edit-bytes-' + areaKey);
      if (bytesEl) {
        var card = bytesEl.closest('.bg-white');
        if (card) {
          var pDiv = card.querySelector('.gibu-preview-text[data-iseditor="1"]');
          if (pDiv) text = pDiv.getAttribute('data-raw-edit') || pDiv.textContent;
        }
      }
    }
    function _showFeedback() {
      if (!fb) return;
      fb.textContent = '복사 완료';
      clearTimeout(fb._hideTimer);
      fb._hideTimer = setTimeout(function() { fb.textContent = ''; }, 2000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(_showFeedback, function() { _gibuFallbackCopy(text); _showFeedback(); });
    } else { _gibuFallbackCopy(text); _showFeedback(); }
  }

  function _updateEditBytes(areaKey, limit) {
    var ta = document.getElementById('gibu-edit-' + areaKey);

    if (!ta || !label) return;

  function _toggleGibuPreview(btn) {

    if (!box) return;
    _doToggleBox(box, btn);

  function _toggleGibuPreviewBox(box) {
    // box 는 .gibu-preview-box
    var toolbar = box.closest('.bg-white') ? box.closest('.bg-white').querySelector('.gibu-card-toolbar') : null;
    var btn = toolbar ? toolbar.querySelector('.gibu-toggle-btn') : null;
    _doToggleBox(box, btn);
  }

  function _doToggleBox(box, btn) {
    var pDiv = box.querySelector('.gibu-preview-text');
    var hint = box.querySelector('.gibu-ellipsis-hint');
    if (!pDiv) return;
    var expanded = pDiv.classList.contains('expanded');
    if (expanded) {
      pDiv.classList.remove('expanded');
      if (hint) hint.style.display = '';
      if (btn) { btn.dataset.expanded = '0'; btn.querySelector('span').textContent = '펼치기'; }
    } else {
      pDiv.classList.add('expanded');
      if (hint) hint.style.display = 'none';
      if (btn) { btn.dataset.expanded = '1'; btn.querySelector('span').textContent = '접기'; }
    }
  }

  // ─── 생기부 작성 모달 ─────────────────────────────────────────
  var _gibuModalState = {
    areaKey: '', studentId: '', area: '', limit: 0,
    originalText: '', savedText: '', scrollY: 0,
    isSaving: false
  };

  function _openGibuWriteModal(areaKey, studentId, area, limit) {
    _gibuModalState.areaKey    = areaKey;
    _gibuModalState.studentId  = studentId;
    _gibuModalState.area       = area;
    _gibuModalState.limit      = limit;
    _gibuModalState.scrollY    = document.querySelector('main.flex-1') ? document.querySelector('main.flex-1').scrollTop : window.scrollY;

    // 원본 텍스트 (학생 작성 내용)
    var originalEl = document.getElementById('gibu-original-' + areaKey);
    var originalText = originalEl ? (originalEl.getAttribute('data-raw') || '') : '';
    var originalBytes = originalEl ? (originalEl.closest('.bg-white') ? (function(){
      var byteSpan = originalEl.closest('.bg-white').querySelector('.gibu-bytes-info');
      return byteSpan ? byteSpan.textContent : '';
    })() : '') : '';

    // 편집 내용 (카드 편집창 미리보기에서 읽기)
    var editedText = '';
    var bytesEl = document.getElementById('gibu-edit-bytes-' + areaKey);
    if (bytesEl) {
      var editCard = bytesEl.closest('.bg-white');
      if (editCard) {
        var pDiv = editCard.querySelector('.gibu-preview-text[data-iseditor="1"]');
        if (pDiv) editedText = pDiv.getAttribute('data-raw-edit') || pDiv.innerText || '';
        // clean up any placeholder text
        if (editedText === '편집 내용 없음') editedText = '';
      }
    }
    // Also try hidden textarea if exists
    var hiddenTa = document.getElementById('gibu-edit-' + areaKey);
    if (hiddenTa) editedText = hiddenTa.value || editedText;

    _gibuModalState.originalText = originalText;
    _gibuModalState.savedText    = editedText;

    // Populate modal
    var modal = document.getElementById('gibu-write-modal');
    var leftLabel = document.getElementById('gibu-modal-left-label');
    var leftBytes = document.getElementById('gibu-modal-left-bytes');
    var leftContent = document.getElementById('gibu-modal-left-content');
    var rightLabel = document.getElementById('gibu-modal-right-label');
    var rightBytes = document.getElementById('gibu-modal-right-bytes');
    var ta = document.getElementById('gibu-modal-textarea');

    if (leftLabel)   leftLabel.textContent = area + ' — 학생 작성 내용';
    if (leftBytes)   leftBytes.textContent = originalBytes;
    if (leftContent) leftContent.textContent = originalText || '학생이 제출한 내용이 없음';

    if (rightLabel)  rightLabel.textContent = area + ' — 내용 편집';
    if (ta) {
      ta.value = editedText;
      _updateModalBytes();
    }

    modal.classList.remove('hidden');
    if (ta) ta.focus();
  }

  function _updateModalBytes() {
    var ta = document.getElementById('gibu-modal-textarea');

  async function _saveGibuModal() {
    if (_gibuModalState.isSaving) return;
    var ta = document.getElementById('gibu-modal-textarea');
    var saveBtn = document.getElementById('gibu-modal-save-btn');
    if (!ta) return;
    var text = ta.value || '';
    var bytes = _calcBytes(text);
    var limit = _gibuModalState.limit;
    if (bytes > limit) {
      if (!confirm('글자수(' + bytes + '바이트)가 제한(' + limit + '바이트)을 초과했습니다. 그래도 저장하시겠습니까?')) return;
    }
    _gibuModalState.isSaving = true;
    if (saveBtn) {
      saveBtn.disabled = true;
      saveBtn.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="animation:spin 0.7s linear infinite;flex-shrink:0;">'
        + '<circle cx="12" cy="12" r="9" stroke-width="3" stroke-opacity="0.25"/>'
        + '<path d="M12 3a9 9 0 019 9" stroke-width="3" stroke-linecap="round"/>'
        + '</svg>'
        + '저장 중...';
    }
    try {
      var res = await _apiGet('adminSaveTeacherGibu', {
        adminId:       _state.adminId,
        adminAuth:     _state.adminAuth,
        adminClass:    _state.adminClass,
        studentId:     _gibuModalState.studentId,
        area:          _gibuModalState.area,
        editedContent: text,
        editedBytes:   bytes
      });
      if (res && res.success) {
        _gibuModalState.savedText = text;
        _state.hasUnsavedEdit = false;
        // Update card preview
        var areaKey = _gibuModalState.areaKey;
        var bytesEl = document.getElementById('gibu-edit-bytes-' + areaKey);
        if (bytesEl) {
          bytesEl.textContent = '(' + bytes + '바이트 / ' + limit + '바이트)';
          bytesEl.style.color = bytes > limit ? '#dc2626' : '#6b7280';
          var editCard = bytesEl.closest('.bg-white');
          if (editCard) {
            var pDiv = editCard.querySelector('.gibu-preview-text[data-iseditor="1"]');
            if (pDiv) {
              pDiv.setAttribute('data-raw-edit', text);
              pDiv.textContent = text || '편집 내용 없음';
            }
            var hint = editCard.querySelector('.gibu-ellipsis-hint');
            if (hint) hint.style.display = '';
            if (pDiv) pDiv.classList.remove('expanded');
          }
        }
        _showSaveSuccess('변경 내용이 정상적으로 저장되었습니다.');
        _doCloseGibuModal();
      } else {
        alert('저장 실패: ' + (res && res.message ? res.message : '알 수 없는 오류'));
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.innerHTML =
            '<svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>저장';
        }
      }
    } catch (err) {
      alert('오류: ' + err.message);
      if (saveBtn) {
        saveBtn.disabled = false;
        saveBtn.innerHTML =
          '<svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>저장';
      }
    } finally {
      _gibuModalState.isSaving = false;
    }
  }

    if (_gibuModalState.isSaving) return;
    var ta = document.getElementById('gibu-modal-textarea');
    var isDirty = ta && (ta.value !== _gibuModalState.savedText);

  // ─── 저장 성공 모달 ─────────────────────────────────────────
  var _saveSuccessTimer = null;
  function _showSaveSuccess(msg) {
    var modal = document.getElementById('save-success-modal');
    var card  = document.getElementById('save-success-card');
    var msgEl = document.getElementById('save-success-msg');
    if (!modal || !card) return;
    if (msgEl && msg) msgEl.textContent = msg;
    modal.classList.remove('hidden');
    // 진입 애니메이션
    requestAnimationFrame(function() {
      card.classList.remove('scale-95', 'opacity-0');
      card.classList.add('scale-100', 'opacity-100');
    });
    // 1.4초 후 자동 닫힘
    if (_saveSuccessTimer) clearTimeout(_saveSuccessTimer);
    _saveSuccessTimer = setTimeout(_closeSaveSuccess, 1400);
  }

  function _closeSaveSuccess() {
    var modal = document.getElementById('save-success-modal');
    var card  = document.getElementById('save-success-card');
    if (!modal || !card) return;
    if (_saveSuccessTimer) { clearTimeout(_saveSuccessTimer); _saveSuccessTimer = null; }
    card.classList.remove('scale-100', 'opacity-100');
    card.classList.add('scale-95', 'opacity-0');
    setTimeout(function() { modal.classList.add('hidden'); }, 180);
  }

  function _confirmDownload() {
    var filename = (document.getElementById('download-filename').value.trim() || '생기부_데이터') + '.xlsx';
    var wb = XLSX.utils.book_new();
    var contentArea = document.getElementById('content-area');
    var table = contentArea.querySelector('table');

    if (table) {
      // ── 테이블 형태 (수능선택, 관심대학) ──
      var ws = XLSX.utils.table_to_sheet(table);
      // 열 너비 자동 조정
      var range = XLSX.utils.decode_range(ws['!ref']);
      var colWidths = [];
      for (var C = range.s.c; C <= range.e.c; C++) {
        var maxLen = 8;
        for (var R = range.s.r; R <= range.e.r; R++) {
          var cell = ws[XLSX.utils.encode_cell({r: R, c: C})];
          if (cell && cell.v) {
            var len = String(cell.v).length;
            if (len > maxLen) maxLen = len;
          }
        }
        colWidths.push({ wch: Math.min(maxLen + 2, 40) });
      }
      ws['!cols'] = colWidths;
      XLSX.utils.book_append_sheet(wb, ws, '데이터');

    } else {
      // ── 카드 형태 (관심대학 / 생기부 개인별 / 영역별) ──
      var rows = [];
      var menu = _state.currentMenu;

      if (menu === 'univ') {
        // 관심대학 카드: 모든 필드를 컬럼으로 추출
        var univHeaders = ['순위','대학명','전형유형','전형종류','지원학과','모집정원','수능최저','선발유형','면접유무','면접지역','면접시작일','면접종료일','실기유무','실기지역','실기시작일','실기종료일','지원성향판단','비고'];
        rows.push(univHeaders);
        var cards = contentArea.querySelectorAll('.univ-card');
        cards.forEach(function(card) {
          var rankRaw = (card.querySelector('.univ-rank-badge') || {}).textContent || '';
          var rank = rankRaw.replace('순위','').trim();
          var nameSpans = card.querySelectorAll('.univ-name');
          var name = nameSpans[0] ? nameSpans[0].textContent.trim() : '';
          var dept = nameSpans[1] ? nameSpans[1].textContent.trim() : '';
          // 태그에서 전형유형/종류/수능최저/지원성향판단 추출
          var tagType = (card.querySelector('.tag-type') || {}).textContent || '';
          var tagKind = (card.querySelector('.tag-kind') || {}).textContent || '';
          var tagSuneung = ((card.querySelector('.tag-suneung') || {}).textContent || '').replace('수능최저:','').trim();
          var tagJudge = (card.querySelector('.tag-judge') || {}).textContent || '';
          // 필드값들을 라벨로 매핑
          var fieldMap = {};
          card.querySelectorAll('.univ-field').forEach(function(f) {
            var lbl = (f.querySelector('.univ-field-label') || {}).textContent || '';
            var val = (f.querySelector('.univ-field-value') || {}).textContent || '';
            fieldMap[lbl.trim()] = val.trim();
          });
          var memoEl = card.querySelector('.univ-memo');
          var memo = memoEl ? memoEl.textContent.replace(/^💬\s*/, '').trim() : '';
          rows.push([
            rank.trim(), name.trim(), tagType.trim(), tagKind.trim(), dept.trim(),
            fieldMap['모집정원'] || '', tagSuneung, fieldMap['선발유형'] || '',
            fieldMap['면접유무'] || '', fieldMap['면접지역'] || '', fieldMap['면접시작일'] || '', fieldMap['면접종료일'] || '',
            fieldMap['실기유무'] || '', fieldMap['실기지역'] || '', fieldMap['실기시작일'] || '', fieldMap['실기종료일'] || '',
            tagJudge.trim(), memo
          ]);
        });
      } else if (menu === 'gibu_area') {
        // 영역별: 반 / 학번 / 이름 / 작성내용 / 글자수(바이트/제한) / 편집내용 / 편집글자수(바이트/제한)
        rows.push(['반', '학번', '이름', '작성내용', '글자수(바이트/제한)', '편집내용', '편집글자수(바이트/제한)']);
        var cards = contentArea.querySelectorAll('.mb-4.bg-white.border.border-gray-200.rounded-lg');
        cards.forEach(function(card) {
          var header = card.querySelector('.bg-gray-50');
          var spans  = header ? header.querySelectorAll('span') : [];
          var cls    = spans[0] ? spans[0].textContent.replace('반','').trim() : '';
          var sid    = spans[1] ? spans[1].textContent.trim() : '';
          var name   = spans[2] ? spans[2].textContent.trim() : '';
          var bytesTxt = spans[3] ? spans[3].textContent.replace(/[()]/g,'').trim() : '';
          // 원본 작성 내용: data-raw 속성 우선 사용
          var originalDiv = card.querySelector('[id^="gibu-original-"]');
          var content = '';
          if (originalDiv) {
            content = originalDiv.getAttribute('data-raw') || originalDiv.innerText.trim();
            if (content === '내용 없음') content = '';
          }
          // 편집 내용: textarea 값 읽기
          var editTextarea = card.querySelector('textarea[id^="gibu-edit-"]');
          var editedContent = editTextarea ? editTextarea.value : '';
          // 편집 바이트 정보
          var editBytesSpan = card.querySelector('[id^="gibu-edit-bytes-"]');
          var editBytesTxt = editBytesSpan ? editBytesSpan.textContent.replace(/[()]/g,'').trim() : '';
          rows.push([cls, sid, name, content, bytesTxt, editedContent, editBytesTxt]);
        });

      } else if (menu === 'gibu_personal') {
        // 개인별: 영역 / 글자수(바이트/제한) / 작성내용 / 편집내용 / 편집글자수(바이트/제한)
        rows.push(['영역', '글자수(바이트/제한)', '작성내용', '편집내용', '편집글자수(바이트/제한)']);
        var areaBlocks = contentArea.querySelectorAll('.mb-4');
        areaBlocks.forEach(function(block) {
          var areaLabel = block.querySelector('.bg-blue-100');
          if (!areaLabel) return;
          var areaName = areaLabel.textContent.trim();
          // 원본 바이트 정보 (영역명 옆 span)
          var bytesTxt = '';
          var headerSpans = block.querySelectorAll('.flex.items-center.flex-wrap.gap-2.mb-1 span');
          headerSpans.forEach(function(sp) {
            if (sp.classList.contains('text-xs') && sp.classList.contains('text-gray-500') && sp.textContent.indexOf('\uBC14\uc774\ud2b8') !== -1) {
              bytesTxt = sp.textContent.replace(/[()]/g, '').trim();
            }
          });
          // 원본 작성 내용 (data-raw 속성 우선)
          var originalDiv = block.querySelector('[id^="gibu-original-"]');
          var originalContent = '';
          if (originalDiv) {
            originalContent = originalDiv.getAttribute('data-raw') || originalDiv.innerText.trim();
            if (originalContent === '\ud559\uc0dd\uc774 \uc81c\ucd9c\ud55c \ub0b4\uc6a9\uc774 \uc5c6\uc74c') originalContent = '';
          }
          // 편집 내용 (textarea)
          var editTextarea = block.querySelector('textarea[id^="gibu-edit-"]');
          var editedContent = editTextarea ? editTextarea.value.trim() : '';
          // 편집 바이트 정보
          var editBytesSpan = block.querySelector('[id^="gibu-edit-bytes-"]');
          var editBytesTxt = editBytesSpan ? editBytesSpan.textContent.replace(/[()]/g, '').trim() : '';
          rows.push([areaName, bytesTxt, originalContent, editedContent, editBytesTxt]);
        });
      }

      var ws = XLSX.utils.aoa_to_sheet(rows);
      // 내용 열 너비 넓게
      var colWidths2 = [];
      if (rows[0]) {
        // gibu_personal: 헤더 ['영역','글자수(바이트/제한)','작성내용','편집내용','편집글자수(바이트/제한)']
        // 작성내용(index 2)과 편집내용(index 3)도 넓게
        var wideContentCols = menu === 'gibu_personal' ? [2, 3] : (menu === 'gibu_area' ? [3, 5] : [rows[0].length - 1]);
        rows[0].forEach(function(_, i) {
          colWidths2.push({ wch: wideContentCols.indexOf(i) !== -1 ? 80 : 20 });
        });
      }
      ws['!cols'] = colWidths2;
      // 내용 셀 줄바꿈 허용
      var range2 = XLSX.utils.decode_range(ws['!ref'] || 'A1');
      for (var R2 = 1; R2 <= range2.e.r; R2++) {
        wideContentCols.forEach(function(wc) {
          var cellRef = XLSX.utils.encode_cell({r: R2, c: wc});
          if (ws[cellRef]) {
            if (!ws[cellRef].s) ws[cellRef].s = {};
            ws[cellRef].s.alignment = { wrapText: true };
          }
        });
      }
      XLSX.utils.book_append_sheet(wb, ws, '데이터');
    }

    XLSX.writeFile(wb, filename);
    _closeDownloadModal();
  }

  // ─── 로그아웃 ─────────────────────────────────────────────────
  function _logout() {
    // 모달이 열린 상태에서 unsaved 체크
    var gibuModal = document.getElementById('gibu-write-modal');
    var ta = document.getElementById('gibu-modal-textarea');
    var gibuDirty = gibuModal && !gibuModal.classList.contains('hidden') && ta && (ta.value !== _gibuModalState.savedText);
    if (gibuDirty || _state.hasUnsavedEdit) {
      _showUnsavedModal('로그아웃하면 저장하지 않은 편집 내용이 사라집니다.', function() {
        _state.hasUnsavedEdit = false;
        document.getElementById('logout-modal').classList.remove('hidden');
      });
      return;
    }
    document.getElementById('logout-modal').classList.remove('hidden');
  }

  // ─── 미저장 경고 커스텀 모달 ──────────────────────────────────
  var _unsavedCallback = null;
  function _showUnsavedModal(msg, onConfirm) {
    _unsavedCallback = onConfirm || null;
    var msgEl = document.getElementById('unsaved-modal-msg');
    if (msgEl) msgEl.textContent = msg;
    var modal = document.getElementById('unsaved-modal');
    var card  = document.getElementById('unsaved-modal-card');
    if (!modal || !card) return;
    modal.classList.remove('hidden');
    requestAnimationFrame(function() {
      card.classList.remove('scale-95', 'opacity-0');
      card.classList.add('scale-100', 'opacity-100');
    });
  }
  function _confirmUnsaved() {
    var modal = document.getElementById('unsaved-modal');
    var card  = document.getElementById('unsaved-modal-card');
    if (card) {
      card.classList.remove('scale-100', 'opacity-100');
      card.classList.add('scale-95', 'opacity-0');
    }
    setTimeout(function() {
      if (modal) modal.classList.add('hidden');
      if (_unsavedCallback) { var cb = _unsavedCallback; _unsavedCallback = null; cb(); }
    }, 180);
  }
  function _cancelUnsaved() {
    var modal = document.getElementById('unsaved-modal');
    var card  = document.getElementById('unsaved-modal-card');
    if (card) {
      card.classList.remove('scale-100', 'opacity-100');
      card.classList.add('scale-95', 'opacity-0');
    }
    setTimeout(function() {
      if (modal) modal.classList.add('hidden');
      _unsavedCallback = null;
    }, 180);
  }

  function _confirmLogout() {
    sessionStorage.removeItem('adminInfo');
    location.href = 'index.html';
  }

  function _cancelLogout() {
    document.getElementById('logout-modal').classList.add('hidden');
  }
 
  // ─── 공개 API ─────────────────────────────────────────────────
  return {
    init:                _init,
    onMenuClick:         _onMenuClick,
    logout:              _logout,
    confirmLogout:       _confirmLogout,
    cancelLogout:        _cancelLogout,
    openDownloadModal:   _openDownloadModal,
    closeDownloadModal:  _closeDownloadModal,
    confirmDownload:     _confirmDownload,
    closeSaveSuccess:    _closeSaveSuccess,
    editUnivRank:        _editUnivRank,
    copyGibuContent:     _copyGibuContent,
    copyGibuEdit:        _copyGibuEdit,
    updateEditBytes:     _updateEditBytes,
    saveGibuEdit:        _saveGibuEdit,
    confirmUnsaved:      _confirmUnsaved,
    cancelUnsaved:       _cancelUnsaved,
    toggleGibuPreview:   _toggleGibuPreview,
    toggleGibuPreviewBox:_toggleGibuPreviewBox,
    openGibuWriteModal:  _openGibuWriteModal,
    closeGibuWriteModal: _closeGibuWriteModal,
    updateModalBytes:    _updateModalBytes,
    copyModalLeft:       _copyModalLeft,
    copyModalRight:      _copyModalRight,
    saveGibuModal:       _saveGibuModal
  };
 
})();
</script>

      <h3 class="text-center text-lg font-bold text-gray-800 mb-1">저장하지 않은 내용</h3>
      <p id="unsaved-modal-msg" class="text-center text-sm text-gray-500 mb-6">저장하지 않은 편집 내용이 사라집니다.</p>
      <div class="flex gap-3">
        <button onclick="Admin.cancelUnsaved()"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">
          취소
        </button>
        <button onclick="Admin.confirmUnsaved()"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-amber-500 text-white hover:bg-amber-600 transition-colors shadow-sm">
          계속
        </button>
      </div>
    </div>
  </div>
</div>
<!-- 생기부 작성 모달 -->
<div id="gibu-write-modal" class="hidden fixed inset-0 flex items-stretch justify-center" style="z-index:200;">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="Admin.closeGibuWriteModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden"
       style="width:min(96vw,1100px);height:min(92vh,820px);margin:auto;">
    <!-- 모달 상단 헤더 -->
    <div class="flex items-center justify-between px-5 py-3 border-b border-gray-200 flex-shrink-0"
         style="background:linear-gradient(135deg,#4f46e5 0%,#6366f1 100%);">
      <div class="flex items-center gap-2">
        <svg width="18" height="18" fill="none" stroke="#fff" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
        <span style="font-size:1rem;font-weight:800;color:#fff;letter-spacing:-0.01em;">생기부 작성</span>
      </div>
      <button onclick="Admin.closeGibuWriteModal()"
        style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:700;transition:background 0.15s;"
        onmouseover="this.style.background='rgba(255,255,255,0.35)'"
        onmouseout="this.style.background='rgba(255,255,255,0.2)'">✕</button>
    </div>
    <!-- 모달 본문 (좌우 2분할) -->
    <div class="flex flex-1 min-h-0 overflow-hidden">
      <!-- 좌측: 학생 작성 내용 (읽기 전용) -->
      <div class="flex flex-col" style="width:50%;border-right:1px solid #e2e8f0;min-height:0;">
        <div class="gibu-modal-pane-header" style="background:#eff6ff;">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
            <div>
              <div style="font-size:0.82rem;font-weight:800;color:#1e40af;margin-bottom:2px;">
                📄 <span id="gibu-modal-left-label">학생 작성 내용</span>
              </div>
              <div style="display:flex;align-items:center;gap:6px;">
                <span style="font-size:0.72rem;font-weight:600;color:#3b82f6;background:#dbeafe;padding:2px 8px;border-radius:999px;">읽기 전용</span>
                <span id="gibu-modal-left-bytes" style="font-size:0.74rem;color:#64748b;"></span>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <button type="button" class="gibu-copy-btn" onclick="Admin.copyModalLeft()">
                <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                내용 복사
              </button>
              <span id="gibu-modal-left-copy-fb" class="gibu-spacer" style="min-width:60px;font-size:0.74rem;color:#16a34a;font-weight:600;"></span>
            </div>
          </div>
        </div>
        <div class="gibu-modal-pane-body">
          <div id="gibu-modal-left-content" class="gibu-modal-readonly"></div>
        </div>
      </div>
      <!-- 우측: 내용 편집 -->
      <div class="flex flex-col" style="width:50%;min-height:0;">
        <div class="gibu-modal-pane-header" style="background:#f5f3ff;">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
            <div>
              <div style="font-size:0.82rem;font-weight:800;color:#5b21b6;margin-bottom:2px;">
                ✏️ <span id="gibu-modal-right-label">내용 편집</span>
              </div>
              <div style="display:flex;align-items:center;gap:6px;">
                <span style="font-size:0.72rem;font-weight:600;color:#7c3aed;background:#ede9fe;padding:2px 8px;border-radius:999px;">편집 가능</span>
                <span id="gibu-modal-right-bytes" style="font-size:0.74rem;color:#374151;font-weight:600;"></span>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <button type="button" class="gibu-copy-btn" style="background:linear-gradient(135deg,#64748b,#475569);box-shadow:none;" onclick="Admin.copyModalRight()">
                <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                편집 복사
              </button>
              <span id="gibu-modal-right-copy-fb" class="gibu-spacer" style="min-width:60px;font-size:0.74rem;color:#16a34a;font-weight:600;"></span>
              <button type="button" id="gibu-modal-save-btn" class="gibu-save-btn" onclick="Admin.saveGibuModal()" style="display:inline-flex;align-items:center;gap:5px;">
                <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                저장
              </button>
            </div>
          </div>
        </div>
        <div class="gibu-modal-pane-body flex flex-col">
          <textarea id="gibu-modal-textarea"
            class="gibu-modal-textarea flex-1"
            style="min-height:300px;"
            oninput="Admin.updateModalBytes()"
            placeholder="내용을 입력하세요..."></textarea>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() { Admin.init(); });
</script>
 
</body>
</html>
