<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 스크롤바 스타일 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    /* 사이드바 학생 선택 */
    .student-item.active { background-color: #dbeafe; border-left: 3px solid #3b82f6; }
    /* 영역 버튼 활성화 */
    .area-btn.active { background-color: #1d4ed8; color: #fff; }
    /* 상단 메뉴 버튼 활성화 */
    .menu-btn.active { background-color: #1e40af; color: #fff; box-shadow: 0 2px 6px rgba(30,64,175,0.4); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ============================================================
     ADMIN 네임스페이스 (IIFE)
     ============================================================ -->
<script>
var Admin = (function() {

  // ─── 상태 변수 ───────────────────────────────────────────────
  var _state = {
    adminId:    '',
    adminName:  '',
    adminAuth:  '',
    adminClass: '',
    allClasses: [],
    currentClass: '',   // 현재 선택된 반 (드롭다운 or 개인 반)
    currentMenu: '',    // 'suneung' | 'univ' | 'gibu_personal' | 'gibu_area'
    currentArea: '',    // 생기부 영역별 선택
    currentStudentId: '',
    studentList: []
  };

  // ─── 초기화 ──────────────────────────────────────────────────
  function _init() {
    // sessionStorage에서 관리자 정보 읽기
    var raw = sessionStorage.getItem('adminInfo');
    if (!raw) {
      alert('로그인 정보가 없습니다. 로그인 페이지로 이동합니다.');
      location.href = 'index.html';
      return;
    }
    var info = JSON.parse(raw);
    _state.adminId    = info.adminId    || '';
    _state.adminName  = info.adminName  || '';
    _state.adminAuth  = info.adminAuth  || '';
    _state.adminClass = info.adminClass || '';
    _state.allClasses = info.allClasses || [];
    _state.currentClass = (_state.adminAuth === '관리자') ? '전체' : _state.adminClass;

    _renderHeader();
    _loadStudentList();
  }

  // ─── 헤더 렌더링 ─────────────────────────────────────────────
  function _renderHeader() {
    document.getElementById('admin-greeting').textContent =
      _state.adminName + ' 선생님 접속했습니다.';

    var authLabel;
    if (_state.adminAuth === '관리자') {
      authLabel = '권한 : ';
      // 드롭다운 생성
      var sel = document.getElementById('class-select-wrapper');
      sel.innerHTML = '';
      var select = document.createElement('select');
      select.id = 'class-dropdown';
      select.className = 'ml-1 text-sm border border-blue-300 rounded px-2 py-0.5 bg-white focus:outline-none focus:ring-2 focus:ring-blue-400';
      var optAll = document.createElement('option');
      optAll.value = '전체'; optAll.textContent = '전체';
      select.appendChild(optAll);
      _state.allClasses.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c; opt.textContent = c + '반';
        select.appendChild(opt);
      });
      select.value = _state.currentClass;
      select.addEventListener('change', function() {
        _state.currentClass = this.value;
        _loadStudentList();
        _refreshContent();
      });
      sel.appendChild(select);
    } else {
      authLabel = '권한 : ' + _state.adminClass + '반';
      document.getElementById('class-select-wrapper').innerHTML =
        '<span class="ml-1 text-sm font-semibold text-blue-700">' + _state.adminClass + '반</span>';
    }
    document.getElementById('auth-label').textContent = authLabel;
  }

  // ─── 학생 명단 로드 ──────────────────────────────────────────
  function _loadStudentList() {
    _showSidebarSkeleton();
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          _state.studentList = res.data;
          _renderStudentList(res.data);
        } else {
          document.getElementById('student-list').innerHTML =
            '<p class="text-red-500 text-sm p-3">' + res.message + '</p>';
        }
      })
      .withFailureHandler(function(err) {
        document.getElementById('student-list').innerHTML =
          '<p class="text-red-500 text-sm p-3">오류: ' + err.message + '</p>';
      })
      .adminGetStudentList(_state.adminId, _state.currentClass);
  }

  function _showSidebarSkeleton() {
    var html = '';
    for (var i = 0; i < 8; i++) {
      html += '<div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">'
            + '<div class="w-8 h-3 bg-gray-200 rounded animate-pulse"></div>'
            + '<div class="flex-1 h-3 bg-gray-200 rounded animate-pulse"></div>'
            + '</div>';
    }
    document.getElementById('student-list').innerHTML = html;
  }

  function _renderStudentList(students) {
    var ul = document.getElementById('student-list');
    if (!students || students.length === 0) {
      ul.innerHTML = '<p class="text-gray-400 text-sm p-3 text-center">학생이 없습니다.</p>';
      return;
    }
    ul.innerHTML = '';
    students.forEach(function(s) {
      var li = document.createElement('div');
      li.className = 'student-item flex items-center gap-2 px-3 py-2 border-b border-gray-100 cursor-pointer hover:bg-blue-50 transition-colors';
      li.dataset.id = s.studentId;
      li.innerHTML =
        '<span class="text-xs text-gray-400 w-12 shrink-0">' + s.studentId + '</span>' +
        '<span class="text-sm font-medium text-gray-800 truncate">' + s.name + '</span>' +
        (s.studentClass ? '<span class="text-xs text-gray-400 ml-auto shrink-0">' + s.studentClass + '반</span>' : '');
      li.addEventListener('click', function() {
        document.querySelectorAll('.student-item').forEach(function(el) { el.classList.remove('active'); });
        li.classList.add('active');
        _state.currentStudentId = s.studentId;
        if (_state.currentMenu === 'gibu_personal') {
          _loadGibuPersonalForStudent(s.studentId, s.name, students);
        }
      });
      ul.appendChild(li);
    });
  }

  // ─── 메뉴 버튼 클릭 ──────────────────────────────────────────
  function _onMenuClick(menu) {
    _state.currentMenu = menu;
    _state.currentStudentId = '';

    // 버튼 활성화
    document.querySelectorAll('.menu-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('btn-' + menu).classList.add('active');

    // 사이드바 초기화 (생기부 영역별은 사이드바가 영역 버튼으로 변경)
    _resetSidebar(menu);
    _clearContent();

    if (menu === 'suneung')       { _loadSuneung(); }
    else if (menu === 'univ')     { _loadUniv(); }
    else if (menu === 'gibu_personal') {
      _loadStudentList();   // 학생 명단 다시
      _renderStudentList(_state.studentList);
      document.getElementById('content-area').innerHTML =
        '<p class="text-gray-400 text-center mt-20">좌측에서 학생을 선택하세요.</p>';
    }
    else if (menu === 'gibu_area') { _renderAreaButtons(); }
  }

  function _resetSidebar(menu) {
    if (menu === 'gibu_area') {
      // 영역 버튼 사이드바로 변경
      document.getElementById('sidebar-title').textContent = '생기부 영역';
    } else {
      document.getElementById('sidebar-title').textContent = '학생 명단';
      _renderStudentList(_state.studentList);
    }
  }

  function _refreshContent() {
    if (!_state.currentMenu) return;
    if (_state.currentMenu === 'suneung')         _loadSuneung();
    else if (_state.currentMenu === 'univ')       _loadUniv();
    else if (_state.currentMenu === 'gibu_personal') {
      _loadStudentList();
      _clearContent();
    }
    else if (_state.currentMenu === 'gibu_area') {
      _renderAreaButtons();
      _clearContent();
    }
  }

  // ─── 중앙 로딩 ────────────────────────────────────────────────
  function _showContentSkeleton(rows) {
    var r = rows || 5;
    var html = '<div class="p-4 space-y-3">';
    for (var i = 0; i < r; i++) {
      html += '<div class="h-4 bg-gray-200 rounded animate-pulse w-' + (i % 2 === 0 ? 'full' : '3/4') + '"></div>';
    }
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
  }

  function _clearContent() {
    document.getElementById('content-area').innerHTML =
      '<p class="text-gray-400 text-center mt-20">메뉴를 선택하세요.</p>';
  }

  // ─── 수능선택 ─────────────────────────────────────────────────
  function _loadSuneung() {
    _showContentSkeleton(10);
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) _renderSuneung(res.data);
        else _showError(res.message);
      })
      .withFailureHandler(function(err) { _showError(err.message); })
      .adminGetSuneungData(_state.adminId, _state.currentClass);
  }

  function _renderSuneung(data) {
    if (!data || !data.rows || data.rows.length === 0) {
      document.getElementById('content-area').innerHTML =
        '<p class="text-gray-400 text-center mt-20">데이터가 없습니다.</p>';
      return;
    }
    var html = '<div class="overflow-x-auto p-2">'
             + '<table class="min-w-full text-sm border-collapse">'
             + '<thead><tr class="bg-blue-700 text-white">'
             + '<th class="px-3 py-2 border border-blue-600 whitespace-nowrap">반</th>'
             + '<th class="px-3 py-2 border border-blue-600 whitespace-nowrap">학번</th>'
             + '<th class="px-3 py-2 border border-blue-600 whitespace-nowrap">이름</th>';
    data.headers.forEach(function(h) {
      html += '<th class="px-3 py-2 border border-blue-600 whitespace-nowrap">' + h + '</th>';
    });
    html += '</tr></thead><tbody>';
    data.rows.forEach(function(row, idx) {
      var bg = idx % 2 === 0 ? 'bg-white' : 'bg-blue-50';
      html += '<tr class="' + bg + ' hover:bg-yellow-50 transition-colors">'
            + '<td class="px-3 py-1.5 border border-gray-200 text-center">' + row.studentClass + '</td>'
            + '<td class="px-3 py-1.5 border border-gray-200 text-center">' + row.studentId + '</td>'
            + '<td class="px-3 py-1.5 border border-gray-200 font-medium">' + row.name + '</td>';
      row.values.forEach(function(v) {
        html += '<td class="px-3 py-1.5 border border-gray-200 text-center whitespace-nowrap">' + (v || '-') + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById('content-area').innerHTML = html;
  }

  // ─── 관심대학 ─────────────────────────────────────────────────
  function _loadUniv() {
    _showContentSkeleton(10);
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) _renderUniv(res.data);
        else _showError(res.message);
      })
      .withFailureHandler(function(err) { _showError(err.message); })
      .adminGetUnivData(_state.adminId, _state.currentClass);
  }

  function _renderUniv(data) {
    if (!data || !data.rows || data.rows.length === 0) {
      document.getElementById('content-area').innerHTML =
        '<p class="text-gray-400 text-center mt-20">데이터가 없습니다.</p>';
      return;
    }
    var html = '<div class="overflow-x-auto p-2">'
             + '<table class="min-w-full text-sm border-collapse">'
             + '<thead><tr class="bg-emerald-700 text-white">';
    data.headers.forEach(function(h) {
      html += '<th class="px-3 py-2 border border-emerald-600 whitespace-nowrap">' + h + '</th>';
    });
    html += '</tr></thead><tbody>';
    data.rows.forEach(function(row, idx) {
      var bg = idx % 2 === 0 ? 'bg-white' : 'bg-emerald-50';
      html += '<tr class="' + bg + ' hover:bg-yellow-50 transition-colors">';
      row.values.forEach(function(v) {
        html += '<td class="px-3 py-1.5 border border-gray-200 whitespace-nowrap">' + (v || '-') + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById('content-area').innerHTML = html;
  }

  // ─── 생기부 (개인별) ──────────────────────────────────────────
  function _loadGibuPersonalForStudent(studentId, studentName, allStudents) {
    _showContentSkeleton(6);
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) _renderGibuPersonal(res.data, studentId, studentName);
        else _showError(res.message);
      })
      .withFailureHandler(function(err) { _showError(err.message); })
      .adminGetGibuByStudent(_state.adminId, _state.currentClass);
  }

  function _renderGibuPersonal(students, targetId) {
    var found = null;
    for (var i = 0; i < students.length; i++) {
      if (students[i].studentId === targetId) { found = students[i]; break; }
    }
    if (!found) {
      document.getElementById('content-area').innerHTML =
        '<p class="text-gray-400 text-center mt-20">학생 정보를 찾을 수 없습니다.</p>';
      return;
    }
    var areas = ['자율활동', '동아리활동', '진로활동', '개인별세특', '행동발달'];
    var html = '<div class="p-4">'
             + '<h2 class="text-lg font-bold text-gray-800 mb-4">'
             + found.studentId + ' ' + found.name + ' 학생 생활기록부</h2>';
    areas.forEach(function(area) {
      var content = found.areas[area] || '';
      html += '<div class="mb-4">'
            + '<div class="flex items-center gap-2 mb-1">'
            + '<span class="inline-block bg-blue-100 text-blue-800 text-xs font-semibold px-2 py-0.5 rounded">' + area + '</span>'
            + '</div>'
            + '<div class="bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm text-gray-700 min-h-[60px] whitespace-pre-wrap">'
            + (content || '<span class="text-gray-400 italic">학생이 제출한 내용이 없음</span>')
            + '</div></div>';
    });
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
  }

  // ─── 생기부 (영역별) ──────────────────────────────────────────
  function _renderAreaButtons() {
    var areas = ['자율활동', '동아리활동', '진로활동', '개인별세특', '행동발달'];
    var ul = document.getElementById('student-list');
    ul.innerHTML = '';
    areas.forEach(function(area) {
      var btn = document.createElement('button');
      btn.className = 'area-btn w-full text-left px-4 py-3 border-b border-gray-100 text-sm font-medium text-gray-700 hover:bg-blue-50 transition-colors';
      btn.textContent = area;
      btn.dataset.area = area;
      btn.addEventListener('click', function() {
        document.querySelectorAll('.area-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        _state.currentArea = area;
        _loadGibuByArea(area);
      });
      ul.appendChild(btn);
    });
  }

  function _loadGibuByArea(area) {
    _showContentSkeleton(8);
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) _renderGibuArea(res.data, area);
        else _showError(res.message);
      })
      .withFailureHandler(function(err) { _showError(err.message); })
      .adminGetGibuByArea(_state.adminId, _state.currentClass, area);
  }

  function _renderGibuArea(rows, area) {
    if (!rows || rows.length === 0) {
      document.getElementById('content-area').innerHTML =
        '<p class="text-gray-400 text-center mt-20">' + area + ' 데이터가 없습니다.</p>';
      return;
    }
    var html = '<div class="p-4">'
             + '<h2 class="text-lg font-bold text-gray-800 mb-4">'
             + '<span class="bg-blue-100 text-blue-800 text-sm px-2 py-0.5 rounded mr-2">' + area + '</span>'
             + '영역별 생기부 내용</h2>';
    rows.forEach(function(row) {
      html += '<div class="mb-4 bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">'
            + '<div class="flex items-center gap-3 bg-gray-50 px-4 py-2 border-b border-gray-200">'
            + '<span class="text-xs text-gray-500">' + row.studentClass + '반</span>'
            + '<span class="text-xs font-mono text-gray-600">' + row.studentId + '</span>'
            + '<span class="font-semibold text-gray-800">' + row.name + '</span>'
            + '</div>'
            + '<div class="p-3 text-sm text-gray-700 whitespace-pre-wrap min-h-[48px]">'
            + (row.content || '<span class="text-gray-400 italic">내용 없음</span>')
            + '</div></div>';
    });
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
  }

  // ─── 오류 표시 ────────────────────────────────────────────────
  function _showError(msg) {
    document.getElementById('content-area').innerHTML =
      '<div class="p-6 text-center">'
      + '<div class="text-red-500 text-4xl mb-3">⚠️</div>'
      + '<p class="text-red-600 font-medium">' + (msg || '오류가 발생했습니다.') + '</p>'
      + '</div>';
  }

  // ─── 로그아웃 ─────────────────────────────────────────────────
  function _logout() {
    if (confirm('로그아웃 하시겠습니까?')) {
      sessionStorage.removeItem('adminInfo');
      location.href = 'index.html';
    }
  }

  // ─── 공개 API ─────────────────────────────────────────────────
  return {
    init:        _init,
    onMenuClick: _onMenuClick,
    logout:      _logout
  };

})();
</script>

<!-- ============================================================
     HTML 구조
     ============================================================ -->

<!-- 상단 헤더 -->
<header class="bg-gradient-to-r from-blue-800 to-blue-600 text-white shadow-lg">
  <div class="max-w-screen-2xl mx-auto px-4 py-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">

    <!-- 좌측: 인사 + 권한 -->
    <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
      <span class="text-base sm:text-lg font-bold" id="admin-greeting">로딩 중...</span>
      <div class="flex items-center text-blue-200 text-sm">
        <span id="auth-label"></span>
        <span id="class-select-wrapper" class="ml-1"></span>
      </div>
    </div>

    <!-- 우측: 메뉴 버튼 + 로그아웃 -->
    <div class="flex flex-wrap gap-2 items-center">
      <button id="btn-suneung"
        class="menu-btn px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-blue-700 hover:bg-blue-900 text-white border border-blue-500 transition-all"
        onclick="Admin.onMenuClick('suneung')">수능선택</button>
      <button id="btn-univ"
        class="menu-btn px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-blue-700 hover:bg-blue-900 text-white border border-blue-500 transition-all"
        onclick="Admin.onMenuClick('univ')">관심대학</button>
      <button id="btn-gibu_personal"
        class="menu-btn px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-blue-700 hover:bg-blue-900 text-white border border-blue-500 transition-all"
        onclick="Admin.onMenuClick('gibu_personal')">생기부(개인별)</button>
      <button id="btn-gibu_area"
        class="menu-btn px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-blue-700 hover:bg-blue-900 text-white border border-blue-500 transition-all"
        onclick="Admin.onMenuClick('gibu_area')">생기부(영역별)</button>
      <button
        class="px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-red-500 hover:bg-red-700 text-white border border-red-400 transition-all ml-2"
        onclick="Admin.logout()">로그아웃</button>
    </div>
  </div>
</header>

<!-- 본문: 좌측 사이드바 + 중앙 콘텐츠 -->
<div class="flex h-[calc(100vh-70px)] max-w-screen-2xl mx-auto">

  <!-- 좌측 사이드바 -->
  <aside class="w-44 sm:w-52 md:w-60 shrink-0 bg-white border-r border-gray-200 flex flex-col overflow-hidden">
    <div class="px-3 py-2 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
      <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide" id="sidebar-title">학생 명단</span>
      <span class="text-xs text-gray-400" id="student-count"></span>
    </div>
    <div id="student-list" class="flex-1 overflow-y-auto">
      <!-- 스켈레톤 초기 상태 -->
      <div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">
        <div class="w-8 h-3 bg-gray-200 rounded animate-pulse"></div>
        <div class="flex-1 h-3 bg-gray-200 rounded animate-pulse"></div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">
        <div class="w-8 h-3 bg-gray-200 rounded animate-pulse"></div>
        <div class="flex-1 h-3 bg-gray-200 rounded animate-pulse"></div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">
        <div class="w-10 h-3 bg-gray-200 rounded animate-pulse"></div>
        <div class="flex-1 h-3 bg-gray-200 rounded animate-pulse"></div>
      </div>
    </div>
  </aside>

  <!-- 중앙 콘텐츠 -->
  <main class="flex-1 overflow-y-auto bg-gray-50">
    <div id="content-area" class="min-h-full">
      <div class="flex flex-col items-center justify-center h-64 text-gray-400">
        <svg class="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
