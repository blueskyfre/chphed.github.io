<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 0.375rem;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    .student-item.active { background-color: #eff6ff; border-left: 3px solid #3b82f6; }
    .area-btn.active { background-color: #1d4ed8; color: #fff; }

    /* ── 헤더 공통 ── */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #e5e9f0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
    }

    /* ── 인사 영역 ── */
    .header-greeting {
      font-size: 0.875rem;
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
    }
    .header-auth {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    /* ── 메뉴 탭 버튼 ── */
    .menu-btn {
      position: relative;
      padding: 0 4px;
      height: 56px;
      font-size: 0.835rem;
      font-weight: 500;
      color: #64748b;
      background: transparent;
      border: none;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .menu-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #2563eb;
      border-radius: 2px 2px 0 0;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.25s ease;
    }
    .menu-btn:hover {
      color: #2563eb;
    }
    .menu-btn:hover::after {
      transform: scaleX(1);
    }
    .menu-btn.active {
      color: #2563eb;
      font-weight: 600;
    }
    .menu-btn.active::after {
      transform: scaleX(1);
    }

    /* ── 메뉴 버튼 사이 간격 ── */
    .header-nav {
      display: flex;
      align-items: center;
      gap: 20px;
      height: 56px;
    }

    /* ── 액션 버튼 ── */
    .header-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease;
      border: 1px solid transparent;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .btn-download {
      background: #f1f5f9;
      color: #475569;
      border-color: #e2e8f0;
    }
    .btn-download:hover {
      background: #e0f2fe;
      color: #0369a1;
      border-color: #bae6fd;
    }
    .btn-logout {
      background: #fff;
      color: #94a3b8;
      border-color: #e2e8f0;
    }
    .btn-logout:hover {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca;
    }
    .header-divider {
      width: 1px;
      height: 18px;
      background: #e2e8f0;
      margin: 0 2px;
    }

    /* ── 드롭다운 select ── */
    #class-dropdown {
      font-size: 0.78rem;
      font-weight: 500;
      color: #334155;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.18s;
    }
    #class-dropdown:focus {
      border-color: #93c5fd;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
 
<script>
// ============================================================
// Admin 네임스페이스 (IIFE)
// ============================================================
var Admin = (function() {
 
  // ─── 설정 ────────────────────────────────────────────────────
  var _WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzJQQTEhSSGAilKc2KBk1n56jPOJE1H4Qbm72cN0vF8WoOCibp59WgPSHXo26Y_8NeZnw/exec';

// ─── 글자수 제한 표현 변수 ───────────────────────────────────────────────
  var _BYTE_LIMIT = {
  '자율활동':   1500,
  '동아리활동': 1500,
  '진로활동':   2100,
  '개인별세특': 1500,
  '행동발달':   1500
};

 
  // ─── 상태 변수 ───────────────────────────────────────────────
  var _state = {
    adminId:      '',
    adminName:    '',
    adminAuth:    '',
    adminClass:   '',
    allClasses:   [],
    currentClass: '',
    currentMenu:  '',
    currentArea:  '',
    currentStudentId: '',
    studentList:  []
  };
 
  // ─── API 호출 (GET) ──────────────────────────────────────────
  async function _apiGet(action, params) {
    params = params || {};
    var url = new URL(_WEB_APP_URL);
    url.searchParams.set('action', action);
    for (var key in params) {
      if (params.hasOwnProperty(key)) url.searchParams.set(key, params[key]);
    }
    var res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error('서버 응답 오류: ' + res.status);
    return await res.json();
  }
 
  // ─── 초기화 ──────────────────────────────────────────────────
  function _init() {
    var raw = sessionStorage.getItem('adminInfo');
    if (!raw) {
      alert('로그인 정보가 없습니다. 로그인 페이지로 이동합니다.');
      location.href = 'index.html';
      return;
    }
    var info = JSON.parse(raw);
    _state.adminId    = info.adminId    || '';
    _state.adminName  = info.adminName  || '';
    _state.adminAuth  = info.adminAuth  || '';
    _state.adminClass = info.adminClass || '';
    _state.allClasses = info.allClasses || [];
    _state.currentClass = (_state.adminAuth === '관리자') ? '전체' : _state.adminClass;
 
    _renderHeader();
    _loadStudentList();
  }
 
  // ─── 헤더 렌더링 ─────────────────────────────────────────────
  function _renderHeader() {
    document.getElementById('admin-greeting').textContent =
      _state.adminName + ' 선생님 접속했습니다.';
 
    if (_state.adminAuth === '관리자') {
      document.getElementById('auth-label').textContent = '권한 : ';
      var wrapper = document.getElementById('class-select-wrapper');
      wrapper.innerHTML = '';
      var select = document.createElement('select');
      select.id = 'class-dropdown';
      var optAll = document.createElement('option');
      optAll.value = '전체'; optAll.textContent = '전체';
      select.appendChild(optAll);
      _state.allClasses.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c; opt.textContent = c + '반';
        select.appendChild(opt);
      });
      select.value = _state.currentClass;
      select.addEventListener('change', function() {
        _state.currentClass = this.value;
        _loadStudentList();
        _refreshContent();
      });
      wrapper.appendChild(select);
    } else {
      document.getElementById('auth-label').textContent = '권한 : ';
      document.getElementById('class-select-wrapper').innerHTML =
        '<span style="font-size:0.78rem;font-weight:600;color:#475569;">' + _state.adminClass + '반</span>';
    }
  }
 
  // ─── 학생 명단 로드 ──────────────────────────────────────────
  async function _loadStudentList() {
    _showSidebarSkeleton();
    try {
      var res = await _apiGet('adminGetStudentList', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass
      });
      if (res.success) {
        _state.studentList = res.data;
        if (_state.currentMenu === 'gibu_area') {
          _renderAreaButtons();
        } else {
          _renderStudentList(res.data);
        }
      } else {
        document.getElementById('student-list').innerHTML =
          '<p class="text-red-400 text-xs p-3">' + res.message + '</p>';
      }
    } catch (err) {
      document.getElementById('student-list').innerHTML =
        '<p class="text-red-400 text-xs p-3">오류: ' + err.message + '</p>';
    }
  }
 
  function _showSidebarSkeleton() {
    var html = '';
    for (var i = 0; i < 8; i++) {
      html += '<div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">'
            + '<div class="skeleton-box w-10 h-3"></div>'
            + '<div class="skeleton-box flex-1 h-3"></div>'
            + '</div>';
    }
    document.getElementById('student-list').innerHTML = html;
  }
 
  function _renderStudentList(students) {
    var ul = document.getElementById('student-list');
    if (!students || students.length === 0) {
      ul.innerHTML = '<p class="text-gray-400 text-sm p-3 text-center">학생이 없습니다.</p>';
      return;
    }
    ul.innerHTML = '';
    students.forEach(function(s) {
      var li = document.createElement('div');
      li.className = 'student-item flex items-center gap-2 px-3 py-2 border-b border-gray-100 cursor-pointer hover:bg-blue-50 transition-colors';
      li.dataset.id = s.studentId;
      li.innerHTML =
        '<span class="text-xs text-gray-400 w-12 shrink-0">' + s.studentId + '</span>' +
        '<span class="text-sm font-medium text-gray-800 truncate">' + s.name + '</span>';
      li.addEventListener('click', function() {
        document.querySelectorAll('.student-item').forEach(function(el) { el.classList.remove('active'); });
        li.classList.add('active');
        _state.currentStudentId = s.studentId;
        if (_state.currentMenu === 'gibu_personal') {
          _renderGibuPersonalForStudent(s.studentId);
        } else if (_state.currentMenu === 'univ') {
          _renderUnivForStudent(s);
        }
      });
      ul.appendChild(li);
    });
  }
 
  // ─── 메뉴 클릭 ───────────────────────────────────────────────
  function _onMenuClick(menu) {
    _state.currentMenu = menu;
    _state.currentStudentId = '';
 
    document.querySelectorAll('.menu-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('btn-' + menu).classList.add('active');
 
    document.getElementById('sidebar-title').textContent =
      menu === 'gibu_area' ? '생기부 영역' : '학생 명단';
 
    if (menu === 'gibu_area') {
      _renderAreaButtons();
      _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-100"><svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 shadow-sm">좌측에 있는 생기부 영역을 클릭하여 데이터를 조회하세요.</p></div>');
    } else if (menu === 'gibu_personal') {
      _renderStudentList(_state.studentList);
      _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-100"><svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 shadow-sm">좌측에서 학생을 선택하세요.</p></div>');
    } else if (menu === 'suneung') {
      _renderStudentList(_state.studentList);
      _loadSuneung();
    } else if (menu === 'univ') {
      _renderStudentList(_state.studentList);
      _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-emerald-100"><svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-xl px-5 py-3 shadow-sm">좌측에서 학생을 선택하세요.</p></div>');
    }
  }
 
  function _refreshContent() {
    if (!_state.currentMenu) return;
    if (_state.currentMenu === 'suneung')           _loadSuneung();
    else if (_state.currentMenu === 'univ')         { _state.currentStudentId = ''; _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-emerald-100"><svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-xl px-5 py-3 shadow-sm">좌측에서 학생을 선택하세요.</p></div>'); }
    else if (_state.currentMenu === 'gibu_personal') _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-100"><svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 shadow-sm">좌측에서 학생을 선택하세요.</p></div>');
    else if (_state.currentMenu === 'gibu_area')    { _renderAreaButtons(); _clearContent('<div class="flex flex-col items-center justify-center h-64 gap-3"><div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-100"><svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div><p class="text-base font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 shadow-sm">좌측에 있는 생기부 영역을 클릭하여 데이터를 조회하세요.</p></div>'); }
  }
 
  // ─── 콘텐츠 영역 유틸 ────────────────────────────────────────
  function _showContentSkeleton(rows) {
    var html = '<div class="p-4 space-y-3">';
    for (var i = 0; i < (rows || 6); i++) {
      html += '<div class="skeleton-box h-4 ' + (i % 2 === 0 ? 'w-full' : 'w-3/4') + '"></div>';
    }
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
  }
 
  function _clearContent(msg) {
    document.getElementById('content-area').innerHTML =
      msg || '<div class="flex flex-col items-center justify-center h-64 text-gray-400">'
           + '<p class="text-sm">상단 메뉴를 클릭하여 데이터를 조회하세요.</p></div>';
  }
 
  function _showError(msg) {
    document.getElementById('content-area').innerHTML =
      '<div class="p-6 text-center">'
      + '<div class="text-4xl mb-3">⚠️</div>'
      + '<p class="text-red-600 font-medium">' + (msg || '오류가 발생했습니다.') + '</p>'
      + '</div>';
  }
 
  // ─── 수능선택 ─────────────────────────────────────────────────
  async function _loadSuneung() {
    _showContentSkeleton(10);
    try {
      var res = await _apiGet('adminGetSuneungData', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass
      });
      if (res.success) _renderSuneung(res.data);
      else _showError(res.message);
    } catch (err) { _showError(err.message); }
  }
 
  function _renderSuneung(data) {
    if (!data || !data.rows || data.rows.length === 0) {
      _clearContent('<p class="text-gray-400 text-center mt-20">데이터가 없습니다.</p>');
      return;
    }
    var html = '<div class="overflow-x-auto p-2"><table class="min-w-full text-sm border-collapse">'
             + '<thead><tr class="bg-blue-700 text-white">'
             + '<th class="px-3 py-2 border border-blue-600 whitespace-nowrap">반</th>'
             + '<th class="px-3 py-2 border border-blue-600 whitespace-nowrap">학번</th>'
             + '<th class="px-3 py-2 border border-blue-600 whitespace-nowrap">이름</th>';
    data.headers.forEach(function(h) {
      html += '<th class="px-3 py-2 border border-blue-600 whitespace-nowrap">' + h + '</th>';
    });
    html += '</tr></thead><tbody>';
    data.rows.forEach(function(row, idx) {
      html += '<tr class="' + (idx % 2 === 0 ? 'bg-white' : 'bg-blue-50') + ' hover:bg-yellow-50">'
            + '<td class="px-3 py-1.5 border border-gray-200 text-center">' + row.studentClass + '</td>'
            + '<td class="px-3 py-1.5 border border-gray-200 text-center">' + row.studentId + '</td>'
            + '<td class="px-3 py-1.5 border border-gray-200 font-medium">' + row.name + '</td>';
      row.values.forEach(function(v) {
        html += '<td class="px-3 py-1.5 border border-gray-200 text-center whitespace-nowrap">' + (v || '-') + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById('content-area').innerHTML = html;
  }
 
  // ─── 관심대학 (학생 개별 조회) ───────────────────────────────
  async function _renderUnivForStudent(student) {
    _showContentSkeleton(10);
    try {
      var res = await _apiGet('adminGetUnivByStudent', {
        adminId:   _state.adminId,
        studentId: student.studentId
      });
      if (!res.success) { _showError(res.message); return; }

      var data = res.data;
      // 표시할 헤더: 순위, 대학명, 전형유형, 전형종류, 지원학과, 모집정원, 수능최저, 선발유형, 면접유무, 실기유무, 지원성향판단, 비고
      var displayHeaders = ['순위', '대학명', '전형유형', '전형종류', '지원학과', '모집정원', '수능최저', '선발유형', '면접유무', '실기유무', '지원성향판단', '비고'];

      var html = '<div class="p-4">'
               + '<div class="mb-3 text-base font-bold text-gray-800">'
               + student.studentId + ' ' + student.name + ' 학생 : ' + (data.prefType || '-')
               + '</div>'
               + '<div class="overflow-x-auto"><table class="min-w-full text-sm border-collapse">'
               + '<thead><tr class="bg-emerald-700 text-white">';

      displayHeaders.forEach(function(h) {
        html += '<th class="px-3 py-2 border border-emerald-600 whitespace-nowrap">' + h + '</th>';
      });
      html += '</tr></thead><tbody>';

      var allHeadersRef = ['연번', '반', '학번', '이름', '선호전형', '순위', '대학명', '전형유형', '전형종류', '지원학과', '모집정원', '수능최저', '선발유형', '면접유무', '실기유무', '지원성향판단', '비고'];
      // 표시 컬럼 인덱스 (allHeadersRef 기준)
      var displayColNames = ['순위', '대학명', '전형유형', '전형종류', '지원학과', '모집정원', '수능최저', '선발유형', '면접유무', '실기유무', '지원성향판단', '비고'];

      if (!data.rows || data.rows.length === 0) {
        html += '<tr><td colspan="' + displayHeaders.length + '" class="text-center py-4 text-gray-400">데이터가 없습니다.</td></tr>';
      } else {
        data.rows.forEach(function(row, idx) {
          html += '<tr class="' + (idx % 2 === 0 ? 'bg-white' : 'bg-emerald-50') + ' hover:bg-yellow-50">';
          displayColNames.forEach(function(colName) {
            var val = row[colName] !== undefined ? row[colName] : '-';
            // 순위 셀은 편집 가능하게 표시 (더블클릭 편집)
            if (colName === '순위') {
              html += '<td class="px-3 py-1.5 border border-gray-200 text-center whitespace-nowrap font-semibold text-emerald-700 cursor-pointer univ-rank-cell"'
                    + ' data-studentid="' + student.studentId + '"'
                    + ' data-rowindex="' + row._rowIndex + '"'
                    + ' data-current="' + val + '"'
                    + ' ondblclick="Admin.editUnivRank(this)">'
                    + (val || '-')
                    + '</td>';
            } else {
              html += '<td class="px-3 py-1.5 border border-gray-200 whitespace-nowrap">' + (val || '-') + '</td>';
            }
          });
          html += '</tr>';
        });
      }

      html += '</tbody></table></div></div>';
      document.getElementById('content-area').innerHTML = html;
    } catch (err) { _showError(err.message); }
  }

  // ─── 관심대학 순위 편집 ────────────────────────────────────
  function _editUnivRank(cell) {
    var currentVal = cell.dataset.current || '';
    var input = document.createElement('input');
    input.type = 'text';
    input.value = currentVal;
    input.className = 'w-12 text-center border border-emerald-400 rounded px-1 py-0.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400';
    input.style.width = '50px';

    function _commit() {
      var newVal = input.value.trim();
      if (newVal === currentVal) { cell.textContent = currentVal || '-'; return; }
      var studentId = cell.dataset.studentid;
      var rowIndex  = cell.dataset.rowindex;
      cell.textContent = '저장 중...';
      _apiGet('adminSaveUnivRank', {
        adminId:   _state.adminId,
        studentId: studentId,
        rowIndex:  rowIndex,
        newRank:   newVal
      }).then(function(res) {
        if (res.success) {
          cell.textContent = newVal || '-';
          cell.dataset.current = newVal;
        } else {
          alert('저장 실패: ' + res.message);
          cell.textContent = currentVal || '-';
        }
      }).catch(function(err) {
        alert('오류: ' + err.message);
        cell.textContent = currentVal || '-';
      });
    }

    input.addEventListener('blur', _commit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { input.removeEventListener('blur', _commit); cell.textContent = currentVal || '-'; }
    });

    cell.textContent = '';
    cell.appendChild(input);
    input.focus();
    input.select();
  }
 
  // ─── 생기부(개인별) ───────────────────────────────────────────
  async function _renderGibuPersonalForStudent(targetId) {
    _showContentSkeleton(6);
    try {
      var res = await _apiGet('adminGetGibuByStudent', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass
      });
      if (!res.success) { _showError(res.message); return; }
 
      var found = null;
      for (var i = 0; i < res.data.length; i++) {
        if (res.data[i].studentId === targetId) { found = res.data[i]; break; }
      }
      if (!found) {
        _clearContent('<p class="text-gray-400 text-center mt-20">학생 정보를 찾을 수 없습니다.</p>');
        return;
      }
 
      var areas = ['자율활동', '동아리활동', '진로활동', '개인별세특', '행동발달'];
      var html = '<div class="p-4">'
               + '<h2 class="text-lg font-bold text-gray-800 mb-4">'
               + found.studentId + ' ' + found.name + ' 학생 생활기록부</h2>';
      areas.forEach(function(area) {
        var content = found.areas[area] || '';
        var bytes = found.areabytes ? (found.areabytes[area] || '') : '';
        html += '<div class="mb-4">'
              + '<span class="inline-block bg-blue-100 text-blue-800 text-xs font-semibold px-2 py-0.5 rounded mb-1">' + area + '</span>'
              + (bytes !== '' ? '<span class="ml-2 text-xs text-gray-500">(' + bytes + '바이트 / ' + (_BYTE_LIMIT[area] || 1500) + '바이트)</span>' : '')
              + '<div class="bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm text-gray-700 min-h-[60px] whitespace-pre-wrap">'
              + (content || '<span class="text-gray-400 italic">학생이 제출한 내용이 없음</span>')
              + '</div></div>';
      });
      html += '</div>';
      document.getElementById('content-area').innerHTML = html;
    } catch (err) { _showError(err.message); }
  }
 
  // ─── 생기부(영역별) ───────────────────────────────────────────
  function _renderAreaButtons() {
    var areas = ['자율활동', '동아리활동', '진로활동', '개인별세특', '행동발달'];
    var ul = document.getElementById('student-list');
    ul.innerHTML = '';
    areas.forEach(function(area) {
      var btn = document.createElement('button');
      btn.className = 'area-btn w-full text-left px-4 py-3 border-b border-gray-100 text-sm font-medium text-gray-700 hover:bg-blue-50 transition-colors';
      btn.textContent = area;
      btn.addEventListener('click', function() {
        document.querySelectorAll('.area-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        _state.currentArea = area;
        _loadGibuByArea(area);
      });
      ul.appendChild(btn);
    });
  }
 
  async function _loadGibuByArea(area) {
    _showContentSkeleton(8);
    try {
      var res = await _apiGet('adminGetGibuByArea', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass,
        adminAuth:   _state.adminAuth,
        adminClass:  _state.adminClass,
        area:        area
      });
      if (res.success) _renderGibuArea(res.data, area);
      else _showError(res.message);
    } catch (err) { _showError(err.message); }
  }
 
  function _renderGibuArea(rows, area) {
    if (!rows || rows.length === 0) {
      _clearContent('<p class="text-gray-400 text-center mt-20">' + area + ' 데이터가 없습니다.</p>');
      return;
    }
    var html = '<div class="p-4">'
             + '<h2 class="text-lg font-bold text-gray-800 mb-4">'
             + '<span class="bg-blue-100 text-blue-800 text-sm px-2 py-0.5 rounded mr-2">' + area + '</span>'
             + '영역별 생기부 내용</h2>';
    rows.forEach(function(row) {
      html += '<div class="mb-4 bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">'
            + '<div class="flex items-center gap-3 bg-gray-50 px-4 py-2 border-b border-gray-200">'
            + '<span class="text-xs text-gray-500">' + row.studentClass + '반</span>'
            + '<span class="text-xs font-mono text-gray-600">' + row.studentId + '</span>'
            + '<span class="font-semibold text-gray-800">' + row.name + '</span>'
            + (row.bytes !== undefined && row.bytes !== '' ? '<span class="ml-2 text-xs text-gray-500">(' + row.bytes + '바이트 / ' + (_BYTE_LIMIT[row.area] || 1500) + '바이트)</span>' : '')
            + '</div>'
            + '<div class="p-3 text-sm text-gray-700 whitespace-pre-wrap min-h-[48px]">'
            + (row.content || '<span class="text-gray-400 italic">내용 없음</span>')
            + '</div></div>';
    });
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
  }
 
  // ─── 다운로드 ─────────────────────────────────────────────────
  function _openDownloadModal() {
    var menu = _state.currentMenu;
    if (!menu) {
      alert('먼저 상단 메뉴를 클릭하여 데이터를 조회하세요.');
      return;
    }
    var contentArea = document.getElementById('content-area');
    var hasTable = contentArea.querySelector('table');
    var hasCard  = contentArea.querySelector('.bg-white.border.border-gray-200.rounded-lg');
    var hasGibuPersonal = contentArea.querySelector('.bg-gray-50.border.border-gray-200.rounded-lg');
    if (!hasTable && !hasCard && !hasGibuPersonal) {
      alert('저장할 데이터가 없습니다. 영역을 선택하여 데이터를 먼저 조회하세요.');
      return;
    }
    // 기본 파일명 자동 설정
    var menuNames = { suneung: '수능선택', univ: '관심대학', gibu_personal: '생기부_개인별', gibu_area: '생기부_영역별' };
    var defaultName = menuNames[menu] || '생기부_데이터';
    if (menu === 'gibu_area' && _state.currentArea) defaultName += '_' + _state.currentArea;
    if (menu === 'gibu_personal' && _state.currentStudentId) defaultName += '_' + _state.currentStudentId;
    document.getElementById('download-filename').value = defaultName;
    document.getElementById('download-modal').classList.remove('hidden');
  }

  function _closeDownloadModal() {
    document.getElementById('download-modal').classList.add('hidden');
  }

  function _confirmDownload() {
    var filename = (document.getElementById('download-filename').value.trim() || '생기부_데이터') + '.xlsx';
    var wb = XLSX.utils.book_new();
    var contentArea = document.getElementById('content-area');
    var table = contentArea.querySelector('table');

    if (table) {
      // ── 테이블 형태 (수능선택, 관심대학) ──
      var ws = XLSX.utils.table_to_sheet(table);
      // 열 너비 자동 조정
      var range = XLSX.utils.decode_range(ws['!ref']);
      var colWidths = [];
      for (var C = range.s.c; C <= range.e.c; C++) {
        var maxLen = 8;
        for (var R = range.s.r; R <= range.e.r; R++) {
          var cell = ws[XLSX.utils.encode_cell({r: R, c: C})];
          if (cell && cell.v) {
            var len = String(cell.v).length;
            if (len > maxLen) maxLen = len;
          }
        }
        colWidths.push({ wch: Math.min(maxLen + 2, 40) });
      }
      ws['!cols'] = colWidths;
      XLSX.utils.book_append_sheet(wb, ws, '데이터');

    } else {
      // ── 카드 형태 (생기부 개인별 / 영역별) ──
      var rows = [];
      var menu = _state.currentMenu;

      if (menu === 'gibu_area') {
        // 영역별: 카드 = 반 / 학번 / 이름 / 바이트 / 내용
        rows.push(['반', '학번', '이름', '바이트', '내용']);
        var cards = contentArea.querySelectorAll('.mb-4.bg-white.border.border-gray-200.rounded-lg');
        cards.forEach(function(card) {
          var header = card.querySelector('.bg-gray-50');
          var spans  = header ? header.querySelectorAll('span') : [];
          var cls    = spans[0] ? spans[0].textContent.replace('반','').trim() : '';
          var sid    = spans[1] ? spans[1].textContent.trim() : '';
          var name   = spans[2] ? spans[2].textContent.trim() : '';
          var bytesTxt = spans[3] ? spans[3].textContent.replace(/[()]/g,'').trim() : '';
          var body   = card.querySelector('.p-3');
          var content = body ? body.innerText.trim() : '';
          if (content === '내용 없음') content = '';
          rows.push([cls, sid, name, bytesTxt, content]);
        });

      } else if (menu === 'gibu_personal') {
        // 개인별: 영역 / 바이트 / 내용
        rows.push(['영역', '바이트', '내용']);
        var areaBlocks = contentArea.querySelectorAll('.mb-4');
        areaBlocks.forEach(function(block) {
          var areaLabel = block.querySelector('.bg-blue-100');
          if (!areaLabel) return;
          var area = areaLabel.textContent.trim();
          var byteSpan = block.querySelector('.text-xs.text-gray-500');
          var bytesTxt = byteSpan ? byteSpan.textContent.replace(/[()]/g,'').trim() : '';
          var contentDiv = block.querySelector('.bg-gray-50.border');
          var content = contentDiv ? contentDiv.innerText.trim() : '';
          if (content === '학생이 제출한 내용이 없음') content = '';
          rows.push([area, bytesTxt, content]);
        });
      }

      var ws = XLSX.utils.aoa_to_sheet(rows);
      // 내용 열 너비 넓게
      var colWidths2 = [];
      if (rows[0]) {
        rows[0].forEach(function(_, i) {
          colWidths2.push({ wch: i === rows[0].length - 1 ? 80 : 20 });
        });
      }
      ws['!cols'] = colWidths2;
      // 내용 셀 줄바꿈 허용
      var range2 = XLSX.utils.decode_range(ws['!ref'] || 'A1');
      for (var R2 = 1; R2 <= range2.e.r; R2++) {
        var lastCol = range2.e.c;
        var cellRef = XLSX.utils.encode_cell({r: R2, c: lastCol});
        if (ws[cellRef]) {
          if (!ws[cellRef].s) ws[cellRef].s = {};
          ws[cellRef].s.alignment = { wrapText: true };
        }
      }
      XLSX.utils.book_append_sheet(wb, ws, '데이터');
    }

    XLSX.writeFile(wb, filename);
    _closeDownloadModal();
  }

  // ─── 로그아웃 ─────────────────────────────────────────────────
  function _logout() {
    document.getElementById('logout-modal').classList.remove('hidden');
  }

  function _confirmLogout() {
    sessionStorage.removeItem('adminInfo');
    location.href = 'index.html';
  }

  function _cancelLogout() {
    document.getElementById('logout-modal').classList.add('hidden');
  }
 
  // ─── 공개 API ─────────────────────────────────────────────────
  return {
    init:                _init,
    onMenuClick:         _onMenuClick,
    logout:              _logout,
    confirmLogout:       _confirmLogout,
    cancelLogout:        _cancelLogout,
    openDownloadModal:   _openDownloadModal,
    closeDownloadModal:  _closeDownloadModal,
    confirmDownload:     _confirmDownload,
    editUnivRank:        _editUnivRank
  };
 
})();
</script>
