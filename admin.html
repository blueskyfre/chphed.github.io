<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── 글로벌 폰트 / 색감 ── */
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #0f172a;
      background: #f5f7fb;
      letter-spacing: -0.01em;
    }

    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 0.5rem;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* ── 사이드바 학생/영역 항목 ── */
    .student-item {
      border-radius: 10px;
      margin: 2px 8px;
      padding: 10px 12px;
      border: 1px solid transparent;
      transition: all 0.15s ease;
    }
    .student-item:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }
    .student-item.active {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border-color: #4338ca;
      box-shadow: 0 4px 12px -2px rgba(79, 70, 229, 0.35);
    }
    .student-item.active span { color: #fff !important; }
    .student-item.active .text-gray-400 { color: #c7d2fe !important; }

    .area-btn {
      border-radius: 10px;
      margin: 4px 8px;
      padding: 12px 14px !important;
      border: 1px solid #e2e8f0 !important;
      transition: all 0.15s ease;
    }
    .area-btn:hover {
      background: #eef2ff !important;
      border-color: #c7d2fe !important;
    }
    .area-btn.active {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%) !important;
      color: #fff !important;
      border-color: #4338ca !important;
      box-shadow: 0 4px 12px -2px rgba(79, 70, 229, 0.35);
    }

    /* ── 헤더 공통 ── */
    .site-header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
    }
    .site-header-inner {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 28px;
    }

    /* ── 인사 영역 ── */
    .header-greeting {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .header-auth {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #64748b;
      font-weight: 500;
    }

    /* ── 메뉴 탭 버튼 ── */
    .menu-btn {
      position: relative;
      padding: 0 10px;
      height: 60px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #475569;
      background: transparent;
      border: none;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .menu-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 8px;
      right: 8px;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #4f46e5);
      border-radius: 3px 3px 0 0;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.25s ease;
    }
    .menu-btn:hover { color: #4f46e5; }
    .menu-btn:hover::after { transform: scaleX(1); }
    .menu-btn.active {
      color: #4f46e5;
      font-weight: 700;
    }
    .menu-btn.active::after { transform: scaleX(1); }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 60px;
    }

    /* ── 액션 버튼 ── */
    .header-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 0.83rem;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.18s ease;
      border: 1px solid transparent;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .btn-download {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
      border-color: #059669;
      box-shadow: 0 2px 6px -1px rgba(16, 185, 129, 0.3);
    }
    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px -2px rgba(16, 185, 129, 0.4);
    }
    .btn-logout {
      background: #fff;
      color: #64748b;
      border-color: #e2e8f0;
    }
    .btn-logout:hover {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca;
    }
    .header-divider {
      width: 1px;
      height: 22px;
      background: #e2e8f0;
      margin: 0 4px;
    }

    /* ── 드롭다운 select ── */
    #class-dropdown {
      font-size: 0.82rem;
      font-weight: 600;
      color: #1e293b;
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      transition: all 0.18s;
    }
    #class-dropdown:hover { background: #e2e8f0; }
    #class-dropdown:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    /* ── 사이드바 ── */
    .app-sidebar {
      background: #ffffff;
      border-right: 1px solid #e2e8f0;
    }
    .sidebar-header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      border-bottom: 1px solid #e2e8f0;
    }
    .sidebar-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #4f46e5;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── 데이터 테이블 (수능선택 등) ── */
    .modern-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.875rem;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05), 0 1px 2px rgba(15, 23, 42, 0.03);
    }
    .modern-table thead tr {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
    }
    .modern-table thead th {
      color: #fff;
      font-weight: 600;
      padding: 12px 14px;
      text-align: center;
      font-size: 0.82rem;
      letter-spacing: -0.01em;
      border: none;
      white-space: nowrap;
    }
    .modern-table tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid #f1f5f9;
      text-align: center;
      color: #334155;
      white-space: nowrap;
    }
    .modern-table tbody tr:nth-child(even) { background: #fafbff; }
    .modern-table tbody tr:hover { background: #fef9c3; }
    .modern-table tbody tr:last-child td { border-bottom: none; }

    /* ── 관심대학 카드 ── */
    .univ-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .univ-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #10b981, #059669);
    }
    .univ-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -6px rgba(15, 23, 42, 0.12);
      border-color: #c7d2fe;
    }
    .univ-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #e2e8f0;
    }
    .univ-rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #fff;
      font-weight: 800;
      font-size: 0.95rem;
      box-shadow: 0 2px 6px -1px rgba(245, 158, 11, 0.4);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .univ-rank-badge:hover { transform: scale(1.05); }
    .univ-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
    }
    .univ-dept {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 2px;
    }
    .univ-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .tag-type { background: #eef2ff; color: #4338ca; }
    .tag-kind { background: #ecfdf5; color: #047857; }
    .tag-suneung { background: #fef3c7; color: #92400e; }
    .tag-judge { background: #fce7f3; color: #be185d; }
    .univ-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px 16px;
      margin-top: 6px;
    }
    .univ-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 0.82rem;
    }
    .univ-field-label {
      color: #94a3b8;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .univ-field-value {
      color: #1e293b;
      font-weight: 500;
      word-break: keep-all;
    }
    .univ-section-divider {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding-top: 8px;
      border-top: 1px dashed #e2e8f0;
      font-size: 0.72rem;
      font-weight: 700;
      color: #6366f1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .univ-memo {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      border-radius: 6px;
      font-size: 0.82rem;
      color: #78350f;
      white-space: pre-wrap;
    }

    /* ── 학생 정보 카드 (관심대학 상단) ── */
    .student-info-banner {
      background: linear-gradient(135deg, #eef2ff 0%, #ddd6fe 100%);
      border: 1px solid #c7d2fe;
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 18px;
      box-shadow: 0 1px 3px rgba(79, 70, 229, 0.08);
    }
    .student-info-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: #312e81;
      letter-spacing: -0.02em;
    }
    .student-info-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .info-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4338ca;
    }
    .info-pill-label {
      color: #6366f1;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .info-pill-value { color: #1e1b4b; }

    /* ── "전체 보기" 사이드바 항목 ── */
    .student-item-all {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      border: 1px solid #bae6fd !important;
      font-weight: 700;
      color: #075985;
    }
    .student-item-all.active {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%) !important;
      border-color: #0369a1 !important;
      box-shadow: 0 4px 12px -2px rgba(14, 165, 233, 0.35);
    }
    .student-item-all.active span { color: #fff !important; }

    /* ── 빈 상태 메시지 ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 14px;
    }
    .empty-state-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #eef2ff 0%, #ddd6fe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6366f1;
      box-shadow: 0 4px 12px -2px rgba(99, 102, 241, 0.15);
    }
    .empty-state-text {
      font-size: 0.95rem;
      font-weight: 600;
      color: #475569;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 20px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
 
<script>
// ============================================================
// Admin 네임스페이스 (IIFE)
// ============================================================
var Admin = (function() {
 
  // ─── 설정 ────────────────────────────────────────────────────
  var _WEB_APP_URL = Config.DEPLOY;

// ─── 글자수 제한 표현 변수 ───────────────────────────────────────────────
  var _BYTE_LIMIT = {
  '자율활동':   1500,
  '동아리활동': 1500,
  '진로활동':   2100,
  '개인별세특': 1500,
  '행동발달':   1500
};

 
  // ─── 상태 변수 ───────────────────────────────────────────────
  var _state = {
    adminId:      '',
    adminName:    '',
    adminAuth:    '',
    adminClass:   '',
    allClasses:   [],
    currentClass: '',
    currentMenu:  '',
    currentArea:  '',
    currentStudentId: '',
    studentList:  [],
    suneungData:  null   // 수능선택 원본 데이터 캐시 (개별/전체 전환용)
  };
 
  // ─── API 호출 (GET) ──────────────────────────────────────────
  async function _apiGet(action, params) {
    params = params || {};
    var url = new URL(_WEB_APP_URL);
    url.searchParams.set('action', action);
    for (var key in params) {
      if (params.hasOwnProperty(key)) url.searchParams.set(key, params[key]);
    }
    var res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error('서버 응답 오류: ' + res.status);
    return await res.json();
  }
 
  // ─── 초기화 ──────────────────────────────────────────────────
  function _init() {
    var raw = sessionStorage.getItem('adminInfo');
    if (!raw) {
      alert('로그인 정보가 없습니다. 로그인 페이지로 이동합니다.');
      location.href = 'index.html';
      return;
    }
    var info = JSON.parse(raw);
    _state.adminId    = info.adminId    || '';
    _state.adminName  = info.adminName  || '';
    _state.adminAuth  = info.adminAuth  || '';
    _state.adminClass = info.adminClass || '';
    _state.allClasses = info.allClasses || [];
    _state.currentClass = (_state.adminAuth === '관리자') ? '전체' : _state.adminClass;
 
    _renderHeader();
    _loadStudentList();
  }
 
  // ─── 헤더 렌더링 ─────────────────────────────────────────────
  function _renderHeader() {
    document.getElementById('admin-greeting').textContent =
      _state.adminName + ' 선생님 접속했습니다.';
 
    if (_state.adminAuth === '관리자') {
      document.getElementById('auth-label').textContent = '권한 : ';
      var wrapper = document.getElementById('class-select-wrapper');
      wrapper.innerHTML = '';
      var select = document.createElement('select');
      select.id = 'class-dropdown';
      var optAll = document.createElement('option');
      optAll.value = '전체'; optAll.textContent = '전체';
      select.appendChild(optAll);
      _state.allClasses.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c; opt.textContent = c + '반';
        select.appendChild(opt);
      });
      select.value = _state.currentClass;
      select.addEventListener('change', function() {
        _state.currentClass = this.value;
        _loadStudentList();
        _refreshContent();
      });
      wrapper.appendChild(select);
    } else {
      document.getElementById('auth-label').textContent = '권한 : ';
      document.getElementById('class-select-wrapper').innerHTML =
        '<span style="font-size:0.78rem;font-weight:600;color:#475569;">' + _state.adminClass + '반</span>';
    }
  }
 
  // ─── 학생 명단 로드 ──────────────────────────────────────────
  async function _loadStudentList() {
    _showSidebarSkeleton();
    try {
      var res = await _apiGet('adminGetStudentList', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass
      });
      if (res.success) {
        _state.studentList = res.data;
        if (_state.currentMenu === 'gibu_area') {
          _renderAreaButtons();
        } else {
          _renderStudentList(res.data);
        }
      } else {
        document.getElementById('student-list').innerHTML =
          '<p class="text-red-400 text-xs p-3">' + res.message + '</p>';
      }
    } catch (err) {
      document.getElementById('student-list').innerHTML =
        '<p class="text-red-400 text-xs p-3">오류: ' + err.message + '</p>';
    }
  }
 
  function _showSidebarSkeleton() {
    var html = '';
    for (var i = 0; i < 8; i++) {
      html += '<div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">'
            + '<div class="skeleton-box w-10 h-3"></div>'
            + '<div class="skeleton-box flex-1 h-3"></div>'
            + '</div>';
    }
    document.getElementById('student-list').innerHTML = html;
  }
 
  function _renderStudentList(students) {
    var ul = document.getElementById('student-list');
    if (!students || students.length === 0) {
      ul.innerHTML = '<p class="text-gray-400 text-sm p-3 text-center">학생이 없습니다.</p>';
      return;
    }
    ul.innerHTML = '';

    // ── 수능선택 메뉴일 때 최상단에 "전체 학생" 항목 노출 ──
    if (_state.currentMenu === 'suneung') {
      var liAll = document.createElement('div');
      liAll.className = 'student-item student-item-all flex items-center gap-2 cursor-pointer';
      liAll.dataset.id = '__ALL__';
      liAll.innerHTML =
        '<span class="flex items-center justify-center w-7 h-7 rounded-lg bg-sky-100 text-sky-600 shrink-0">'
        + '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-5.13a4 4 0 11-8 0 4 4 0 018 0zm6 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>'
        + '</span>'
        + '<span class="text-sm font-bold truncate">전체 학생</span>';
      liAll.addEventListener('click', function() {
        document.querySelectorAll('.student-item').forEach(function(el) { el.classList.remove('active'); });
        liAll.classList.add('active');
        _state.currentStudentId = '';
        _renderSuneung(_state.suneungData, null);
      });
      ul.appendChild(liAll);
      // 기본은 "전체 학생" 활성 상태
      if (!_state.currentStudentId) liAll.classList.add('active');
    }

    students.forEach(function(s) {
      var li = document.createElement('div');
      li.className = 'student-item flex items-center gap-2 cursor-pointer';
      li.dataset.id = s.studentId;
      li.innerHTML =
        '<span class="text-xs text-gray-400 w-12 shrink-0 font-mono">' + s.studentId + '</span>' +
        '<span class="text-sm font-semibold text-gray-800 truncate">' + s.name + '</span>';
      li.addEventListener('click', function() {
        document.querySelectorAll('.student-item').forEach(function(el) { el.classList.remove('active'); });
        li.classList.add('active');
        _state.currentStudentId = s.studentId;
        if (_state.currentMenu === 'gibu_personal') {
          _renderGibuPersonalForStudent(s.studentId);
        } else if (_state.currentMenu === 'univ') {
          _renderUnivForStudent(s);
        } else if (_state.currentMenu === 'suneung') {
          _renderSuneung(_state.suneungData, s.studentId);
        }
      });
      ul.appendChild(li);
    });
  }
 
  // ─── 메뉴 클릭 ───────────────────────────────────────────────
  function _onMenuClick(menu) {
    _state.currentMenu = menu;
    _state.currentStudentId = '';

  // ─── 관심대학 순위 편집 ────────────────────────────────────
  function _editUnivRank(cell) {
    var currentVal = cell.dataset.current || '';
    var input = document.createElement('input');
    input.type = 'text';
    input.value = currentVal;
    input.className = 'w-12 text-center border border-emerald-400 rounded px-1 py-0.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400';
    input.style.width = '50px';

    function _commit() {
      var newVal = input.value.trim();
      if (newVal === currentVal) { cell.textContent = currentVal || '-'; return; }
      var studentId = cell.dataset.studentid;
      var rowIndex  = cell.dataset.rowindex;
      cell.textContent = '저장 중...';
      _apiGet('adminSaveUnivRank', {
        adminId:   _state.adminId,
        studentId: studentId,
        rowIndex:  rowIndex,
        newRank:   newVal
      }).then(function(res) {
        if (res.success) {
          cell.textContent = newVal || '-';
          cell.dataset.current = newVal;
        } else {
          alert('저장 실패: ' + res.message);
          cell.textContent = currentVal || '-';
        }
      }).catch(function(err) {
        alert('오류: ' + err.message);
        cell.textContent = currentVal || '-';
      });
    }

    input.addEventListener('blur', _commit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { input.removeEventListener('blur', _commit); cell.textContent = currentVal || '-'; }
    });

    cell.textContent = '';
    cell.appendChild(input);
    input.focus();
    input.select();
  }
 
  // ─── 생기부 편집/복사 헬퍼 ───────────────────────────────────────
  function _calcBytes(str) {
    if (!str) return 0;
    try { return new TextEncoder().encode(String(str)).length; }
    catch (e) {
      var s = String(str), b = 0;
      for (var i = 0; i < s.length; i++) {
        var c = s.charCodeAt(i);
        b += c < 0x80 ? 1 : (c < 0x800 ? 2 : 3);
      }
      return b;
    }
  }

  function _escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function _gibuFallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  function _copyGibuContent(areaKey) {
    var srcEl = document.getElementById('gibu-original-' + areaKey);
    if (!srcEl) return;
    var text = srcEl.getAttribute('data-raw') || '';
    var fb = document.getElementById('copy-feedback-' + areaKey);
    function _showFeedback() {
      if (!fb) return;
      fb.textContent = '복사가 되었습니다.';
      fb.style.opacity = '1';
      clearTimeout(fb._hideTimer);
      fb._hideTimer = setTimeout(function() { fb.style.opacity = '0'; }, 2000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(_showFeedback, function() {
        _gibuFallbackCopy(text); _showFeedback();
      });
    } else {
      _gibuFallbackCopy(text); _showFeedback();
    }
  }

  function _updateEditBytes(areaKey, limit) {
    var ta = document.getElementById('gibu-edit-' + areaKey);
    var label = document.getElementById('gibu-edit-bytes-' + areaKey);
    if (!ta || !label) return;
    var bytes = _calcBytes(ta.value);
    label.textContent = '(' + bytes + '바이트 / ' + limit + '바이트)';
    label.style.color = bytes > limit ? '#dc2626' : '#6b7280';
  }

  async function _saveGibuEdit(areaKey, studentId, area, limit) {
    var ta = document.getElementById('gibu-edit-' + areaKey);
    var btn = document.getElementById('gibu-save-btn-' + areaKey);
    if (!ta) return;
    var text = ta.value || '';
    var bytes = _calcBytes(text);
    if (bytes > limit) {
      if (!confirm('글자수(' + bytes + '바이트)가 제한(' + limit + '바이트)을 초과했습니다. 그래도 저장하시겠습니까?')) return;
    }
    if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
    try {
      var res = await _apiGet('adminSaveTeacherGibu', {
        adminId:       _state.adminId,
        adminAuth:     _state.adminAuth,
        adminClass:    _state.adminClass,
        studentId:     studentId,
        area:          area,
        editedContent: text,
        editedBytes:   bytes
      });
      if (res && res.success) {
        _showSaveSuccess('변경 내용이 정상적으로 저장되었습니다.');
      } else {
        alert('저장 실패: ' + (res && res.message ? res.message : '알 수 없는 오류'));
      }
    } catch (err) {
      alert('오류: ' + err.message);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '저장'; }
    }
  }

  // ─── 생기부(개인별) ───────────────────────────────────────────
  async function _renderGibuPersonalForStudent(targetId) {
    _showContentSkeleton(6);
    try {
      var res = await _apiGet('adminGetGibuByStudent', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass
      });
      if (!res.success) { _showError(res.message); return; }
 
      var found = null;
      for (var i = 0; i < res.data.length; i++) {
        if (res.data[i].studentId === targetId) { found = res.data[i]; break; }
      }
      if (!found) {
        _clearContent('<p class="text-gray-400 text-center mt-20">학생 정보를 찾을 수 없습니다.</p>');
        return;
      }
 
      var areas = ['자율활동', '동아리활동', '진로활동', '개인별세특', '행동발달'];
      var html = '<div class="p-4">'
               + '<h2 class="text-lg font-bold text-gray-800 mb-4">'
               + found.studentId + ' ' + found.name + ' 학생 생활기록부</h2>';
      areas.forEach(function(area) {
        var content = found.areas[area] || '';
        var bytes = found.areabytes ? (found.areabytes[area] || '') : '';
        var editedContent = (found.areasEdited && found.areasEdited[area]) || '';
        var editedBytes = (found.areaEditedBytes && found.areaEditedBytes[area] !== undefined && found.areaEditedBytes[area] !== '')
                          ? found.areaEditedBytes[area]
                          : _calcBytes(editedContent);
        var limit = _BYTE_LIMIT[area] || 1500;
        var areaKey = 'p_' + encodeURIComponent(area).replace(/%/g, '_');
        var sidAttr = _escapeHtml(found.studentId);
        var areaAttr = _escapeHtml(area);
        html += '<div class="mb-4">'
              + '<div class="flex items-center flex-wrap gap-2 mb-1">'
              +   '<span class="inline-block bg-blue-100 text-blue-800 text-xs font-semibold px-2 py-0.5 rounded">' + area + '</span>'
              +   (bytes !== '' ? '<span class="text-xs text-gray-500">(' + bytes + '바이트 / ' + limit + '바이트)</span>' : '')
              +   '<button type="button" class="text-xs px-2 py-0.5 border border-gray-300 rounded bg-white text-gray-700 hover:bg-gray-100" onclick="Admin.copyGibuContent(\'' + areaKey + '\')">복사</button>'
              +   '<span id="copy-feedback-' + areaKey + '" class="text-xs text-green-600" style="opacity:0;transition:opacity 0.3s;"></span>'
              + '</div>'
              + '<div class="bg-blue-50 border border-blue-100 rounded-lg p-2 space-y-2">'
              +   '<div id="gibu-original-' + areaKey + '" class="bg-gray-50 border border-gray-200 rounded p-3 text-sm text-gray-700 min-h-[60px] whitespace-pre-wrap" data-raw="' + _escapeHtml(content) + '">'
              +     (content ? _escapeHtml(content) : '<span class="text-gray-400 italic">학생이 제출한 내용이 없음</span>')
              +   '</div>'
              +   '<div class="bg-white border border-gray-200 rounded p-2">'
              +     '<div class="flex items-center gap-2 mb-1">'
              +       '<span class="text-xs font-semibold text-gray-700">내용 편집창</span>'
              +       '<span id="gibu-edit-bytes-' + areaKey + '" class="text-xs text-gray-500">(' + editedBytes + '바이트 / ' + limit + '바이트)</span>'
              +       '<button type="button" id="gibu-save-btn-' + areaKey + '" class="ml-auto text-xs px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700" onclick="Admin.saveGibuEdit(\'' + areaKey + '\', \'' + sidAttr + '\', \'' + areaAttr + '\', ' + limit + ')">저장</button>'
              +     '</div>'
              +     '<textarea id="gibu-edit-' + areaKey + '" class="w-full bg-white border border-gray-200 rounded p-3 text-sm text-gray-700 min-h-[80px] whitespace-pre-wrap" oninput="Admin.updateEditBytes(\'' + areaKey + '\', ' + limit + ')">' + _escapeHtml(editedContent) + '</textarea>'
              +   '</div>'
              + '</div>'
              + '</div>';
      });
      html += '</div>';
      document.getElementById('content-area').innerHTML = html;
    } catch (err) { _showError(err.message); }
  }
 
  // ─── 생기부(영역별) ───────────────────────────────────────────
  function _renderAreaButtons() {
    var areas = ['자율활동', '동아리활동', '진로활동', '개인별세특', '행동발달'];
    var ul = document.getElementById('student-list');
    ul.innerHTML = '';
    areas.forEach(function(area) {
      var btn = document.createElement('button');
      btn.className = 'area-btn w-full text-left px-4 py-3 border-b border-gray-100 text-sm font-medium text-gray-700 hover:bg-blue-50 transition-colors';
      btn.textContent = area;
      btn.addEventListener('click', function() {
        document.querySelectorAll('.area-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        _state.currentArea = area;
        _loadGibuByArea(area);
      });
      ul.appendChild(btn);
    });
  }
 
  async function _loadGibuByArea(area) {
    _showContentSkeleton(8);
    try {
      var res = await _apiGet('adminGetGibuByArea', {
        adminId:     _state.adminId,
        filterClass: _state.currentClass,
        adminAuth:   _state.adminAuth,
        adminClass:  _state.adminClass,
        area:        area
      });
      if (res.success) _renderGibuArea(res.data, area);
      else _showError(res.message);
    } catch (err) { _showError(err.message); }
  }
 
  function _renderGibuArea(rows, area) {
    if (!rows || rows.length === 0) {
      _clearContent('<p class="text-gray-400 text-center mt-20">' + area + ' 데이터가 없습니다.</p>');
      return;
    }
    var html = '<div class="p-4">'
             + '<h2 class="text-lg font-bold text-gray-800 mb-4">'
             + '<span class="bg-blue-100 text-blue-800 text-sm px-2 py-0.5 rounded mr-2">' + area + '</span>'
             + '영역별 생기부 내용</h2>';
    rows.forEach(function(row, _idx) {
      var limit = _BYTE_LIMIT[row.area] || 1500;
      var areaKey = 'a_' + _idx;
      var editedContent = row.editedContent || '';
      var editedBytes = (row.editedBytes !== undefined && row.editedBytes !== '' && row.editedBytes !== null)
                        ? row.editedBytes
                        : _calcBytes(editedContent);
      var sidAttr = _escapeHtml(row.studentId);
      var areaAttr = _escapeHtml(row.area || area);
      html += '<div class="mb-4 bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">'
            + '<div class="flex items-center flex-wrap gap-2 bg-gray-50 px-4 py-2 border-b border-gray-200">'
            +   '<span class="text-xs text-gray-500">' + row.studentClass + '반</span>'
            +   '<span class="text-xs font-mono text-gray-600">' + row.studentId + '</span>'
            +   '<span class="font-semibold text-gray-800">' + row.name + '</span>'
            +   (row.bytes !== undefined && row.bytes !== '' ? '<span class="text-xs text-gray-500">(' + row.bytes + '바이트 / ' + limit + '바이트)</span>' : '')
            +   '<button type="button" class="text-xs px-2 py-0.5 border border-gray-300 rounded bg-white text-gray-700 hover:bg-gray-100" onclick="Admin.copyGibuContent(\'' + areaKey + '\')">복사</button>'
            +   '<span id="copy-feedback-' + areaKey + '" class="text-xs text-green-600" style="opacity:0;transition:opacity 0.3s;"></span>'
            + '</div>'
            + '<div class="bg-blue-50 border-t border-blue-100 p-2 space-y-2">'
            +   '<div id="gibu-original-' + areaKey + '" class="bg-white border border-gray-200 rounded p-3 text-sm text-gray-700 whitespace-pre-wrap min-h-[48px]" data-raw="' + _escapeHtml(row.content || '') + '">'
            +     (row.content ? _escapeHtml(row.content) : '<span class="text-gray-400 italic">내용 없음</span>')
            +   '</div>'
            +   '<div class="bg-white border border-gray-200 rounded p-2">'
            +     '<div class="flex items-center gap-2 mb-1">'
            +       '<span class="text-xs font-semibold text-gray-700">내용 편집창</span>'
            +       '<span id="gibu-edit-bytes-' + areaKey + '" class="text-xs text-gray-500">(' + editedBytes + '바이트 / ' + limit + '바이트)</span>'
            +       '<button type="button" id="gibu-save-btn-' + areaKey + '" class="ml-auto text-xs px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700" onclick="Admin.saveGibuEdit(\'' + areaKey + '\', \'' + sidAttr + '\', \'' + areaAttr + '\', ' + limit + ')">저장</button>'
            +     '</div>'
            +     '<textarea id="gibu-edit-' + areaKey + '" class="w-full bg-white border border-gray-200 rounded p-3 text-sm text-gray-700 min-h-[80px] whitespace-pre-wrap" oninput="Admin.updateEditBytes(\'' + areaKey + '\', ' + limit + ')">' + _escapeHtml(editedContent) + '</textarea>'
            +   '</div>'
            + '</div>'
            + '</div>';
    });
    html += '</div>';
    document.getElementById('content-area').innerHTML = html;
  }
 
  // ─── 다운로드 ─────────────────────────────────────────────────
  function _openDownloadModal() {
    var menu = _state.currentMenu;
    if (!menu) {
      alert('먼저 상단 메뉴를 클릭하여 데이터를 조회하세요.');
      return;
    }
    var contentArea = document.getElementById('content-area');
    var hasTable = contentArea.querySelector('table');
    var hasCard  = contentArea.querySelector('.bg-white.border.border-gray-200.rounded-lg');
    var hasGibuPersonal = contentArea.querySelector('.bg-gray-50.border.border-gray-200.rounded-lg');
    var hasUnivCard = contentArea.querySelector('.univ-card');
    if (!hasTable && !hasCard && !hasGibuPersonal && !hasUnivCard) {
      alert('저장할 데이터가 없습니다. 영역을 선택하여 데이터를 먼저 조회하세요.');
      return;
    }
    // 기본 파일명 자동 설정
    var menuNames = { suneung: '수능선택', univ: '관심대학', gibu_personal: '생기부_개인별', gibu_area: '생기부_영역별' };
    var defaultName = menuNames[menu] || '생기부_데이터';
    if (menu === 'gibu_area' && _state.currentArea) defaultName += '_' + _state.currentArea;
    if (menu === 'gibu_personal' && _state.currentStudentId) defaultName += '_' + _state.currentStudentId;
    document.getElementById('download-filename').value = defaultName;
    document.getElementById('download-modal').classList.remove('hidden');
  }

  function _closeDownloadModal() {
    document.getElementById('download-modal').classList.add('hidden');
  }

  // ─── 저장 성공 모달 ─────────────────────────────────────────
  var _saveSuccessTimer = null;
  function _showSaveSuccess(msg) {
    var modal = document.getElementById('save-success-modal');
    var card  = document.getElementById('save-success-card');
    var msgEl = document.getElementById('save-success-msg');
    if (!modal || !card) return;
    if (msgEl && msg) msgEl.textContent = msg;
    modal.classList.remove('hidden');
    // 진입 애니메이션
    requestAnimationFrame(function() {
      card.classList.remove('scale-95', 'opacity-0');
      card.classList.add('scale-100', 'opacity-100');
    });
    // 1.4초 후 자동 닫힘
    if (_saveSuccessTimer) clearTimeout(_saveSuccessTimer);
    _saveSuccessTimer = setTimeout(_closeSaveSuccess, 1400);
  }

  function _closeSaveSuccess() {
    var modal = document.getElementById('save-success-modal');
    var card  = document.getElementById('save-success-card');
    if (!modal || !card) return;
    if (_saveSuccessTimer) { clearTimeout(_saveSuccessTimer); _saveSuccessTimer = null; }
    card.classList.remove('scale-100', 'opacity-100');
    card.classList.add('scale-95', 'opacity-0');
    setTimeout(function() { modal.classList.add('hidden'); }, 180);
  }

  function _confirmDownload() {
    var filename = (document.getElementById('download-filename').value.trim() || '생기부_데이터') + '.xlsx';
    var wb = XLSX.utils.book_new();
    var contentArea = document.getElementById('content-area');
    var table = contentArea.querySelector('table');

    if (table) {
      // ── 테이블 형태 (수능선택, 관심대학) ──
      var ws = XLSX.utils.table_to_sheet(table);
      // 열 너비 자동 조정
      var range = XLSX.utils.decode_range(ws['!ref']);
      var colWidths = [];
      for (var C = range.s.c; C <= range.e.c; C++) {
        var maxLen = 8;
        for (var R = range.s.r; R <= range.e.r; R++) {
          var cell = ws[XLSX.utils.encode_cell({r: R, c: C})];
          if (cell && cell.v) {
            var len = String(cell.v).length;
            if (len > maxLen) maxLen = len;
          }
        }
        colWidths.push({ wch: Math.min(maxLen + 2, 40) });
      }
      ws['!cols'] = colWidths;
      XLSX.utils.book_append_sheet(wb, ws, '데이터');

    } else {
      // ── 카드 형태 (관심대학 / 생기부 개인별 / 영역별) ──
      var rows = [];
      var menu = _state.currentMenu;

      if (menu === 'univ') {
        // 관심대학 카드: 모든 필드를 컬럼으로 추출
        var univHeaders = ['순위','대학명','전형유형','전형종류','지원학과','모집정원','수능최저','선발유형','면접유무','면접지역','면접시작일','면접종료일','실기유무','실기지역','실기시작일','실기종료일','지원성향판단','비고'];
        rows.push(univHeaders);
        var cards = contentArea.querySelectorAll('.univ-card');
        cards.forEach(function(card) {
          var rank = (card.querySelector('.univ-rank-badge') || {}).textContent || '';
          var name = (card.querySelector('.univ-name') || {}).textContent || '';
          var dept = (card.querySelector('.univ-dept') || {}).textContent || '';
          // 태그에서 전형유형/종류/수능최저/지원성향판단 추출
          var tagType = (card.querySelector('.tag-type') || {}).textContent || '';
          var tagKind = (card.querySelector('.tag-kind') || {}).textContent || '';
          var tagSuneung = ((card.querySelector('.tag-suneung') || {}).textContent || '').replace('수능최저:','').trim();
          var tagJudge = (card.querySelector('.tag-judge') || {}).textContent || '';
          // 필드값들을 라벨로 매핑
          var fieldMap = {};
          card.querySelectorAll('.univ-field').forEach(function(f) {
            var lbl = (f.querySelector('.univ-field-label') || {}).textContent || '';
            var val = (f.querySelector('.univ-field-value') || {}).textContent || '';
            fieldMap[lbl.trim()] = val.trim();
          });
          var memoEl = card.querySelector('.univ-memo');
          var memo = memoEl ? memoEl.textContent.replace(/^💬\s*/, '').trim() : '';
          rows.push([
            rank.trim(), name.trim(), tagType.trim(), tagKind.trim(), dept.trim(),
            fieldMap['모집정원'] || '', tagSuneung, fieldMap['선발유형'] || '',
            fieldMap['면접유무'] || '', fieldMap['면접지역'] || '', fieldMap['면접시작일'] || '', fieldMap['면접종료일'] || '',
            fieldMap['실기유무'] || '', fieldMap['실기지역'] || '', fieldMap['실기시작일'] || '', fieldMap['실기종료일'] || '',
            tagJudge.trim(), memo
          ]);
        });
      } else if (menu === 'gibu_area') {
        // 영역별: 카드 = 반 / 학번 / 이름 / 바이트 / 내용
        rows.push(['반', '학번', '이름', '바이트', '내용']);
        var cards = contentArea.querySelectorAll('.mb-4.bg-white.border.border-gray-200.rounded-lg');
        cards.forEach(function(card) {
          var header = card.querySelector('.bg-gray-50');
          var spans  = header ? header.querySelectorAll('span') : [];
          var cls    = spans[0] ? spans[0].textContent.replace('반','').trim() : '';
          var sid    = spans[1] ? spans[1].textContent.trim() : '';
          var name   = spans[2] ? spans[2].textContent.trim() : '';
          var bytesTxt = spans[3] ? spans[3].textContent.replace(/[()]/g,'').trim() : '';
          var body   = card.querySelector('.p-3');
          var content = body ? body.innerText.trim() : '';
          if (content === '내용 없음') content = '';
          rows.push([cls, sid, name, bytesTxt, content]);
        });

      } else if (menu === 'gibu_personal') {
        // 개인별: 영역 / 바이트 / 내용
        rows.push(['영역', '바이트', '내용']);
        var areaBlocks = contentArea.querySelectorAll('.mb-4');
        areaBlocks.forEach(function(block) {
          var areaLabel = block.querySelector('.bg-blue-100');
          if (!areaLabel) return;
          var area = areaLabel.textContent.trim();
          var byteSpan = block.querySelector('.text-xs.text-gray-500');
          var bytesTxt = byteSpan ? byteSpan.textContent.replace(/[()]/g,'').trim() : '';
          var contentDiv = block.querySelector('.bg-gray-50.border');
          var content = contentDiv ? contentDiv.innerText.trim() : '';
          if (content === '학생이 제출한 내용이 없음') content = '';
          rows.push([area, bytesTxt, content]);
        });
      }

      var ws = XLSX.utils.aoa_to_sheet(rows);
      // 내용 열 너비 넓게
      var colWidths2 = [];
      if (rows[0]) {
        rows[0].forEach(function(_, i) {
          colWidths2.push({ wch: i === rows[0].length - 1 ? 80 : 20 });
        });
      }
      ws['!cols'] = colWidths2;
      // 내용 셀 줄바꿈 허용
      var range2 = XLSX.utils.decode_range(ws['!ref'] || 'A1');
      for (var R2 = 1; R2 <= range2.e.r; R2++) {
        var lastCol = range2.e.c;
        var cellRef = XLSX.utils.encode_cell({r: R2, c: lastCol});
        if (ws[cellRef]) {
          if (!ws[cellRef].s) ws[cellRef].s = {};
          ws[cellRef].s.alignment = { wrapText: true };
        }
      }
      XLSX.utils.book_append_sheet(wb, ws, '데이터');
    }

    XLSX.writeFile(wb, filename);
    _closeDownloadModal();
  }

  // ─── 로그아웃 ─────────────────────────────────────────────────
  function _logout() {
    document.getElementById('logout-modal').classList.remove('hidden');
  }

  function _confirmLogout() {
    sessionStorage.removeItem('adminInfo');
    location.href = 'index.html';
  }

  function _cancelLogout() {
    document.getElementById('logout-modal').classList.add('hidden');
  }
 
  // ─── 공개 API ─────────────────────────────────────────────────
  return {
    init:                _init,
    onMenuClick:         _onMenuClick,
    logout:              _logout,
    confirmLogout:       _confirmLogout,
    cancelLogout:        _cancelLogout,
    openDownloadModal:   _openDownloadModal,
    closeDownloadModal:  _closeDownloadModal,
    confirmDownload:     _confirmDownload,
    closeSaveSuccess:    _closeSaveSuccess,
    editUnivRank:        _editUnivRank,
    copyGibuContent:     _copyGibuContent,
    updateEditBytes:     _updateEditBytes,
    saveGibuEdit:        _saveGibuEdit
  };
 
})();
</script>

      <button class="header-action-btn btn-download" onclick="Admin.openDownloadModal()">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        다운로드
      </button>
      <div class="header-divider"></div>
      <button class="header-action-btn btn-logout" onclick="Admin.logout()">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        로그아웃
      </button>
    </div>
  </div>
</header>
 
<!-- 본문 -->
<div class="flex" style="height: calc(100vh - 70px);">
 
  <!-- 좌측 사이드바 -->
  <aside class="app-sidebar w-44 sm:w-52 md:w-60 shrink-0 flex flex-col overflow-hidden">
    <div class="sidebar-header">
      <span class="sidebar-title" id="sidebar-title">학생 명단</span>
    </div>
    <div id="student-list" class="flex-1 overflow-y-auto">
      <div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">
        <div class="skeleton-box w-10 h-3"></div>
        <div class="skeleton-box flex-1 h-3"></div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">
        <div class="skeleton-box w-10 h-3"></div>
        <div class="skeleton-box flex-1 h-3"></div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 border-b border-gray-100">
        <div class="skeleton-box w-10 h-3"></div>
        <div class="skeleton-box flex-1 h-3"></div>
      </div>
    </div>
  </aside>
 
  <!-- 중앙 콘텐츠 -->
  <main class="flex-1 overflow-y-auto" style="background:#f5f7fb;">
    <div id="content-area" class="min-h-full">
      <div class="flex flex-col items-center justify-center h-64 text-gray-400">
        <svg class="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
        </svg>
        <p class="text-sm">상단 메뉴를 클릭하여 데이터를 조회하세요.</p>
      </div>
    </div>
  </main>
</div>
 
<!-- 다운로드 확인 모달 -->
<div id="download-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="Admin.closeDownloadModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-80 overflow-hidden">
    <div class="h-1.5 bg-gradient-to-r from-green-600 to-green-400"></div>
    <div class="px-7 py-6">
      <div class="flex justify-center mb-4">
        <div class="w-14 h-14 rounded-full bg-green-50 flex items-center justify-center">
          <svg class="w-7 h-7 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
      </div>
      <h3 class="text-center text-lg font-bold text-gray-800 mb-1">엑셀 다운로드</h3>
      <p class="text-center text-sm text-gray-500 mb-2">현재 화면의 내용을 엑셀 파일로 저장하시겠습니까?</p>
      <div id="download-filename-row" class="mb-5">
        <label class="block text-xs text-gray-500 mb-1 text-center">파일 이름</label>
        <input id="download-filename" type="text" value="생기부_데이터"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-green-400 text-center"/>
        <p class="text-center text-xs text-gray-400 mt-1">.xlsx 형식으로 저장됩니다</p>
      </div>
      <div class="flex gap-3">
        <button onclick="Admin.closeDownloadModal()"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">
          취소
        </button>
        <button onclick="Admin.confirmDownload()"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-green-500 text-white hover:bg-green-600 transition-colors shadow-sm flex items-center justify-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          저장
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 저장 성공 모달 -->
<div id="save-success-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="Admin.closeSaveSuccess()"></div>
  <div id="save-success-card" class="relative bg-white rounded-2xl shadow-2xl w-80 overflow-hidden transform transition-all duration-200 scale-95 opacity-0">
    <div class="h-1.5 bg-gradient-to-r from-emerald-600 to-emerald-400"></div>
    <div class="px-7 py-6">
      <div class="flex justify-center mb-4">
        <div class="relative">
          <div class="w-16 h-16 rounded-full bg-emerald-50 flex items-center justify-center ring-4 ring-emerald-100/60">
            <svg class="w-9 h-9 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>
      </div>
      <h3 class="text-center text-lg font-bold text-gray-800 mb-1">저장 완료</h3>
      <p id="save-success-msg" class="text-center text-sm text-gray-500 mb-6">변경 내용이 정상적으로 저장되었습니다.</p>
      <button onclick="Admin.closeSaveSuccess()"
        class="w-full py-2.5 rounded-xl text-sm font-semibold bg-emerald-500 text-white hover:bg-emerald-600 transition-colors shadow-sm flex items-center justify-center gap-1.5">
        확인
      </button>
    </div>
  </div>
</div>

<!-- 로그아웃 확인 모달 -->
<div id="logout-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
  <!-- 배경 오버레이 -->
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="Admin.cancelLogout()"></div>
  <!-- 모달 카드 -->
  <div class="relative bg-white rounded-2xl shadow-2xl w-80 overflow-hidden">
    <!-- 상단 컬러 바 -->
    <div class="h-1.5 bg-gradient-to-r from-blue-800 to-blue-500"></div>
    <div class="px-7 py-6">
      <!-- 아이콘 -->
      <div class="flex justify-center mb-4">
        <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center">
          <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </div>
      </div>
      <h3 class="text-center text-lg font-bold text-gray-800 mb-1">로그아웃</h3>
      <p class="text-center text-sm text-gray-500 mb-6">정말 로그아웃 하시겠습니까?</p>
      <div class="flex gap-3">
        <button onclick="Admin.cancelLogout()"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">
          취소
        </button>
        <button onclick="Admin.confirmLogout()"
          class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-red-500 text-white hover:bg-red-600 transition-colors shadow-sm">
          로그아웃
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() { Admin.init(); });
</script>
 
</body>
</html>
