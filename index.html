<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

  <!-- ============================================================ -->
  <!-- ⚙️ 설정 변수 -->
  <!-- ============================================================ -->

  <!-- ============================================================ -->
  <!-- 📌 준비중 화면 -->
  <!-- ============================================================ -->
  <div id="screen-preparing" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 text-center">
      <div class="text-5xl mb-4">⏳</div>
      <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-2">서비스 준비 중</h2>
      <p id="preparing-message" class="text-gray-500 text-sm sm:text-base"></p>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🚫 마감 화면 -->
  <!-- ============================================================ -->
  <div id="screen-closed" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 text-center">
      <div class="text-5xl mb-4">🚫</div>
      <h2 class="text-xl sm:text-2xl font-bold text-red-600 mb-2">마감되었습니다</h2>
      <p id="closed-message" class="text-gray-500 text-sm sm:text-base"></p>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🔐 로그인 화면 -->
  <!-- ============================================================ -->
  <div id="screen-login" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      <div class="text-center mb-6">
        <h1 id="main-title" class="text-xl sm:text-2xl font-bold text-gray-800 mb-1"></h1>
        <p id="sub-title" class="text-sm sm:text-base text-gray-500"></p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
          <input type="email" id="login-id" placeholder="예시) example@email.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
          <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
        </div>
        <button onclick="doLogin()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
          로그인
        </button>
        <div class="flex gap-3">
          <button onclick="showScreen('screen-register')"
            class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg transition text-sm">
            회원가입
          </button>
          <button onclick="showScreen('screen-find-pw')"
            class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg transition text-sm">
            비밀번호 찾기
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📝 회원가입 화면 -->
  <!-- ============================================================ -->
  <div id="screen-register" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      <h2 class="text-xl sm:text-2xl font-bold text-gray-800 text-center mb-6">회원가입</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">학번</label>
          <input type="text" id="reg-studentId" placeholder="예시) 3901"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
          <input type="text" id="reg-name" placeholder="예시) 홍길동 - 반드시 한글로 입력하세요"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">아이디 (이메일)</label>
          <input type="email" id="reg-email" placeholder="예시) example@email.com - 이메일 주소를 입력"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
          <p class="text-xs text-gray-400 mt-1">※ 비밀번호 분실 시 이 이메일로 비밀번호를 발송합니다.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
          <input type="password" id="reg-password" placeholder="비밀번호를 입력하세요"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
        </div>
        <button onclick="doRegister()"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
          가입하기
        </button>
        <button onclick="showScreen('screen-login')"
          class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg transition text-sm">
          ← 로그인으로 돌아가기
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🔍 비밀번호 찾기 화면 -->
  <!-- ============================================================ -->
  <div id="screen-find-pw" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      <h2 class="text-xl sm:text-2xl font-bold text-gray-800 text-center mb-6">비밀번호 찾기</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">학번</label>
          <input type="text" id="find-studentId" placeholder="예시) 3901"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
          <input type="text" id="find-name" placeholder="예시) 홍길동"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이메일 (가입 시 입력한 이메일)</label>
          <input type="email" id="find-email" placeholder="예시) example@email.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm sm:text-base" />
        </div>
        <button onclick="doFindPassword()"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
          비밀번호 찾기
        </button>
        <button onclick="showScreen('screen-login')"
          class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg transition text-sm">
          ← 로그인으로 돌아가기
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📅 자료입력 대기 화면 -->
  <!-- ============================================================ -->
  <div id="screen-waiting" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 text-center">
      <div class="text-5xl mb-4">📅</div>
      <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-2">로그인 성공!</h2>
      <p id="waiting-message" class="text-gray-500 text-sm sm:text-base mb-4"></p>
      <button onclick="showScreen('screen-login')"
        class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 px-6 rounded-lg transition text-sm">
        돌아가기
      </button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📢 공지사항 모달 -->
  <!-- ============================================================ -->
  <div id="modal-notice" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[80vh] overflow-y-auto p-6 sm:p-8">
      <h3 class="text-lg sm:text-xl font-bold text-gray-800 mb-4 text-center">📢 공지사항</h3>
      <div id="modal-notice-content" class="space-y-4 text-sm sm:text-base text-gray-700"></div>
      <button onclick="closeNoticeAndProceed()"
        class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
        확인
      </button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🔄 로딩 오버레이 -->
  <!-- ============================================================ -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-40">
    <div class="bg-white rounded-xl p-6 flex flex-col items-center gap-3">
      <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p id="loading-text" class="text-sm text-gray-600">처리 중...</p>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📜 JavaScript -->
  <!-- ============================================================ -->
  <script>
    // ============================================================
    // ⚙️ 설정 변수 (여기만 수정하세요)
    // ============================================================
    const WEB_APP_URL     = 'https://script.google.com/macros/s/AKfycbxb2oVmLR9upvEITUfAcbLv8qYPvk2uZTMP9V7ibAs6GvSyQgCGfmYYG9SV7ITk6l-VSg/exec';
    const GITHUB_PAGE_URL = 'https://blueskyfre.github.io/chphed.github.io';

    // ============================================================
    // 전역 변수
    // ============================================================
    let rulesData = null;    // SH규칙 데이터
    let loginUserData = null; // 로그인된 사용자 데이터

    // ============================================================
    // 🌐 API 호출 함수 (CORS 대응)
    // ============================================================

    /** GET 요청 */
    async function apiGet(action, params = {}) {
      const url = new URL(WEB_APP_URL);
      url.searchParams.set('action', action);
      for (const key in params) {
        url.searchParams.set(key, params[key]);
      }

      const response = await fetch(url.toString(), {
        method: 'GET',
        redirect: 'follow'
      });

      if (!response.ok) throw new Error('서버 응답 오류: ' + response.status);
      return await response.json();
    }

    /** POST 요청 (CORS 대응 - text/plain 사용) */
    async function apiPost(data) {
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data),
        redirect: 'follow'
      });

      if (!response.ok) throw new Error('서버 응답 오류: ' + response.status);
      return await response.json();
    }

    // ============================================================
    // 🖥️ 화면 제어
    // ============================================================
    function showScreen(screenId) {
      const screens = document.querySelectorAll('[id^="screen-"]');
      screens.forEach(s => s.classList.add('hidden'));
      const target = document.getElementById(screenId);
      if (target) target.classList.remove('hidden');
    }

    function showLoading(text = '처리 중...') {
      document.getElementById('loading-text').textContent = text;
      document.getElementById('loading-overlay').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    function showAlert(message) {
      alert(message);
    }

    // ============================================================
    // 🚀 초기화 (SH규칙 데이터 로드)
    // ============================================================
    async function initialize() {
      showLoading('초기 설정을 불러오는 중...');

      try {
        const result = await apiGet('getRules');

        if (!result.success) {
          throw new Error(result.message || '규칙 데이터를 가져올 수 없습니다.');
        }

        rulesData = result.data;
        const today = new Date().toISOString().split('T')[0]; // yyyy-MM-dd

        // 날짜 비교하여 화면 결정
        if (today < rulesData.registerDate) {
          // 회원가입 시작일 이전 → 준비중
          document.getElementById('preparing-message').textContent =
            rulesData.registerDate + ' 부터 서비스가 시작됩니다.';
          showScreen('screen-preparing');

        } else if (today >= rulesData.closeDate) {
          // 마감일 이후 → 마감
          document.getElementById('closed-message').textContent =
            '마감일(' + rulesData.closeDate + ')이 지났습니다. 더 이상 이용할 수 없습니다.';
          showScreen('screen-closed');

        } else {
          // 회원가입·로그인 가능 기간
          document.getElementById('main-title').textContent = rulesData.title;
          document.getElementById('sub-title').textContent = rulesData.subtitle;
          showScreen('screen-login');
        }

      } catch (err) {
        showAlert('초기 설정을 불러오지 못했습니다.\n' + err.message);
      } finally {
        hideLoading();
      }
    }

    // ============================================================
    // 📝 회원가입
    // ============================================================
    async function doRegister() {
      const studentId = document.getElementById('reg-studentId').value.trim();
      const name      = document.getElementById('reg-name').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-password').value.trim();

      if (!studentId || !name || !email || !password) {
        showAlert('모든 항목을 입력해 주세요.');
        return;
      }

      // 한글 이름 검증
      const koreanRegex = /^[가-힣]+$/;
      if (!koreanRegex.test(name)) {
        showAlert('이름은 반드시 한글로 입력해 주세요.');
        return;
      }

      // 이메일 형식 검증
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showAlert('올바른 이메일 형식으로 입력해 주세요.');
        return;
      }

      showLoading('회원가입 처리 중...');

      try {
        const result = await apiPost({
          action: 'register',
          studentId: studentId,
          name: name,
          email: email,
          password: password
        });

        showAlert(result.message);

        if (result.success) {
          showScreen('screen-login');
        }
      } catch (err) {
        showAlert('회원가입 중 오류가 발생했습니다.\n' + err.message);
      } finally {
        hideLoading();
      }
    }

    // ============================================================
    // 🔐 로그인
    // ============================================================
    async function doLogin() {
      const userId   = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-pw').value.trim();

      if (!userId || !password) {
        showAlert('아이디와 비밀번호를 입력해 주세요.');
        return;
      }

      showLoading('로그인 중...');

      try {
        const result = await apiPost({
          action: 'login',
          userId: userId,
          password: password
        });

        if (!result.success) {
          showAlert(result.message);
          return;
        }

        loginUserData = result.data;

        // 공지사항이 있으면 모달 표시
        if (loginUserData.notices && loginUserData.notices.length > 0) {
          showNoticeModal(loginUserData.notices);
        } else {
          proceedAfterLogin();
        }

      } catch (err) {
        showAlert('로그인 중 오류가 발생했습니다.\n' + err.message);
      } finally {
        hideLoading();
      }
    }

    // ============================================================
    // 📢 공지사항 모달
    // ============================================================
    function showNoticeModal(notices) {
      const contentDiv = document.getElementById('modal-notice-content');
      contentDiv.innerHTML = '';

      notices.forEach(notice => {
        const div = document.createElement('div');
        div.className = 'bg-gray-50 rounded-lg p-4';
        div.innerHTML =
          '<p class="font-semibold text-blue-600 mb-1">[' + notice.type + ']</p>' +
          '<p class="whitespace-pre-wrap">' + notice.content + '</p>';
        contentDiv.appendChild(div);
      });

      document.getElementById('modal-notice').classList.remove('hidden');
    }

    function closeNoticeAndProceed() {
      document.getElementById('modal-notice').classList.add('hidden');
      proceedAfterLogin();
    }

    // ============================================================
    // ➡️ 로그인 후 이동 처리
    // ============================================================
    function proceedAfterLogin() {
      const today = new Date().toISOString().split('T')[0];

      if (today < rulesData.inputDate) {
        // 자료입력 시작일 이전 → 대기 화면
        document.getElementById('waiting-message').textContent =
          rulesData.inputDate + ' 부터 자료 입력이 가능합니다.';
        showScreen('screen-waiting');
      } else {
        // 자료입력 가능 → firstpage.html로 이동
        const params = new URLSearchParams({
          studentId: loginUserData.studentId,
          name: loginUserData.name
        });
        window.location.href = GITHUB_PAGE_URL + '/firstpage.html?' + params.toString();
      }
    }

    // ============================================================
    // 🔍 비밀번호 찾기
    // ============================================================
    async function doFindPassword() {
      const studentId = document.getElementById('find-studentId').value.trim();
      const name      = document.getElementById('find-name').value.trim();
      const email     = document.getElementById('find-email').value.trim();

      if (!studentId || !name || !email) {
        showAlert('모든 항목을 입력해 주세요.');
        return;
      }

      showLoading('비밀번호 찾는 중...');

      try {
        const result = await apiPost({
          action: 'findPassword',
          studentId: studentId,
          name: name,
          email: email
        });

        showAlert(result.message);

        if (result.success) {
          showScreen('screen-login');
        }
      } catch (err) {
        showAlert('비밀번호 찾기 중 오류가 발생했습니다.\n' + err.message);
      } finally {
        hideLoading();
      }
    }

    // ============================================================
    // 🏁 페이지 로드 시 초기화 실행
    // ============================================================
    window.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
