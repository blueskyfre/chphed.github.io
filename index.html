<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ============================================================
       ✅ [추가] 공통 재사용 스타일 - 스켈레톤 UI & 모달 알림
       향후 다른 페이지에서도 이 style 블록을 복사하여 재사용 가능
       ============================================================ */

    /* 스켈레톤 애니메이션 */
    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 0.5rem;
    }

    /* 모달 알림 페이드 인/아웃 */
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes modalFadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.9); }
    }
    .modal-animate-in {
      animation: modalFadeIn 0.25s ease-out forwards;
    }
    .modal-animate-out {
      animation: modalFadeOut 0.2s ease-in forwards;
    }
  </style>
</head>

  <!-- 📜 JavaScript -->
  <!-- ============================================================ -->
  <script>
    // ============================================================
    // ⚙️ 설정 변수 (여기만 수정하세요)
    // ============================================================
    const WEB_APP_URL     = 'https://script.google.com/macros/s/AKfycbxb2oVmLR9upvEITUfAcbLv8qYPvk2uZTMP9V7ibAs6GvSyQgCGfmYYG9SV7ITk6l-VSg/exec';
    const GITHUB_PAGE_URL = 'https://blueskyfre.github.io/chphed.github.io';

    // ============================================================
    // 전역 변수
    // ============================================================
    let rulesData = null;    // SH규칙 데이터
    let loginUserData = null; // 로그인된 사용자 데이터
    let alertCallback = null; // 모달 알림 콜백 (재사용)

    // ============================================================
    // 🌐 API 호출 함수 (CORS 대응)
    // ============================================================

    /** GET 요청 */
    async function apiGet(action, params = {}) {
      const url = new URL(WEB_APP_URL);
      url.searchParams.set('action', action);
      for (const key in params) {
        url.searchParams.set(key, params[key]);
      }

      const response = await fetch(url.toString(), {
        method: 'GET',
        redirect: 'follow'
      });

      if (!response.ok) throw new Error('서버 응답 오류: ' + response.status);
      return await response.json();
    }

    /** POST 요청 (CORS 대응 - text/plain 사용) */
    async function apiPost(data) {
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data),
        redirect: 'follow'
      });

      if (!response.ok) throw new Error('서버 응답 오류: ' + response.status);
      return await response.json();
    }

    // ============================================================
    // 🖥️ 화면 제어
    // ============================================================
    function showScreen(screenId) {
      // ✅ [수정] 스켈레톤 화면도 함께 숨김 처리
      document.getElementById('skeleton-screen').classList.add('hidden');
      const screens = document.querySelectorAll('[id^="screen-"]');
      screens.forEach(s => s.classList.add('hidden'));
      const target = document.getElementById(screenId);
      if (target) target.classList.remove('hidden');
    }

    function showLoading(text = '처리 중...') {
      document.getElementById('loading-text').textContent = text;
      document.getElementById('loading-overlay').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    // ============================================================
    // ✅ [추가] 공통 모달 알림 함수 (alert 대체 - 재사용 가능)
    // 다른 페이지에서도 이 함수들을 복사하여 재사용할 수 있습니다.
    // 사용법: showAlert('메시지')
    //         showAlert('메시지', 'success')
    //         showAlert('메시지', 'error', function() { /* 확인 후 실행 */ })
    // ============================================================
    function showAlert(message, type, callback) {
      // type 기본값 자동 판별: 성공/실패 키워드 기반
      if (!type) {
        if (/완료|성공|발송/.test(message)) type = 'success';
        else if (/오류|실패|올바르지|않습니다|없습니다|아닙니다|일치하지/.test(message)) type = 'error';
        else type = 'info';
      }

      const config = {
        success: { icon: '✅', title: '완료',  btnClass: 'bg-green-600 hover:bg-green-700 text-white' },
        error:   { icon: '⚠️', title: '알림',  btnClass: 'bg-red-500 hover:bg-red-600 text-white' },
        info:    { icon: 'ℹ️', title: '안내',  btnClass: 'bg-blue-600 hover:bg-blue-700 text-white' },
        warning: { icon: '⚡', title: '주의',  btnClass: 'bg-yellow-500 hover:bg-yellow-600 text-white' }
      };

      const cfg = config[type] || config.info;
      alertCallback = callback || null;

      document.getElementById('modal-alert-icon').textContent = cfg.icon;
      document.getElementById('modal-alert-title').textContent = cfg.title;
      document.getElementById('modal-alert-message').textContent = message;
      document.getElementById('modal-alert-btn').className =
        'w-full font-semibold py-3 rounded-lg transition text-sm sm:text-base ' + cfg.btnClass;

      const modal = document.getElementById('modal-alert');
      const box = document.getElementById('modal-alert-box');
      modal.classList.remove('hidden');
      box.classList.remove('modal-animate-out');
      box.classList.add('modal-animate-in');
    }

    function closeAlert() {
      const modal = document.getElementById('modal-alert');
      const box = document.getElementById('modal-alert-box');
      box.classList.remove('modal-animate-in');
      box.classList.add('modal-animate-out');
      setTimeout(function() {
        modal.classList.add('hidden');
        if (alertCallback) {
          alertCallback();
          alertCallback = null;
        }
      }, 200);
    }

    // ============================================================
    // ✅ [추가] 스켈레톤 UI 유틸 함수 (재사용 가능)
    // 다른 페이지에서도 skeleton-screen div + 이 함수들을 복사하여 재사용
    // ============================================================
    function showSkeleton(text) {
      const el = document.getElementById('skeleton-screen');
      if (el) {
        el.classList.remove('hidden');
        if (text) {
          const statusEl = document.getElementById('skeleton-status-text');
          if (statusEl) statusEl.textContent = text;
        }
      }
    }

    function hideSkeleton() {
      const el = document.getElementById('skeleton-screen');
      if (el) el.classList.add('hidden');
    }

    // ============================================================
    // ✅ [추가] 비밀번호 확인 실시간 체크 (회원가입 & 비밀번호 변경 공용)
    // ============================================================
    function setupPasswordMatch(pwId, confirmId, msgId) {
      const pwField = document.getElementById(confirmId);
      if (!pwField) return;
      pwField.addEventListener('input', function() {
        const pw = document.getElementById(pwId).value;
        const confirm = this.value;
        const msgEl = document.getElementById(msgId);
        if (!confirm) {
          msgEl.classList.add('hidden');
          return;
        }
        msgEl.classList.remove('hidden');
        if (pw === confirm) {
          msgEl.textContent = '✓ 비밀번호가 일치합니다.';
          msgEl.className = 'text-xs mt-1 text-green-600';
        } else {
          msgEl.textContent = '✗ 비밀번호가 일치하지 않습니다.';
          msgEl.className = 'text-xs mt-1 text-red-500';
        }
      });
    }

    // ============================================================
    // 🚀 초기화 (SH규칙 데이터 로드)
    // ============================================================
    async function initialize() {
      // ✅ [수정] 스켈레톤 UI로 초기 로딩 표시 (스피너 대신)
      showSkeleton('초기 설정을 불러오는 중...');

      try {
        const result = await apiGet('getRules');

        if (!result.success) {
          throw new Error(result.message || '규칙 데이터를 가져올 수 없습니다.');
        }

        rulesData = result.data;
        const today = new Date().toISOString().split('T')[0]; // yyyy-MM-dd

        // 날짜 비교하여 화면 결정
        if (today < rulesData.registerDate) {
          // 회원가입 시작일 이전 → 준비중
          document.getElementById('preparing-message').textContent =
            rulesData.registerDate + ' 부터 서비스가 시작됩니다.';
          showScreen('screen-preparing');

        } else if (today >= rulesData.closeDate) {
          // 마감일 이후 → 마감
          document.getElementById('closed-message').textContent =
            '마감일(' + rulesData.closeDate + ')이 지났습니다. 더 이상 이용할 수 없습니다.';
          showScreen('screen-closed');

        } else {
          // 회원가입·로그인 가능 기간
          document.getElementById('main-title').textContent = rulesData.title;
          document.getElementById('sub-title').textContent = rulesData.subtitle;
          showScreen('screen-login');
        }

      } catch (err) {
        hideSkeleton();
        showAlert('초기 설정을 불러오지 못했습니다.\n' + err.message, 'error');
      }
    }

    // ============================================================
    // 📝 회원가입
    // ============================================================
    async function doRegister() {
      const studentId = document.getElementById('reg-studentId').value.trim();
      const name      = document.getElementById('reg-name').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-password').value.trim();
      const passwordConfirm = document.getElementById('reg-password-confirm').value.trim();

      if (!studentId || !name || !email || !password) {
        showAlert('모든 항목을 입력해 주세요.', 'warning');
        return;
      }

      // ✅ [추가] 비밀번호 확인 검증
      if (!passwordConfirm) {
        showAlert('비밀번호 확인을 입력해 주세요.', 'warning');
        return;
      }
      if (password !== passwordConfirm) {
        showAlert('비밀번호와 비밀번호 확인이 일치하지 않습니다.\n비밀번호를 다시 확인해 주세요.', 'error');
        return;
      }

      // 한글 이름 검증
      const koreanRegex = /^[가-힣]+$/;
      if (!koreanRegex.test(name)) {
        showAlert('이름은 반드시 한글로 입력해 주세요.', 'error');
        return;
      }

      // 이메일 형식 검증
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showAlert('올바른 이메일 형식으로 입력해 주세요.', 'error');
        return;
      }

      showLoading('회원가입 처리 중...');

      try {
        const result = await apiPost({
          action: 'register',
          studentId: studentId,
          name: name,
          email: email,
          password: password
        });

        if (result.success) {
          showAlert(result.message, 'success', function() {
            showScreen('screen-login');
          });
        } else {
          showAlert(result.message, 'error');
        }
      } catch (err) {
        showAlert('회원가입 중 오류가 발생했습니다.\n' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    // ============================================================
    // 🔐 로그인
    // ============================================================
    async function doLogin() {
      const userId   = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-pw').value.trim();

      if (!userId || !password) {
        showAlert('아이디와 비밀번호를 입력해 주세요.', 'warning');
        return;
      }

      showLoading('로그인 중...');

      try {
        const result = await apiPost({
          action: 'login',
          userId: userId,
          password: password
        });

        if (!result.success) {
          showAlert(result.message, 'error');
          return;
        }

        loginUserData = result.data;

        // ✅ [수정] 공지사항 처리: 공지가 있으면 모달, 없으면('공지없음' 포함) 바로 이동
        if (loginUserData.notices && loginUserData.notices.length > 0) {
          showNoticeModal(loginUserData.notices);
        } else {
          // '공지없음' 또는 공지 내용이 비어있는 경우 → 모달 없이 바로 이동
          proceedAfterLogin();
        }

      } catch (err) {
        showAlert('로그인 중 오류가 발생했습니다.\n' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    // ============================================================
    // 📢 공지사항 모달
    // ============================================================
    function showNoticeModal(notices) {
      const contentDiv = document.getElementById('modal-notice-content');
      contentDiv.innerHTML = '';

      notices.forEach(notice => {
        const div = document.createElement('div');
        div.className = 'bg-gray-50 rounded-lg p-4';
        div.innerHTML =
          '<p class="font-semibold text-blue-600 mb-1">[' + notice.type + ']</p>' +
          '<p class="whitespace-pre-wrap">' + notice.content + '</p>';
        contentDiv.appendChild(div);
      });

      document.getElementById('modal-notice').classList.remove('hidden');
    }

    function closeNoticeAndProceed() {
      document.getElementById('modal-notice').classList.add('hidden');
      proceedAfterLogin();
    }

    // ============================================================
    // ➡️ 로그인 후 이동 처리
    // ============================================================
    function proceedAfterLogin() {
      const today = new Date().toISOString().split('T')[0];

      if (today < rulesData.inputDate) {
        // 자료입력 시작일 이전 → 대기 화면
        document.getElementById('waiting-message').textContent =
          rulesData.inputDate + ' 부터 자료 입력이 가능합니다.';
        showScreen('screen-waiting');
      } else {
        // 자료입력 가능 → firstpage.html로 이동
        const params = new URLSearchParams({
          studentId: loginUserData.studentId,
          name: loginUserData.name
        });
        window.location.href = GITHUB_PAGE_URL + '/firstpage.html?' + params.toString();
      }
    }

    // ============================================================
    // 🔍 비밀번호 찾기
    // ============================================================
    async function doFindPassword() {
      const studentId = document.getElementById('find-studentId').value.trim();
      const name      = document.getElementById('find-name').value.trim();
      const email     = document.getElementById('find-email').value.trim();

      if (!studentId || !name || !email) {
        showAlert('모든 항목을 입력해 주세요.', 'warning');
        return;
      }

      showLoading('비밀번호 찾는 중...');

      try {
        const result = await apiPost({
          action: 'findPassword',
          studentId: studentId,
          name: name,
          email: email
        });

        if (result.success) {
          showAlert(result.message, 'success', function() {
            showScreen('screen-login');
          });
        } else {
          showAlert(result.message, 'error');
        }
      } catch (err) {
        showAlert('비밀번호 찾기 중 오류가 발생했습니다.\n' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    // ============================================================
    // 🔄 [추가] 비밀번호 변경
    // ============================================================
    async function doChangePassword() {
      const studentId       = document.getElementById('chpw-studentId').value.trim();
      const name            = document.getElementById('chpw-name').value.trim();
      const email           = document.getElementById('chpw-email').value.trim();
      const currentPassword = document.getElementById('chpw-current').value.trim();
      const newPassword     = document.getElementById('chpw-new').value.trim();
      const newPasswordConfirm = document.getElementById('chpw-new-confirm').value.trim();

      if (!studentId || !name || !email || !currentPassword || !newPassword || !newPasswordConfirm) {
        showAlert('모든 항목을 입력해 주세요.', 'warning');
        return;
      }

      if (newPassword !== newPasswordConfirm) {
        showAlert('새로운 비밀번호와 재확인 비밀번호가 일치하지 않습니다.\n다시 확인해 주세요.', 'error');
        return;
      }

      if (currentPassword === newPassword) {
        showAlert('새로운 비밀번호가 기존 비밀번호와 동일합니다.\n다른 비밀번호를 입력해 주세요.', 'warning');
        return;
      }

      showLoading('비밀번호 변경 중...');

      try {
        const result = await apiPost({
          action: 'changePassword',
          studentId: studentId,
          name: name,
          email: email,
          currentPassword: currentPassword,
          newPassword: newPassword
        });

        if (result.success) {
          showAlert(result.message, 'success', function() {
            showScreen('screen-login');
          });
        } else {
          showAlert(result.message, 'error');
        }
      } catch (err) {
        showAlert('비밀번호 변경 중 오류가 발생했습니다.\n' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    // ============================================================
    // 🏁 페이지 로드 시 초기화 실행
    // ============================================================
    window.addEventListener('DOMContentLoaded', function() {
      // 비밀번호 실시간 일치 체크 등록 (회원가입)
      setupPasswordMatch('reg-password', 'reg-password-confirm', 'reg-pw-match-msg');
      // 비밀번호 실시간 일치 체크 등록 (비밀번호 변경)
      setupPasswordMatch('chpw-new', 'chpw-new-confirm', 'chpw-match-msg');
      // 초기화 실행
      initialize();
    });
  </script>
</body>
</html>
