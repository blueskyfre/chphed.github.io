<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ============================================================
       [공통 컴포넌트] 스켈레톤 UI & 커스텀 모달 알림
       - 다른 페이지에서도 이 <style>과 아래 JS 유틸을 복사해 재사용
       ============================================================ */

    /* ── 스켈레톤 애니메이션 ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 800px 100%;
      animation: shimmer 1.8s infinite ease-in-out;
      border-radius: 0.5rem;
    }

    /* ── 커스텀 모달 알림 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-box {
      background: #fff;
      border-radius: 1rem;
      padding: 2rem 1.5rem 1.5rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.25s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal-overlay.active .modal-box {
      transform: scale(1);
    }
    .modal-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: #1e293b; }
    .modal-message { font-size: 0.92rem; color: #64748b; line-height: 1.55; margin-bottom: 1.25rem; word-break: keep-all; }
    .modal-btn {
      display: inline-block;
      padding: 0.6rem 2rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .modal-btn-primary { background: #3b82f6; color: #fff; }
    .modal-btn-primary:hover { background: #2563eb; }
    .modal-btn-danger  { background: #ef4444; color: #fff; }
    .modal-btn-danger:hover  { background: #dc2626; }
    .modal-btn-success { background: #22c55e; color: #fff; }
    .modal-btn-success:hover { background: #16a34a; }

    /* 기본 화면 전환 */
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50 flex items-center justify-center p-4">

  <!-- ============================================================
       [공통 컴포넌트] 커스텀 모달 알림 (재사용)
       ============================================================ -->
  <div id="custom-modal" class="modal-overlay" onclick="closeModalOnBg(event)">
    <div class="modal-box">
      <div id="modal-icon" class="modal-icon"></div>
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-message" class="modal-message"></div>
      <button id="modal-btn" class="modal-btn modal-btn-primary" onclick="closeModal()">확인</button>
    </div>
  </div>

  <!-- ============================================================
       [공통 컴포넌트] 스켈레톤 로딩 화면 (재사용)
       ============================================================ -->
  <div id="screen-skeleton" class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 space-y-5">
      <!-- 제목 스켈레톤 -->
      <div class="flex justify-center"><div class="skeleton-box h-8 w-48"></div></div>
      <div class="flex justify-center"><div class="skeleton-box h-4 w-64"></div></div>
      <div class="space-y-3 pt-2">
        <!-- 입력 필드 스켈레톤 -->
        <div class="skeleton-box h-11 w-full"></div>
        <div class="skeleton-box h-11 w-full"></div>
        <div class="skeleton-box h-11 w-full"></div>
      </div>
      <div class="space-y-2 pt-2">
        <!-- 버튼 스켈레톤 -->
        <div class="skeleton-box h-12 w-full"></div>
        <div class="flex gap-3">
          <div class="skeleton-box h-10 flex-1"></div>
          <div class="skeleton-box h-10 flex-1"></div>
        </div>
      </div>
      <div class="flex justify-center pt-1">
        <div class="skeleton-box h-3 w-40"></div>
      </div>
      <p class="text-center text-xs text-gray-400 pt-2">데이터를 불러오는 중입니다...</p>
    </div>
  </div>

  <!-- ============================================================
       준비중 화면
       ============================================================ -->
  <div id="screen-waiting" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 text-center">
      <div class="text-5xl mb-4">⏳</div>
      <h2 class="text-xl sm:text-2xl font-bold text-yellow-600 mb-2">준비 중입니다</h2>
      <p id="waiting-message" class="text-gray-500 text-sm sm:text-base"></p>
    </div>
  </div>

  <!-- ============================================================
       마감 화면
       ============================================================ -->
  <div id="screen-closed" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 text-center">
      <div class="text-5xl mb-4">🔒</div>
      <h2 class="text-xl sm:text-2xl font-bold text-red-600 mb-2">마감되었습니다</h2>
      <p id="closed-message" class="text-gray-500 text-sm sm:text-base"></p>
    </div>
  </div>

  <!-- ============================================================
       로그인 화면
       ============================================================ -->
  <div id="screen-login" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      <div class="text-center mb-6">
        <h1 id="main-title" class="text-2xl sm:text-3xl font-bold text-gray-800 mb-1"></h1>
        <p id="sub-title" class="text-gray-500 text-sm sm:text-base"></p>
      </div>
      <div class="space-y-3">
        <input id="login-id" type="text" placeholder="학번" 
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="login-pw" type="password" placeholder="비밀번호"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
      </div>
      <div class="mt-5 space-y-2">
        <button onclick="doLogin()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
          로그인
        </button>
        <div class="flex gap-3">
          <button onclick="showScreen('screen-register')"
            class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg transition text-sm">
            회원가입
          </button>
          <button onclick="showScreen('screen-find-pw')"
            class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg transition text-sm">
            비밀번호 찾기
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       회원가입 화면 (비밀번호 확인 필드 추가)
       ============================================================ -->
  <div id="screen-register" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      <h2 class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-5">회원가입</h2>
      <div class="space-y-3">
        <input id="reg-id" type="text" placeholder="학번"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="reg-name" type="text" placeholder="이름"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="reg-email" type="email" placeholder="이메일"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="reg-pw" type="password" placeholder="비밀번호"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="reg-pw-confirm" type="password" placeholder="비밀번호 확인"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
      </div>
      <div class="mt-5 space-y-2">
        <button onclick="doRegister()"
          class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
          가입하기
        </button>
        <button onclick="showScreen('screen-login')"
          class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg transition text-sm">
          ← 로그인으로 돌아가기
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       비밀번호 찾기 / 변경 화면
       ============================================================ -->
  <div id="screen-find-pw" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      <h2 class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-5">비밀번호 찾기 / 변경</h2>

      <!-- 탭 버튼 -->
      <div class="flex gap-2 mb-5">
        <button id="tab-find" onclick="switchPwTab('find')"
          class="flex-1 py-2 rounded-lg font-semibold text-sm transition bg-blue-600 text-white">
          비밀번호 찾기
        </button>
        <button id="tab-change" onclick="switchPwTab('change')"
          class="flex-1 py-2 rounded-lg font-semibold text-sm transition bg-gray-100 text-gray-600 hover:bg-gray-200">
          비밀번호 변경
        </button>
      </div>

      <!-- 비밀번호 찾기 패널 -->
      <div id="panel-find" class="space-y-3">
        <input id="find-id" type="text" placeholder="학번"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="find-name" type="text" placeholder="이름"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="find-email" type="email" placeholder="이메일"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <button onclick="doFindPassword()"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
          비밀번호 찾기
        </button>
      </div>

      <!-- 비밀번호 변경 패널 -->
      <div id="panel-change" class="space-y-3 hidden">
        <input id="chg-id" type="text" placeholder="학번"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="chg-name" type="text" placeholder="이름"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="chg-email" type="email" placeholder="이메일"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="chg-old-pw" type="password" placeholder="기존 비밀번호"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-orange-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="chg-new-pw" type="password" placeholder="새로운 비밀번호"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <input id="chg-new-pw-confirm" type="password" placeholder="새로운 비밀번호 확인"
          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-400 focus:border-transparent outline-none text-sm sm:text-base" />
        <button onclick="doChangePassword()"
          class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
          비밀번호 변경
        </button>
      </div>

      <div class="mt-3">
        <button onclick="showScreen('screen-login')"
          class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg transition text-sm">
          ← 로그인으로 돌아가기
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       공지사항 모달 화면
       ============================================================ -->
  <div id="screen-notice" class="hidden w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      <div class="text-center mb-4">
        <div class="text-4xl mb-2">📢</div>
        <h2 class="text-xl sm:text-2xl font-bold text-gray-800">공지사항</h2>
      </div>
      <div id="notice-content" class="bg-gray-50 rounded-lg p-4 mb-5 text-sm sm:text-base text-gray-700 leading-relaxed max-h-60 overflow-y-auto whitespace-pre-wrap"></div>
      <button onclick="proceedAfterNotice()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition text-sm sm:text-base">
        확인 후 계속하기
      </button>
    </div>
  </div>


  <!-- ============================================================
       JavaScript
       ============================================================ -->
  <script>
    // ─── 설정 ───────────────────────────────────────────
    const GAS_URL = '여기에_GAS_웹앱_URL을_입력하세요';
    const GITHUB_PAGE_URL = '여기에_깃허브페이지_URL을_입력하세요';

    let rulesData = null;
    let loginUserData = null;

    // ─── 화면 전환 ─────────────────────────────────────
    const SCREENS = [
      'screen-skeleton','screen-waiting','screen-closed',
      'screen-login','screen-register','screen-find-pw','screen-notice'
    ];

    function showScreen(id) {
      SCREENS.forEach(s => document.getElementById(s).classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }


    /* ==========================================================
       [공통 유틸] 커스텀 모달 알림  (alert 대체)
       다른 페이지에서도 이 함수를 그대로 복사해 재사용하세요.
       ========================================================== */
    let _modalCallback = null;

    /**
     * showModal(options)
     * @param {string} icon    - 이모지 아이콘 (예: '⚠️', '✅', '❌')
     * @param {string} title   - 제목
     * @param {string} message - 본문 메시지
     * @param {string} btnType - 'primary' | 'danger' | 'success'
     * @param {function} onClose - 닫힐 때 콜백 (선택)
     */
    function showModal({ icon = 'ℹ️', title = '알림', message = '', btnType = 'primary', onClose = null } = {}) {
      document.getElementById('modal-icon').textContent = icon;
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;

      const btn = document.getElementById('modal-btn');
      btn.className = 'modal-btn modal-btn-' + btnType;
      _modalCallback = onClose;

      document.getElementById('custom-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('custom-modal').classList.remove('active');
      if (typeof _modalCallback === 'function') {
        const cb = _modalCallback;
        _modalCallback = null;
        setTimeout(cb, 260);   // 애니메이션 종료 후 콜백
      }
    }

    function closeModalOnBg(e) {
      if (e.target === e.currentTarget) closeModal();
    }

    /* 편의 래퍼 */
    function alertError(msg, cb)   { showModal({ icon:'❌', title:'오류',  message:msg, btnType:'danger',  onClose:cb }); }
    function alertSuccess(msg, cb) { showModal({ icon:'✅', title:'완료',  message:msg, btnType:'success', onClose:cb }); }
    function alertWarning(msg, cb) { showModal({ icon:'⚠️', title:'알림',  message:msg, btnType:'primary', onClose:cb }); }
    function alertInfo(msg, cb)    { showModal({ icon:'ℹ️', title:'안내',  message:msg, btnType:'primary', onClose:cb }); }


    /* ==========================================================
       [공통 유틸] 스켈레톤 UI 표시/숨김  (재사용)
       ========================================================== */
    function showSkeleton() { showScreen('screen-skeleton'); }
    function hideSkeleton() { document.getElementById('screen-skeleton').classList.add('hidden'); }


    // ─── 비밀번호 찾기/변경 탭 전환 ──────────────────
    function switchPwTab(tab) {
      const tabFind   = document.getElementById('tab-find');
      const tabChange = document.getElementById('tab-change');
      const panelFind   = document.getElementById('panel-find');
      const panelChange = document.getElementById('panel-change');

      if (tab === 'find') {
        tabFind.className   = 'flex-1 py-2 rounded-lg font-semibold text-sm transition bg-blue-600 text-white';
        tabChange.className = 'flex-1 py-2 rounded-lg font-semibold text-sm transition bg-gray-100 text-gray-600 hover:bg-gray-200';
        panelFind.classList.remove('hidden');
        panelChange.classList.add('hidden');
      } else {
        tabChange.className = 'flex-1 py-2 rounded-lg font-semibold text-sm transition bg-purple-600 text-white';
        tabFind.className   = 'flex-1 py-2 rounded-lg font-semibold text-sm transition bg-gray-100 text-gray-600 hover:bg-gray-200';
        panelChange.classList.remove('hidden');
        panelFind.classList.add('hidden');
      }
    }


    // ─── API 통신 (CORS 프록시 포함) ─────────────────
    async function callGAS(params) {
      const url = GAS_URL + '?' + new URLSearchParams(params).toString();
      const res = await fetch(url);
      return await res.json();
    }


    // ─── 초기 로딩 ─────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      showSkeleton();
      try {
        const data = await callGAS({ action: 'getRules' });
        if (!data || data.error) throw new Error(data?.error || '규칙 데이터를 불러올 수 없습니다.');
        rulesData = data;

        const today = new Date().toISOString().slice(0, 10);

        if (today < rulesData.openDate) {
          // 오픈일 이전 → 준비중
          document.getElementById('waiting-message').textContent =
            rulesData.openDate + ' 부터 이용 가능합니다.';
          showScreen('screen-waiting');

        } else if (today >= rulesData.closeDate) {
          // 마감일 이후 → 마감
          document.getElementById('closed-message').textContent =
            '마감일(' + rulesData.closeDate + ')이 지났습니다. 더 이상 이용할 수 없습니다.';
          showScreen('screen-closed');

        } else {
          // 회원가입·로그인 가능 기간
          document.getElementById('main-title').textContent = rulesData.title;
          document.getElementById('sub-title').textContent = rulesData.subtitle;
          showScreen('screen-login');
        }

      } catch (err) {
        hideSkeleton();
        alertError('초기 데이터 로딩 실패: ' + err.message);
      }
    });


    // ─── 로그인 ─────────────────────────────────────────
    async function doLogin() {
      const studentId = document.getElementById('login-id').value.trim();
      const password  = document.getElementById('login-pw').value.trim();

      if (!studentId || !password) {
        alertWarning('학번과 비밀번호를 모두 입력해주세요.');
        return;
      }

      showSkeleton();
      try {
        const data = await callGAS({ action: 'login', studentId, password });

        if (data.error) {
          showScreen('screen-login');
          alertError(data.error);
          return;
        }

        loginUserData = data;
        handleAfterLogin();

      } catch (err) {
        showScreen('screen-login');
        alertError('로그인 중 오류가 발생했습니다: ' + err.message);
      }
    }


    // ─── 로그인 성공 후 분기 ─────────────────────────
    function handleAfterLogin() {
      // ── 공지사항 처리 ──
      const noticeType = rulesData.noticeType;   // SH규칙 A14: 전체공지, 공동공지, 개인별, 공지없음

      if (noticeType === '공지없음') {
        // ★ 공지없음 → 모달 없이 바로 이동
        goToInputPage();
        return;
      }

      // 공지 내용 결정
      let noticeText = '';
      if (noticeType === '전체공지') {
        noticeText = rulesData.noticeAll || '';
      } else if (noticeType === '공동공지') {
        noticeText = rulesData.noticeCommon || '';
      } else if (noticeType === '개인별') {
        noticeText = loginUserData.noticePersonal || rulesData.noticeCommon || '';
      }

      if (!noticeText) {
        // 공지 내용이 비어있으면 바로 이동
        goToInputPage();
        return;
      }

      document.getElementById('notice-content').textContent = noticeText;
      showScreen('screen-notice');
    }

    function proceedAfterNotice() {
      goToInputPage();
    }

    function goToInputPage() {
      const today = new Date().toISOString().slice(0, 10);

      if (today < rulesData.inputDate) {
        // 자료입력 시작일 이전 → 대기 화면
        document.getElementById('waiting-message').textContent =
          rulesData.inputDate + ' 부터 자료 입력이 가능합니다.';
        showScreen('screen-waiting');
      } else {
        // 자료입력 가능 → firstpage.html로 이동
        const params = new URLSearchParams({
          studentId: loginUserData.studentId,
          name: loginUserData.name
        });
        window.location.href = GITHUB_PAGE_URL + '/firstpage.html?' + params.toString();
      }
    }


    // ─── 회원가입 (비밀번호 확인 추가) ──────────────
    async function doRegister() {
      const studentId = document.getElementById('reg-id').value.trim();
      const name      = document.getElementById('reg-name').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-pw').value.trim();
      const pwConfirm = document.getElementById('reg-pw-confirm').value.trim();

      if (!studentId || !name || !email || !password || !pwConfirm) {
        alertWarning('모든 항목을 입력해주세요.');
        return;
      }

      if (password !== pwConfirm) {
        alertError('비밀번호가 일치하지 않습니다. 다시 확인해주세요.');
        return;
      }

      showSkeleton();
      try {
        const data = await callGAS({ action: 'register', studentId, name, email, password });

        if (data.error) {
          showScreen('screen-register');
          alertError(data.error);
          return;
        }

        showScreen('screen-login');
        alertSuccess('회원가입이 완료되었습니다! 로그인해주세요.');

      } catch (err) {
        showScreen('screen-register');
        alertError('회원가입 중 오류가 발생했습니다: ' + err.message);
      }
    }


    // ─── 비밀번호 찾기 ─────────────────────────────────
    async function doFindPassword() {
      const studentId = document.getElementById('find-id').value.trim();
      const name      = document.getElementById('find-name').value.trim();
      const email     = document.getElementById('find-email').value.trim();

      if (!studentId || !name || !email) {
        alertWarning('학번, 이름, 이메일을 모두 입력해주세요.');
        return;
      }

      showSkeleton();
      try {
        const data = await callGAS({ action: 'findPassword', studentId, name, email });

        if (data.error) {
          showScreen('screen-find-pw');
          alertError(data.error);
          return;
        }

        showScreen('screen-find-pw');
        alertSuccess('비밀번호가 이메일로 전송되었습니다.');

      } catch (err) {
        showScreen('screen-find-pw');
        alertError('비밀번호 찾기 중 오류가 발생했습니다: ' + err.message);
      }
    }


    // ─── 비밀번호 변경 (신규 기능) ─────────────────────
    async function doChangePassword() {
      const studentId  = document.getElementById('chg-id').value.trim();
      const name       = document.getElementById('chg-name').value.trim();
      const email      = document.getElementById('chg-email').value.trim();
      const oldPw      = document.getElementById('chg-old-pw').value.trim();
      const newPw      = document.getElementById('chg-new-pw').value.trim();
      const newPwConfirm = document.getElementById('chg-new-pw-confirm').value.trim();

      if (!studentId || !name || !email || !oldPw || !newPw || !newPwConfirm) {
        alertWarning('모든 항목을 입력해주세요.');
        return;
      }

      if (newPw !== newPwConfirm) {
        alertError('새로운 비밀번호가 일치하지 않습니다. 다시 확인해주세요.');
        return;
      }

      if (oldPw === newPw) {
        alertWarning('새로운 비밀번호가 기존 비밀번호와 동일합니다. 다른 비밀번호를 입력해주세요.');
        return;
      }

      showSkeleton();
      try {
        const data = await callGAS({
          action: 'changePassword',
          studentId, name, email,
          oldPassword: oldPw,
          newPassword: newPw
        });

        if (data.error) {
          showScreen('screen-find-pw');
          switchPwTab('change');
          alertError(data.error);
          return;
        }

        // 성공 → 입력 초기화 후 로그인 화면으로
        ['chg-id','chg-name','chg-email','chg-old-pw','chg-new-pw','chg-new-pw-confirm']
          .forEach(id => document.getElementById(id).value = '');

        showScreen('screen-login');
        alertSuccess('비밀번호가 성공적으로 변경되었습니다! 새 비밀번호로 로그인해주세요.');

      } catch (err) {
        showScreen('screen-find-pw');
        switchPwTab('change');
        alertError('비밀번호 변경 중 오류가 발생했습니다: ' + err.message);
      }
    }

  </script>
</body>
