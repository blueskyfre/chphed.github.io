<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    body { font-family: 'Pretendard', sans-serif; }

    /* 스켈레톤 애니메이션 */
    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 0.75rem;
    }

    /* 모달 알림 애니메이션 */
    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-animate-in {
      animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* 입력창 포커스 효과 */
    .input-focus-effect {
      transition: all 0.2s ease;
    }
    .input-focus-effect:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    
    /* 카드 디자인 */
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex items-center justify-center p-6">

  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-indigo-50 blur-[120px]"></div>
    <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-blue-50 blur-[120px]"></div>
  </div>

  <div id="skeleton-screen" class="w-full max-w-[440px]">
    <div class="glass-card rounded-[2rem] shadow-sm p-8 sm:p-10">
      <div class="flex flex-col items-center mb-8">
        <div class="skeleton-box h-8 w-40 mb-3"></div>
        <div class="skeleton-box h-5 w-56"></div>
      </div>
      <div class="space-y-5">
        <div><div class="skeleton-box h-4 w-12 mb-2"></div><div class="skeleton-box h-14 w-full"></div></div>
        <div><div class="skeleton-box h-4 w-12 mb-2"></div><div class="skeleton-box h-14 w-full"></div></div>
        <div class="skeleton-box h-14 w-full"></div>
      </div>
    </div>
  </div>

  <div id="screen-preparing" class="hidden w-full max-w-[440px]">
    <div class="glass-card rounded-[2rem] shadow-xl p-8 sm:p-10 text-center">
      <div class="w-20 h-20 bg-indigo-50 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6">⏳</div>
      <h2 class="text-2xl font-bold text-slate-800 mb-3">서비스 준비 중</h2>
      <p id="preparing-message" class="text-slate-500 leading-relaxed"></p>
    </div>
  </div>

  <div id="screen-closed" class="hidden w-full max-w-[440px]">
    <div class="glass-card rounded-[2rem] shadow-xl p-8 sm:p-10 text-center">
      <div class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6">🚫</div>
      <h2 class="text-2xl font-bold text-red-600 mb-3">접수 마감</h2>
      <p id="closed-message" class="text-slate-500 leading-relaxed"></p>
    </div>
  </div>

  <div id="screen-login" class="hidden w-full max-w-[440px]">
    <div class="glass-card rounded-[2rem] shadow-2xl p-8 sm:p-10">
      <div class="text-center mb-10">
        <h1 id="main-title" class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight mb-2"></h1>
        <p id="sub-title" class="text-slate-500 font-medium"></p>
      </div>

      <div class="space-y-5">
        <div class="space-y-1.5">
          <label class="text-[13px] font-semibold text-slate-700 ml-1">아이디</label>
          <input type="email" id="login-id" placeholder="example@email.com"
            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus-effect text-base" />
        </div>
        <div class="space-y-1.5">
          <label class="text-[13px] font-semibold text-slate-700 ml-1">비밀번호</label>
          <input type="password" id="login-pw" placeholder="••••••••"
            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus-effect text-base" />
        </div>
        <button onclick="Index.doLogin()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-100 active:scale-[0.98] mt-2">
          로그인
        </button>
        <div class="grid grid-cols-2 gap-3 pt-2">
          <button onclick="Index.showScreen('screen-register')"
            class="py-3.5 px-4 border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold rounded-xl transition text-sm">
            회원가입
          </button>
          <button onclick="Index.showScreen('screen-find-pw')"
            class="py-3.5 px-4 border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold rounded-xl transition text-sm">
            계정 찾기
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-register" class="hidden w-full max-w-[440px]">
    <div class="glass-card rounded-[2rem] shadow-2xl p-8 sm:p-10">
      <h2 class="text-2xl font-bold text-slate-900 mb-8">새로운 계정 만들기</h2>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label class="text-[13px] font-semibold text-slate-700 ml-1">학번</label>
            <input type="text" id="reg-studentId" placeholder="3901"
              class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
          </div>
          <div class="space-y-1.5">
            <label class="text-[13px] font-semibold text-slate-700 ml-1">이름</label>
            <input type="text" id="reg-name" placeholder="홍길동"
              class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
          </div>
        </div>
        <div class="space-y-1.5">
          <label class="text-[13px] font-semibold text-slate-700 ml-1">아이디 (이메일)</label>
          <input type="email" id="reg-email" placeholder="example@email.com"
            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        </div>
        <div class="space-y-1.5">
          <label class="text-[13px] font-semibold text-slate-700 ml-1">비밀번호</label>
          <input type="password" id="reg-password" placeholder="8자 이상 입력"
            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        </div>
        <div class="space-y-1.5">
          <label class="text-[13px] font-semibold text-slate-700 ml-1">비밀번호 확인</label>
          <input type="password" id="reg-password-confirm" placeholder="한 번 더 입력"
            class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
          <p id="reg-pw-match-msg" class="text-[12px] mt-1 hidden font-medium"></p>
        </div>
        <button onclick="Index.doRegister()"
          class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-slate-200 active:scale-[0.98] mt-4">
          가입 완료
        </button>
        <button onclick="Index.showScreen('screen-login')"
          class="w-full text-slate-500 font-medium py-2 hover:text-slate-800 transition text-sm">
          이미 계정이 있으신가요? 로그인
        </button>
      </div>
    </div>
  </div>

  <div id="screen-find-pw" class="hidden w-full max-w-[440px]">
    <div class="glass-card rounded-[2rem] shadow-2xl p-8 sm:p-10">
      <h2 class="text-2xl font-bold text-slate-900 mb-8 text-center">계정 정보 확인</h2>
      <div class="space-y-4">
        <div class="space-y-1.5">
          <label class="text-[13px] font-semibold text-slate-700 ml-1">학번</label>
          <input type="text" id="find-studentId" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        </div>
        <div class="space-y-1.5">
          <label class="text-[13px] font-semibold text-slate-700 ml-1">이름</label>
          <input type="text" id="find-name" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        </div>
        <div class="space-y-1.5">
          <label class="text-[13px] font-semibold text-slate-700 ml-1">가입 시 이메일</label>
          <input type="email" id="find-email" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        </div>
        <div class="flex flex-col gap-3 pt-2">
          <button onclick="Index.doFindPassword()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 transition active:scale-[0.98]">
            임시 비밀번호 발송
          </button>
          <button onclick="Index.showScreen('screen-change-pw')"
            class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl transition">
            직접 비밀번호 변경
          </button>
        </div>
        <button onclick="Index.showScreen('screen-login')"
          class="w-full text-slate-500 font-medium py-2 hover:text-slate-800 transition text-sm">
          ← 로그인으로 돌아가기
        </button>
      </div>
    </div>
  </div>

  <div id="screen-change-pw" class="hidden w-full max-w-[440px]">
    <div class="glass-card rounded-[2rem] shadow-2xl p-8 sm:p-10">
      <h2 class="text-2xl font-bold text-slate-900 mb-8 text-center">비밀번호 변경</h2>
      <div class="space-y-3.5">
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="chpw-studentId" placeholder="학번" class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect text-sm" />
          <input type="text" id="chpw-name" placeholder="이름" class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect text-sm" />
        </div>
        <input type="email" id="chpw-email" placeholder="이메일 주소" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        <div class="h-px bg-slate-100 my-2"></div>
        <input type="password" id="chpw-current" placeholder="현재 비밀번호" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        <input type="password" id="chpw-new" placeholder="새로운 비밀번호" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        <input type="password" id="chpw-new-confirm" placeholder="새 비밀번호 확인" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none input-focus-effect" />
        <p id="chpw-match-msg" class="text-[12px] font-medium hidden"></p>
        
        <button onclick="Index.doChangePassword()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 transition mt-4 active:scale-[0.98]">
          비밀번호 변경하기
        </button>
        <button onclick="Index.showScreen('screen-find-pw')"
          class="w-full text-slate-500 font-medium py-2 hover:text-slate-800 transition text-sm">
          뒤로 가기
        </button>
      </div>
    </div>
  </div>

  <div id="screen-waiting" class="hidden w-full max-w-[440px]">
    <div class="glass-card rounded-[2rem] shadow-2xl p-8 sm:p-10 text-center">
      <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">🎉</div>
      <h2 class="text-2xl font-bold text-slate-800 mb-3">로그인 성공!</h2>
      <p id="waiting-message" class="text-slate-500 mb-8 leading-relaxed"></p>
      <button onclick="Index.showScreen('screen-login')"
        class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl transition">
        메인으로 이동
      </button>
    </div>
  </div>

  <div id="modal-notice" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-6 z-50">
    <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md max-h-[80vh] overflow-hidden flex flex-col modal-animate-in">
      <div class="p-8 pb-0">
        <h3 class="text-xl font-extrabold text-slate-900 mb-6">📢 중요 안내사항</h3>
      </div>
      <div id="modal-notice-content" class="px-8 overflow-y-auto flex-1 space-y-4"></div>
      <div class="p-8">
        <button onclick="Index.closeNoticeAndProceed()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-indigo-100">
          내용을 확인했습니다
        </button>
      </div>
    </div>
  </div>

  <div id="modal-alert" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-6 z-[60]">
    <div id="modal-alert-box" class="bg-white rounded-[2rem] shadow-2xl w-full max-w-[360px] p-8 text-center">
      <div id="modal-alert-icon" class="text-4xl mb-4"></div>
      <h3 id="modal-alert-title" class="text-lg font-bold text-slate-900 mb-2"></h3>
      <p id="modal-alert-message" class="text-slate-500 text-sm sm:text-base whitespace-pre-wrap mb-8 leading-relaxed"></p>
      <button onclick="Index.closeAlert()" id="modal-alert-btn" class="w-full font-bold py-4 rounded-2xl transition"></button>
    </div>
  </div>

  <div id="loading-overlay" class="hidden fixed inset-0 bg-white/60 backdrop-blur-[2px] flex items-center justify-center z-40">
    <div class="flex flex-col items-center gap-4">
      <div class="flex gap-1.5">
        <div class="w-3 h-3 bg-indigo-600 rounded-full animate-bounce"></div>
        <div class="w-3 h-3 bg-indigo-600 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
        <div class="w-3 h-3 bg-indigo-600 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
      </div>
      <p id="loading-text" class="text-slate-600 font-semibold animate-pulse">처리 중...</p>
    </div>
  </div>

  <script>
    var Index = (function() {
      // [기존 코드 로직 유지 - 변경 없음]
      var _WEB_APP_URL     = Config.DEPLOY;
      var _GITHUB_PAGE_URL = Config.GITHUB;
      var _rulesData     = null;
      var _loginUserData = null;
      var _alertCallback = null;

      async function _apiGet(action, params) {
        params = params || {};
        var url = new URL(_WEB_APP_URL);
        url.searchParams.set('action', action);
        for (var key in params) { if (params.hasOwnProperty(key)) url.searchParams.set(key, params[key]); }
        var response = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
        if (!response.ok) throw new Error('서버 응답 오류');
        return await response.json();
      }

      async function _apiPost(data) {
        var response = await fetch(_WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data),
          redirect: 'follow'
        });
        if (!response.ok) throw new Error('서버 응답 오류');
        return await response.json();
      }

      function _showScreen(screenId) {
        document.getElementById('skeleton-screen').classList.add('hidden');
        var screens = document.querySelectorAll('[id^="screen-"]');
        screens.forEach(function(s) { s.classList.add('hidden'); });
        var target = document.getElementById(screenId);
        if (target) target.classList.remove('hidden');
      }

      function _showLoading(text) {
        document.getElementById('loading-text').textContent = text || '처리 중...';
        document.getElementById('loading-overlay').classList.remove('hidden');
      }

      function _hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

      function _showAlert(message, type, callback) {
        if (!type) {
          if (/완료|성공|발송/.test(message)) type = 'success';
          else if (/오류|실패|올바르지|않습니다|없습니다|아닙니다|일치하지/.test(message)) type = 'error';
          else type = 'info';
        }
        var config = {
          success: { icon: '✨', title: '완료', btnClass: 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-100' },
          error:   { icon: '❌', title: '알림', btnClass: 'bg-slate-900 hover:bg-slate-800 text-white shadow-lg shadow-slate-200' },
          info:    { icon: '💡', title: '안내', btnClass: 'bg-indigo-600 hover:bg-indigo-700 text-white' },
          warning: { icon: '⚠️', title: '주의', btnClass: 'bg-amber-500 hover:bg-amber-600 text-white' }
        };
        var cfg = config[type] || config.info;
        _alertCallback = callback || null;
        document.getElementById('modal-alert-icon').textContent = cfg.icon;
        document.getElementById('modal-alert-title').textContent = cfg.title;
        document.getElementById('modal-alert-message').textContent = message;
        document.getElementById('modal-alert-btn').textContent = '확인';
        document.getElementById('modal-alert-btn').className = 'w-full font-bold py-4 rounded-2xl transition ' + cfg.btnClass;
        var modal = document.getElementById('modal-alert');
        modal.classList.remove('hidden');
        document.getElementById('modal-alert-box').classList.add('modal-animate-in');
      }

      function _closeAlert() {
        document.getElementById('modal-alert').classList.add('hidden');
        if (_alertCallback) { _alertCallback(); _alertCallback = null; }
      }

      function _showSkeleton(text) {
        var el = document.getElementById('skeleton-screen');
        if (el) {
          el.classList.remove('hidden');
          if (text) document.getElementById('skeleton-status-text')?.textContent = text;
        }
      }

      function _hideSkeleton() { document.getElementById('skeleton-screen')?.classList.add('hidden'); }

      function _setupPasswordMatch(pwId, confirmId, msgId) {
        var pwField = document.getElementById(confirmId);
        if (!pwField) return;
        pwField.addEventListener('input', function() {
          var pw = document.getElementById(pwId).value;
          var confirm = this.value;
          var msgEl = document.getElementById(msgId);
          if (!confirm) { msgEl.classList.add('hidden'); return; }
          msgEl.classList.remove('hidden');
          if (pw === confirm) {
            msgEl.textContent = '✓ 비밀번호가 일치합니다.';
            msgEl.className = 'text-[12px] mt-1 text-indigo-600 font-medium';
          } else {
            msgEl.textContent = '✗ 비밀번호가 일치하지 않습니다.';
            msgEl.className = 'text-[12px] mt-1 text-red-500 font-medium';
          }
        });
      }

      async function _initialize() {
        try {
          var result = await _apiGet('getRules');
          if (!result.success) throw new Error(result.message);
          _rulesData = result.data;
          var today = new Date().toISOString().split('T')[0];
          if (today < _rulesData.registerDate) {
            document.getElementById('preparing-message').textContent = _rulesData.registerDate + ' 부터 서비스가 시작됩니다.';
            _showScreen('screen-preparing');
          } else if (today >= _rulesData.closeDate) {
            document.getElementById('closed-message').textContent = '마감일(' + _rulesData.closeDate + ')이 지났습니다.';
            _showScreen('screen-closed');
          } else {
            document.getElementById('main-title').textContent = _rulesData.title;
            document.getElementById('sub-title').textContent = _rulesData.subtitle;
            _showScreen('screen-login');
          }
        } catch (err) {
          _hideSkeleton();
          _showAlert('데이터를 불러오지 못했습니다.\n' + err.message, 'error');
        }
      }

      async function _doRegister() {
        var studentId = document.getElementById('reg-studentId').value.trim();
        var name = document.getElementById('reg-name').value.trim();
        var email = document.getElementById('reg-email').value.trim();
        var password = document.getElementById('reg-password').value.trim();
        var confirm = document.getElementById('reg-password-confirm').value.trim();
        if (!studentId || !name || !email || !password) { _showAlert('모든 항목을 입력해 주세요.', 'warning'); return; }
        if (password !== confirm) { _showAlert('비밀번호가 일치하지 않습니다.', 'error'); return; }
        _showLoading('회원가입 처리 중...');
        try {
          var result = await _apiPost({ action: 'register', studentId: studentId, name: name, email: email, password: password });
          if (result.success) _showAlert(result.message, 'success', function() { _showScreen('screen-login'); });
          else _showAlert(result.message, 'error');
        } catch (err) { _showAlert('오류가 발생했습니다.', 'error'); } finally { _hideLoading(); }
      }

      async function _doLogin() {
        var userId = document.getElementById('login-id').value.trim();
        var password = document.getElementById('login-pw').value.trim();
        if (!userId || !password) { _showAlert('아이디와 비밀번호를 입력해 주세요.', 'warning'); return; }
        _showLoading('로그인 중...');
        try {
          var result = await _apiPost({ action: 'login', userId: userId, password: password });
          if (!result.success) { _showAlert(result.message, 'error'); return; }
          _loginUserData = result.data;
          if (_loginUserData.userType === 'admin') {
            sessionStorage.setItem('adminInfo', JSON.stringify(_loginUserData));
            window.location.href = _GITHUB_PAGE_URL + '/admin.html';
            return;
          }
          if (_loginUserData.notices && _loginUserData.notices.length > 0) _showNoticeModal(_loginUserData.notices);
          else _proceedAfterLogin();
        } catch (err) { _showAlert('로그인 중 오류가 발생했습니다.', 'error'); } finally { _hideLoading(); }
      }

      function _showNoticeModal(notices) {
        var contentDiv = document.getElementById('modal-notice-content');
        contentDiv.innerHTML = '';
        notices.forEach(function(notice) {
          var div = document.createElement('div');
          div.className = 'bg-slate-50 border border-slate-100 rounded-2xl p-5';
          div.innerHTML = '<p class="font-bold text-indigo-600 mb-2 text-sm">[' + notice.type + ']</p>' +
                          '<p class="text-slate-700 leading-relaxed text-[15px]">' + notice.content + '</p>';
          contentDiv.appendChild(div);
        });
        document.getElementById('modal-notice').classList.remove('hidden');
      }

      function _closeNoticeAndProceed() {
        document.getElementById('modal-notice').classList.add('hidden');
        _proceedAfterLogin();
      }

      function _proceedAfterLogin() {
        var today = new Date().toISOString().split('T')[0];
        if (today < _rulesData.inputDate) {
          document.getElementById('waiting-message').textContent = _rulesData.inputDate + ' 부터 자료 입력이 가능합니다.';
          _showScreen('screen-waiting');
        } else {
          var params = new URLSearchParams({ studentId: _loginUserData.studentId, name: _loginUserData.name });
          window.location.href = _GITHUB_PAGE_URL + '/firstpage.html?' + params.toString();
        }
      }

      async function _doFindPassword() {
        var sid = document.getElementById('find-studentId').value.trim();
        var name = document.getElementById('find-name').value.trim();
        var email = document.getElementById('find-email').value.trim();
        if (!sid || !name || !email) { _showAlert('모든 항목을 입력해 주세요.', 'warning'); return; }
        _showLoading('비밀번호 찾는 중...');
        try {
          var result = await _apiPost({ action: 'findPassword', studentId: sid, name: name, email: email });
          if (result.success) _showAlert(result.message, 'success', function() { _showScreen('screen-login'); });
          else _showAlert(result.message, 'error');
        } catch (err) { _showAlert('오류가 발생했습니다.', 'error'); } finally { _hideLoading(); }
      }

      async function _doChangePassword() {
        var sid = document.getElementById('chpw-studentId').value.trim();
        var name = document.getElementById('chpw-name').value.trim();
        var email = document.getElementById('chpw-email').value.trim();
        var cur = document.getElementById('chpw-current').value.trim();
        var newP = document.getElementById('chpw-new').value.trim();
        var confirm = document.getElementById('chpw-new-confirm').value.trim();
        if (!sid || !name || !email || !cur || !newP || !confirm) { _showAlert('모든 항목을 입력해 주세요.', 'warning'); return; }
        if (newP !== confirm) { _showAlert('새 비밀번호가 일치하지 않습니다.', 'error'); return; }
        _showLoading('비밀번호 변경 중...');
        try {
          var result = await _apiPost({ action: 'changePassword', studentId: sid, name: name, email: email, currentPassword: cur, newPassword: newP });
          if (result.success) _showAlert(result.message, 'success', function() { _showScreen('screen-login'); });
          else _showAlert(result.message, 'error');
        } catch (err) { _showAlert('오류가 발생했습니다.', 'error'); } finally { _hideLoading(); }
      }

      window.addEventListener('DOMContentLoaded', function() {
        _setupPasswordMatch('reg-password', 'reg-password-confirm', 'reg-pw-match-msg');
        _setupPasswordMatch('chpw-new', 'chpw-new-confirm', 'chpw-match-msg');
        _initialize();
      });

      return {
        showScreen: _showScreen, showLoading: _showLoading, hideLoading: _hideLoading,
        showAlert: _showAlert, closeAlert: _closeAlert, showSkeleton: _showSkeleton, hideSkeleton: _hideSkeleton,
        doLogin: _doLogin, doRegister: _doRegister, doFindPassword: _doFindPassword, doChangePassword: _doChangePassword,
        closeNoticeAndProceed: _closeNoticeAndProceed
      };
    })();
  </script>
</body>
</html>
