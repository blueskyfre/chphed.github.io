<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- ★ 모바일 반응형 필수 메타태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 관리 시스템</title>

    <!-- ★ Tailwind CSS CDN - 이 한 줄이면 Tailwind 사용 가능 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Tailwind로 처리 안 되는 커스텀 스타일만 여기에 */
        .loading-overlay {
            background: rgba(0, 0, 0, 0.5);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<!-- ============================================================ -->
<!--  설정 변수                                                     -->
<!-- ============================================================ -->
<script>
    const GITHUB_PAGE_URL = 'https://blueskyfre.github.io/chphed.github.io';
    const WEB_APP_URL     = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';
</script>

<!-- ============================================================ -->
<!--  메인 컨테이너                                                  -->
<!-- ============================================================ -->
<div id="app" class="w-full max-w-md mx-auto">

    <!-- ==================== 로딩 오버레이 ==================== -->
    <div id="loadingOverlay" class="loading-overlay fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-2xl p-8 flex flex-col items-center shadow-xl">
            <div class="spinner w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
            <p id="loadingText" class="text-gray-700 font-medium">처리 중...</p>
            <!-- 퍼센트 로딩바 -->
            <div id="progressBarWrap" class="w-48 bg-gray-200 rounded-full h-3 mt-3 hidden">
                <div id="progressBar" class="bg-blue-500 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
            </div>
            <p id="progressText" class="text-sm text-gray-500 mt-1 hidden">0%</p>
        </div>
    </div>

    <!-- ==================== 공지사항 모달 ==================== -->
    <div id="noticeModal" class="fixed inset-0 z-40 flex items-center justify-center p-4 hidden">
        <div class="loading-overlay fixed inset-0" onclick="closeNoticeModal()"></div>
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg z-50 overflow-hidden">
            <div class="bg-blue-600 px-6 py-4">
                <h3 class="text-white text-lg font-bold">📢 공지사항</h3>
            </div>
            <div id="noticeContent" class="px-6 py-5 max-h-[60vh] overflow-y-auto">
                <p class="text-gray-700 whitespace-pre-line"></p>
            </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-end">
                <button onclick="closeNoticeModal()"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 
                           active:scale-95 transition-all font-medium">
                    확인
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 준비중 화면 ==================== -->
    <div id="screen-notReady" class="hidden">
        <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
            <div class="text-6xl mb-4">⏳</div>
            <h1 id="notReadyTitle" class="text-2xl font-bold text-gray-800 mb-2"></h1>
            <h2 id="notReadySubtitle" class="text-lg text-gray-500 mb-6"></h2>
            <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
                <p class="text-yellow-800 font-medium">
                    회원가입은 <span id="notReadyDate" class="font-bold text-yellow-900"></span>부터 가능합니다.
                </p>
            </div>
        </div>
    </div>

    <!-- ==================== 마감 화면 ==================== -->
    <div id="screen-closed" class="hidden">
        <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
            <div class="text-6xl mb-4">🚫</div>
            <h1 id="closedTitle" class="text-2xl font-bold text-gray-800 mb-2"></h1>
            <h2 id="closedSubtitle" class="text-lg text-gray-500 mb-6"></h2>
            <div class="bg-red-50 border border-red-200 rounded-xl p-4">
                <p class="text-red-800 font-medium">
                    마감 날짜가 지났습니다.<br>더 이상 접속할 수 없습니다.
                </p>
            </div>
        </div>
    </div>

    <!-- ==================== 로그인 화면 ==================== -->
    <div id="screen-login" class="hidden">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <!-- 헤더 -->
            <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-6 py-8 text-center">
                <h1 id="mainTitle" class="text-2xl sm:text-3xl font-bold text-white mb-1"></h1>
                <h2 id="subTitle" class="text-sm sm:text-base text-blue-200"></h2>
            </div>
            <!-- 입력 폼 -->
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
                    <input type="email" id="loginId" placeholder="example@email.com"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-blue-500 focus:border-blue-500 
                               outline-none transition-all text-sm sm:text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="loginPw" placeholder="비밀번호를 입력하세요"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-blue-500 focus:border-blue-500 
                               outline-none transition-all text-sm sm:text-base"
                        onkeypress="if(event.key==='Enter') doLogin()">
                </div>
                <!-- 버튼 그룹 -->
                <button onclick="doLogin()"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold 
                           hover:bg-blue-700 active:scale-[0.98] transition-all
                           text-sm sm:text-base">
                    로그인
                </button>
                <div class="flex gap-3">
                    <button onclick="showScreen('screen-register')"
                        class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-lg font-medium 
                               hover:bg-gray-200 active:scale-[0.98] transition-all
                               text-xs sm:text-sm">
                        회원가입
                    </button>
                    <button onclick="showScreen('screen-findPw')"
                        class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-lg font-medium 
                               hover:bg-gray-200 active:scale-[0.98] transition-all
                               text-xs sm:text-sm">
                        비밀번호 찾기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 회원가입 화면 ==================== -->
    <div id="screen-register" class="hidden">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="bg-gradient-to-r from-green-600 to-green-800 px-6 py-6 text-center">
                <h2 class="text-xl sm:text-2xl font-bold text-white">회원가입</h2>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">학번</label>
                    <input type="text" id="regStudentId" placeholder="예시) 3901"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-green-500 focus:border-green-500 
                               outline-none transition-all text-sm sm:text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
                    <input type="text" id="regName" placeholder="예시) 홍길동 - 반드시 한글로 입력하세요"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-green-500 focus:border-green-500 
                               outline-none transition-all text-sm sm:text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">아이디 (이메일)</label>
                    <input type="email" id="regEmail" placeholder="예시) example@email.com - 이메일 주소를 입력"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-green-500 focus:border-green-500 
                               outline-none transition-all text-sm sm:text-base">
                    <p class="text-xs text-gray-400 mt-1">⚠️ 비밀번호 분실 시 이 이메일로 비밀번호를 보내드립니다.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="regPw" placeholder="비밀번호를 입력하세요"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-green-500 focus:border-green-500 
                               outline-none transition-all text-sm sm:text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호 확인</label>
                    <input type="password" id="regPwConfirm" placeholder="비밀번호를 다시 입력하세요"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-green-500 focus:border-green-500 
                               outline-none transition-all text-sm sm:text-base">
                </div>
                <button onclick="doRegister()"
                    class="w-full bg-green-600 text-white py-3 rounded-lg font-bold 
                           hover:bg-green-700 active:scale-[0.98] transition-all
                           text-sm sm:text-base">
                    가입하기
                </button>
                <button onclick="showScreen('screen-login')"
                    class="w-full bg-gray-100 text-gray-700 py-2.5 rounded-lg font-medium 
                           hover:bg-gray-200 active:scale-[0.98] transition-all
                           text-xs sm:text-sm">
                    ← 로그인으로 돌아가기
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 비밀번호 찾기 화면 ==================== -->
    <div id="screen-findPw" class="hidden">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="bg-gradient-to-r from-orange-500 to-orange-700 px-6 py-6 text-center">
                <h2 class="text-xl sm:text-2xl font-bold text-white">비밀번호 찾기</h2>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">학번</label>
                    <input type="text" id="findStudentId" placeholder="예시) 3901"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-orange-500 focus:border-orange-500 
                               outline-none transition-all text-sm sm:text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
                    <input type="text" id="findName" placeholder="예시) 홍길동"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-orange-500 focus:border-orange-500 
                               outline-none transition-all text-sm sm:text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                    <input type="email" id="findEmail" placeholder="가입 시 입력한 이메일 주소"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg 
                               focus:ring-2 focus:ring-orange-500 focus:border-orange-500 
                               outline-none transition-all text-sm sm:text-base">
                </div>
                <button onclick="doFindPassword()"
                    class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold 
                           hover:bg-orange-700 active:scale-[0.98] transition-all
                           text-sm sm:text-base">
                    비밀번호 찾기
                </button>
                <button onclick="showScreen('screen-login')"
                    class="w-full bg-gray-100 text-gray-700 py-2.5 rounded-lg font-medium 
                           hover:bg-gray-200 active:scale-[0.98] transition-all
                           text-xs sm:text-sm">
                    ← 로그인으로 돌아가기
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 자료입력 대기 화면 ==================== -->
    <div id="screen-waitInput" class="hidden">
        <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
            <div class="text-6xl mb-4">📅</div>
            <h2 class="text-xl font-bold text-gray-800 mb-4">로그인 성공!</h2>
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
                <p class="text-blue-800 font-medium">
                    자료 입력은 <span id="inputStartDate" class="font-bold text-blue-900"></span>부터 가능합니다.
                </p>
            </div>
            <button onclick="showScreen('screen-login')"
                class="mt-6 bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg font-medium 
                       hover:bg-gray-200 active:scale-[0.98] transition-all text-sm">
                ← 돌아가기
            </button>
        </div>
    </div>

</div> <!-- /app -->

<!-- ============================================================ -->
<!--  JavaScript                                                    -->
<!-- ============================================================ -->
<script>
    /* ── 전역 변수 ── */
    let rulesData = null;

    /* ── 초기화 ── */
    window.addEventListener('DOMContentLoaded', init);

    async function init() {
        showLoading('설정을 불러오는 중...');
        try {
            const res  = await fetch(`${WEB_APP_URL}?action=getRules`);
            const data = await res.json();
            if (data.result !== 'success') throw new Error(data.message);

            rulesData = data;
            decideScreen();
        } catch (e) {
            alert('초기 설정을 불러오지 못했습니다.\n' + e.message);
        } finally {
            hideLoading();
        }
    }

    /* ── 날짜 비교 → 화면 결정 ── */
    function decideScreen() {
        const today     = getToday();
        const regStart  = rulesData.registerStart;   // B5
        const inputStart= rulesData.inputStart;      // B6
        const deadline  = rulesData.deadline;         // B7

        if (today < regStart) {
            document.getElementById('notReadyTitle').textContent    = rulesData.mainTitle;
            document.getElementById('notReadySubtitle').textContent = rulesData.subTitle;
            document.getElementById('notReadyDate').textContent     = regStart;
            showScreen('screen-notReady');
        } else if (today >= deadline) {
            document.getElementById('closedTitle').textContent    = rulesData.mainTitle;
            document.getElementById('closedSubtitle').textContent = rulesData.subTitle;
            showScreen('screen-closed');
        } else {
            document.getElementById('mainTitle').textContent = rulesData.mainTitle;
            document.getElementById('subTitle').textContent  = rulesData.subTitle;
            showScreen('screen-login');
        }
    }

    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    /* ── 화면 전환 ── */
    function showScreen(id) {
        document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById(id)?.classList.remove('hidden');
    }

    /* ── 로딩 ── */
    function showLoading(text = '처리 중...') {
        document.getElementById('loadingText').textContent = text;
        document.getElementById('loadingOverlay').classList.remove('hidden');
    }
    function hideLoading() {
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('progressBarWrap').classList.add('hidden');
        document.getElementById('progressText').classList.add('hidden');
    }

    /* ── 로그인 ── */
    async function doLogin() {
        const id = document.getElementById('loginId').value.trim();
        const pw = document.getElementById('loginPw').value.trim();
        if (!id || !pw) return alert('아이디와 비밀번호를 모두 입력해주세요.');

        showLoading('로그인 중...');
        try {
            const res  = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'login', id, pw })
            });
            const data = await res.json();
            if (data.result !== 'success') throw new Error(data.message);

            hideLoading();

            // 공지사항 처리
            if (data.notice && data.notice.trim() !== '') {
                showNotice(data.notice, () => afterLoginRoute(data));
            } else {
                afterLoginRoute(data);
            }
        } catch (e) {
            hideLoading();
            alert(e.message);
        }
    }

    function afterLoginRoute(data) {
        const today      = getToday();
        const inputStart = rulesData.inputStart; // B6

        if (today < inputStart) {
            document.getElementById('inputStartDate').textContent = inputStart;
            showScreen('screen-waitInput');
        } else {
            // 로그인 정보를 sessionStorage에 저장 후 이동
            sessionStorage.setItem('loginUser', JSON.stringify({
                studentId: data.studentId,
                name: data.name,
                id: data.id
            }));
            window.location.href = GITHUB_PAGE_URL + '/firstpage.html';
        }
    }

    /* ── 공지사항 모달 ── */
    let noticeCallback = null;
    function showNotice(content, callback) {
        document.querySelector('#noticeContent p').textContent = content;
        document.getElementById('noticeModal').classList.remove('hidden');
        noticeCallback = callback || null;
    }
    function closeNoticeModal() {
        document.getElementById('noticeModal').classList.add('hidden');
        if (noticeCallback) { noticeCallback(); noticeCallback = null; }
    }

    /* ── 회원가입 ── */
    async function doRegister() {
        const studentId = document.getElementById('regStudentId').value.trim();
        const name      = document.getElementById('regName').value.trim();
        const email     = document.getElementById('regEmail').value.trim();
        const pw        = document.getElementById('regPw').value.trim();
        const pwConfirm = document.getElementById('regPwConfirm').value.trim();

        if (!studentId || !name || !email || !pw || !pwConfirm) return alert('모든 항목을 입력해주세요.');
        if (pw !== pwConfirm) return alert('비밀번호가 일치하지 않습니다.');
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alert('올바른 이메일 형식으로 입력해주세요.');
        if (!/^[가-힣]+$/.test(name)) return alert('이름은 한글로만 입력해주세요.');

        showLoading('회원가입 처리 중...');
        try {
            const res  = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'register', studentId, name, email, pw })
            });
            const data = await res.json();
            if (data.result !== 'success') throw new Error(data.message);

            hideLoading();
            alert('회원가입이 완료되었습니다!\n로그인해 주세요.');
            showScreen('screen-login');
            // 가입한 이메일을 로그인 아이디에 자동 입력
            document.getElementById('loginId').value = email;
        } catch (e) {
            hideLoading();
            alert(e.message);
        }
    }

    /* ── 비밀번호 찾기 ── */
    async function doFindPassword() {
        const studentId = document.getElementById('findStudentId').value.trim();
        const name      = document.getElementById('findName').value.trim();
        const email     = document.getElementById('findEmail').value.trim();

        if (!studentId || !name || !email) return alert('모든 항목을 입력해주세요.');

        showLoading('비밀번호 찾기 중...');
        try {
            const res  = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'findPassword', studentId, name, email })
            });
            const data = await res.json();
            if (data.result !== 'success') throw new Error(data.message);

            hideLoading();
            alert('입력하신 이메일로 비밀번호를 발송했습니다.\n이메일을 확인해 주세요.');
            showScreen('screen-login');
        } catch (e) {
            hideLoading();
            alert(e.message);
        }
    }
</script>

</body>
</html>
