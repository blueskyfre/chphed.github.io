<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       ✅ [추가] 공통 재사용 스타일 - 스켈레톤 UI & 모달 알림
       향후 다른 페이지에서도 이 style 블록을 복사하여 재사용 가능
       ============================================================ */

    /* 스켈레톤 애니메이션 */
    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #dbeafe 25%, #eff6ff 50%, #dbeafe 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 0.5rem;
    }

    /* 모달 알림 페이드 인/아웃 */
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes modalFadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.9); }
    }
    .modal-animate-in {
      animation: modalFadeIn 0.25s ease-out forwards;
    }
    .modal-animate-out {
      animation: modalFadeOut 0.2s ease-in forwards;
    }

    /* ============================================================
       🎨 디자인 변수 & 공통 스타일
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }

    /* 배경 래퍼 */
    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* 배경 이미지 레이어 */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-color: #eef4fb;
      background-image: none; /* JS로 설정 */
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
    }
    /* 배경 위 은은한 오버레이 */
    #bg-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(219,234,254,0.55) 0%,
        rgba(239,246,255,0.40) 50%,
        rgba(207,226,255,0.50) 100%
      );
    }

    /* 콘텐츠 레이어 (배경 위) */
    #content-layer {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 1rem 15rem 1rem 1rem;     /* 두번째 rem 숫자를 변경하면 로그인창의 위치를 우측으로 부터 거리 조절 가능 */
    }
    @media (max-width: 639px) {
    #content-layer {
      justify-content: center;
      padding: 1rem;
      }
    }
    /* 카드 */
    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(186,220,255,0.55);
      box-shadow:
        0 2px 8px rgba(59,130,246,0.07),
        0 12px 40px rgba(59,130,246,0.10);
      padding: 2.5rem 2rem;
    }
    @media (min-width: 640px) {
      .card { padding: 3rem 2.5rem; }
    }

    /* 페이지 타이틀 */
    .page-title {
      font-size: 1.35rem;
      font-weight: 600;
      color: #1e3a5f;
      letter-spacing: -0.02em;
    }
    @media (min-width: 640px) {
      .page-title { font-size: 1.5rem; }
    }

    /* 섹션 구분선 */
    .divider {
      width: 2rem;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #93c5fd);
      border-radius: 2px;
      margin: 0.6rem auto 0;
    }

    /* 라벨 */
    .field-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #4b7ab8;
      margin-bottom: 0.4rem;
      letter-spacing: 0.01em;
    }

    /* 입력 필드 */
    .field-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #bfdbfe;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1e3a5f;
      background: rgba(239,246,255,0.7);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .field-input::placeholder { color: #a8c4e0; }
    .field-input:focus {
      border-color: #3b82f6;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    /* 버튼 - 기본(주요 액션) */
    .btn-primary {
      width: 100%;
      padding: 0.8rem 1rem;
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: filter 0.18s, transform 0.12s, box-shadow 0.18s;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 8px rgba(37,99,235,0.18);
    }
    .btn-primary:hover {
      filter: brightness(1.08);
      box-shadow: 0 4px 14px rgba(37,99,235,0.28);
    }
    .btn-primary:active { transform: scale(0.98); }

    /* 버튼 - 보조(텍스트형) */
    .btn-ghost {
      width: 100%;
      padding: 0.7rem 1rem;
      background: transparent;
      color: #3b82f6;
      font-size: 0.85rem;
      font-weight: 400;
      font-family: 'Noto Sans KR', sans-serif;
      border: 1.5px solid #bfdbfe;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
    }
    .btn-ghost:hover {
      border-color: #93c5fd;
      color: #1d4ed8;
      background: rgba(219,234,254,0.45);
    }

    /* 버튼 그룹 - 두 개 나란히 */
    .btn-row {
      display: flex;
      gap: 0.6rem;
    }
    .btn-row .btn-ghost { flex: 1; }

    /* 작은 힌트 텍스트 */
    .field-hint {
      font-size: 0.72rem;
      color: #7db0d8;
      margin-top: 0.3rem;
    }

    /* 스켈레톤 내 버튼 shimmer */
    .skeleton-btn {
      background: linear-gradient(90deg, #dbeafe 25%, #eff6ff 50%, #dbeafe 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
      border-radius: 10px;
    }

    /* 로딩 점 */
    .dot-bounce {
      width: 6px;
      height: 6px;
      background: #3b82f6;
      border-radius: 50%;
    }

    /* 공지 항목 */
    .notice-item {
      background: #f0f7ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 1rem;
    }
    .notice-tag {
      font-size: 0.75rem;
      font-weight: 600;
      color: #2563eb;
      margin-bottom: 0.4rem;
    }

    /* 상태 화면 아이콘 영역 */
    .status-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .status-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1e3a5f;
      margin-bottom: 0.5rem;
    }
    .status-msg {
      font-size: 0.88rem;
      color: #7db0d8;
      line-height: 1.6;
    }

    /* 모달 알림창 */
    .alert-box {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 18px;
      border: 1px solid #bfdbfe;
      box-shadow: 0 20px 60px rgba(37,99,235,0.13);
      width: 100%;
      max-width: 22rem;
      padding: 2rem 1.75rem;
    }

    /* 모달 알림 버튼 (type별) */
    .alert-btn-success { background: linear-gradient(135deg,#2563eb,#3b82f6); color: #fff; }
    .alert-btn-success:hover { filter: brightness(1.08); }
    .alert-btn-error   { background: #ef4444; color: #fff; }
    .alert-btn-error:hover   { background: #dc2626; }
    .alert-btn-info    { background: linear-gradient(135deg,#2563eb,#60a5fa); color: #fff; }
    .alert-btn-info:hover    { filter: brightness(1.08); }
    .alert-btn-warning { background: #f59e0b; color: #fff; }
    .alert-btn-warning:hover { background: #d97706; }

    /* 로딩 오버레이 카드 */
    .loading-card {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 14px;
      border: 1px solid #bfdbfe;
      padding: 1.5rem 2rem;
      box-shadow: 0 8px 32px rgba(37,99,235,0.12);
    }

    /* 필드 스페이싱 */
    .fields { display: flex; flex-direction: column; gap: 1.1rem; }

    /* 서브 타이틀 색상 */
    #sub-title { color: #5a8fc4; }
  </style>
</head>
<body>

  <!-- 배경 이미지 레이어 -->
  <div id="bg-layer"></div>

  <!-- 콘텐츠 래퍼 -->
  <div id="content-layer">

  <!-- ============================================================ -->
  <!-- ⚙️ 설정 변수 -->
  <!-- ============================================================ -->

  <!-- ============================================================ -->
  <!-- 💀 [추가] 스켈레톤 UI (초기 로딩 시 표시) -->
  <!-- ============================================================ -->
  <div id="skeleton-screen" class="w-full max-w-md">
    <div class="card">
      <!-- 제목 스켈레톤 -->
      <div class="flex flex-col items-center mb-8">
        <div class="skeleton-box h-6 w-44 mb-3"></div>
        <div class="skeleton-box h-4 w-32"></div>
      </div>
      <!-- 입력 필드 스켈레톤 -->
      <div class="fields">
        <div>
          <div class="skeleton-box h-3 w-14 mb-2"></div>
          <div class="skeleton-box h-11 w-full"></div>
        </div>
        <div>
          <div class="skeleton-box h-3 w-18 mb-2"></div>
          <div class="skeleton-box h-11 w-full"></div>
        </div>
        <div class="skeleton-btn h-11 w-full"></div>
        <div class="btn-row">
          <div class="skeleton-box h-10 flex-1"></div>
          <div class="skeleton-box h-10 flex-1"></div>
        </div>
      </div>
      <!-- 로딩 상태 표시 텍스트 -->
      <div class="mt-8 flex items-center justify-center gap-1.5">
        <div class="dot-bounce animate-bounce" style="animation-delay: 0s;"></div>
        <div class="dot-bounce animate-bounce" style="animation-delay: 0.15s;"></div>
        <div class="dot-bounce animate-bounce" style="animation-delay: 0.3s;"></div>
        <span id="skeleton-status-text" class="text-xs text-gray-400 ml-2">데이터를 불러오는 중...</span>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📌 준비중 화면 -->
  <!-- ============================================================ -->
  <div id="screen-preparing" class="hidden w-full max-w-md">
    <div class="card text-center">
      <div class="status-icon">⏳</div>
      <h2 class="status-title">서비스 준비 중</h2>
      <p id="preparing-message" class="status-msg"></p>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🚫 마감 화면 -->
  <!-- ============================================================ -->
  <div id="screen-closed" class="hidden w-full max-w-md">
    <div class="card text-center">
      <div class="status-icon">🚫</div>
      <h2 class="status-title" style="color:#ef4444;">마감되었습니다</h2>
      <p id="closed-message" class="status-msg"></p>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🔐 로그인 화면 -->
  <!-- ============================================================ -->
  <div id="screen-login" class="hidden w-full max-w-md">
    <div class="card">
      <div class="text-center mb-8">
        <h1 id="main-title" class="page-title"></h1>
        <div class="divider"></div>
        <p id="sub-title" class="text-sm text-gray-400 mt-3"></p>
      </div>

      <div class="fields">
        <div>
          <label class="field-label">아이디</label>
          <input type="email" id="login-id" placeholder="example@email.com" class="field-input" />
        </div>
        <div>
          <label class="field-label">비밀번호</label>
          <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" class="field-input" />
        </div>
        <button onclick="Index.doLogin()" class="btn-primary">로그인</button>
        <div class="btn-row">
          <button onclick="Index.showScreen('screen-register')" class="btn-ghost">회원가입</button>
          <button onclick="Index.showScreen('screen-find-pw')" class="btn-ghost">비밀번호 찾기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📝 회원가입 화면 -->
  <!-- ============================================================ -->
  <div id="screen-register" class="hidden w-full max-w-md">
    <div class="card">
      <div class="text-center mb-8">
        <h2 class="page-title">회원가입</h2>
        <div class="divider"></div>
      </div>
      <div class="fields">
        <div>
          <label class="field-label">학번</label>
          <input type="text" id="reg-studentId" placeholder="예시) 3901" class="field-input" />
        </div>
        <div>
          <label class="field-label">이름</label>
          <input type="text" id="reg-name" placeholder="홍길동 (반드시 한글로 입력하세요)" class="field-input" />
        </div>
        <div>
          <label class="field-label">아이디 (이메일)</label>
          <input type="email" id="reg-email" placeholder="example@email.com" class="field-input" />
          <p class="field-hint">※ 비밀번호 분실 시 이 이메일로 비밀번호를 발송합니다.</p>
        </div>
        <div>
          <label class="field-label">비밀번호</label>
          <input type="password" id="reg-password" placeholder="비밀번호를 입력하세요" class="field-input" />
        </div>
        <!-- ✅ [추가] 비밀번호 확인 입력 -->
        <div>
          <label class="field-label">비밀번호 확인</label>
          <input type="password" id="reg-password-confirm" placeholder="비밀번호를 다시 입력하세요" class="field-input" />
          <p id="reg-pw-match-msg" class="text-xs mt-1 hidden"></p>
        </div>
        <button onclick="Index.doRegister()" class="btn-primary">가입하기</button>
        <button onclick="Index.showScreen('screen-login')" class="btn-ghost">← 로그인으로 돌아가기</button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🔍 비밀번호 찾기 화면 -->
  <!-- ============================================================ -->
  <div id="screen-find-pw" class="hidden w-full max-w-md">
    <div class="card">
      <div class="text-center mb-8">
        <h2 class="page-title">비밀번호 찾기</h2>
        <div class="divider"></div>
      </div>
      <div class="fields">
        <div>
          <label class="field-label">학번</label>
          <input type="text" id="find-studentId" placeholder="예시) 3901" class="field-input" />
        </div>
        <div>
          <label class="field-label">이름</label>
          <input type="text" id="find-name" placeholder="예시) 홍길동" class="field-input" />
        </div>
        <div>
          <label class="field-label">이메일 (가입 시 입력한 이메일)</label>
          <input type="email" id="find-email" placeholder="example@email.com" class="field-input" />
        </div>
        <button onclick="Index.doFindPassword()" class="btn-primary">비밀번호 찾기</button>
        <!-- ✅ [추가] 비밀번호 변경 버튼 -->
        <button onclick="Index.showScreen('screen-change-pw')" class="btn-ghost">비밀번호 변경</button>
        <button onclick="Index.showScreen('screen-login')" class="btn-ghost">← 로그인으로 돌아가기</button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🔄 [추가] 비밀번호 변경 화면 -->
  <!-- ============================================================ -->
  <div id="screen-change-pw" class="hidden w-full max-w-md">
    <div class="card">
      <div class="text-center mb-8">
        <h2 class="page-title">비밀번호 변경</h2>
        <div class="divider"></div>
      </div>
      <div class="fields">
        <div>
          <label class="field-label">학번</label>
          <input type="text" id="chpw-studentId" placeholder="예시) 3901" class="field-input" />
        </div>
        <div>
          <label class="field-label">이름</label>
          <input type="text" id="chpw-name" placeholder="예시) 홍길동" class="field-input" />
        </div>
        <div>
          <label class="field-label">이메일 주소</label>
          <input type="email" id="chpw-email" placeholder="example@email.com" class="field-input" />
        </div>
        <div>
          <label class="field-label">기존 비밀번호</label>
          <input type="password" id="chpw-current" placeholder="현재 사용 중인 비밀번호" class="field-input" />
        </div>
        <div>
          <label class="field-label">새로운 비밀번호</label>
          <input type="password" id="chpw-new" placeholder="새 비밀번호를 입력하세요" class="field-input" />
        </div>
        <div>
          <label class="field-label">새로운 비밀번호 재확인</label>
          <input type="password" id="chpw-new-confirm" placeholder="새 비밀번호를 다시 입력하세요" class="field-input" />
          <p id="chpw-match-msg" class="text-xs mt-1 hidden"></p>
        </div>
        <button onclick="Index.doChangePassword()" class="btn-primary">비밀번호 변경하기</button>
        <button onclick="Index.showScreen('screen-find-pw')" class="btn-ghost">← 비밀번호 찾기로 돌아가기</button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📅 자료입력 대기 화면 -->
  <!-- ============================================================ -->
  <div id="screen-waiting" class="hidden w-full max-w-md">
    <div class="card text-center">
      <div class="status-icon">📅</div>
      <h2 class="status-title">로그인 성공!</h2>
      <p id="waiting-message" class="status-msg mb-6"></p>
      <button onclick="Index.showScreen('screen-login')" class="btn-ghost" style="width:auto; padding: 0.6rem 1.5rem; display:inline-block;">돌아가기</button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📢 공지사항 모달 -->
  <!-- ============================================================ -->
  <div id="modal-notice" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[80vh] overflow-y-auto p-6 sm:p-8">
      <h3 class="text-base font-semibold text-gray-800 mb-5 text-center tracking-tight">📢 공지사항</h3>
      <div id="modal-notice-content" class="space-y-3 text-sm text-gray-700"></div>
      <button onclick="Index.closeNoticeAndProceed()" class="btn-primary mt-6">확인</button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- ✅ [추가] 공통 모달 알림창 (alert 대체 - 재사용 가능) -->
  <!-- ============================================================ -->
  <div id="modal-alert" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4 z-[60]">
    <div id="modal-alert-box" class="alert-box">
      <div class="flex flex-col items-center text-center">
        <div id="modal-alert-icon" class="text-3xl mb-3"></div>
        <h3 id="modal-alert-title" class="text-base font-semibold text-gray-800 mb-2"></h3>
        <p id="modal-alert-message" class="text-sm text-gray-500 whitespace-pre-wrap mb-6 leading-relaxed"></p>
        <button onclick="Index.closeAlert()"
          id="modal-alert-btn"
          class="w-full font-medium py-2.5 rounded-xl transition text-sm">
          확인
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 🔄 로딩 오버레이 (API 호출 시 사용) -->
  <!-- ============================================================ -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-40">
    <div class="loading-card flex flex-col items-center gap-3">
      <div class="flex items-center gap-1.5">
        <div class="dot-bounce animate-bounce" style="animation-delay: 0s;"></div>
        <div class="dot-bounce animate-bounce" style="animation-delay: 0.15s;"></div>
        <div class="dot-bounce animate-bounce" style="animation-delay: 0.3s;"></div>
      </div>
      <p id="loading-text" class="text-sm text-gray-500">처리 중...</p>
    </div>
  </div>

  </div><!-- /#content-layer -->

  <!-- 배경 이미지 설정 (config.js의 BACKGROUND_IMG 사용) -->
  <script>
    (function() {
      var bgLayer = document.getElementById('bg-layer');
      if (typeof Config !== 'undefined' && Config.BACKGROUND_IMG) {
        // 이미지를 미리 로드한 후 부드럽게 표시
        var img = new Image();
        img.onload = function() {
          bgLayer.style.backgroundImage = 'url(' + Config.BACKGROUND_IMG + ')';
          bgLayer.style.opacity = '0';
          bgLayer.style.transition = 'opacity 0.8s ease';
          requestAnimationFrame(function() {
            bgLayer.style.opacity = '1';
          });
        };
        img.onerror = function() {
          // 이미지 로드 실패 시 기본 그라디언트 배경 유지
        };
        img.src = Config.BACKGROUND_IMG;
      }

      // 반응형: 모바일에서는 배경을 center top으로 조정
      function adjustBg() {
        if (window.innerWidth < 640) {
          bgLayer.style.backgroundPosition = 'center top';
          bgLayer.style.backgroundSize = 'cover';
        } else {
          bgLayer.style.backgroundPosition = 'center center';
          bgLayer.style.backgroundSize = 'cover';
        }
      }
      adjustBg();
      window.addEventListener('resize', adjustBg);
    })();
  </script>

  <!-- ============================================================ -->
  <!-- 📜 JavaScript - IIFE 네임스페이스: Index -->
  <!-- ============================================================ -->
  <script>
    // ============================================================
    // 🔒 IIFE 네임스페이스 - Index
    //    IIFE 밖에는 어떤 변수나 함수도 선언하지 않는다
    // ============================================================
    var Index = (function() {

      // ============================================================
      // ⚙️ 내부 설정 변수 (private)
      // ============================================================
      var _WEB_APP_URL     = Config.DEPLOY;
      var _GITHUB_PAGE_URL = Config.GITHUB;

      // ============================================================
      // 내부 상태 변수 (private)
      // ============================================================
      var _rulesData     = null;   // SH규칙 데이터
      var _loginUserData = null;   // 로그인된 사용자 데이터
      var _alertCallback = null;   // 모달 알림 콜백 (재사용)

      // ============================================================
      // 🌐 API 호출 함수 (CORS 대응) (private)
      // ============================================================

      /** GET 요청 */
      async function _apiGet(action, params) {
        params = params || {};
        var url = new URL(_WEB_APP_URL);
        url.searchParams.set('action', action);
        for (var key in params) {
          if (params.hasOwnProperty(key)) {
            url.searchParams.set(key, params[key]);
          }
        }

        var response = await fetch(url.toString(), {
          method: 'GET',
          redirect: 'follow'
        });

        if (!response.ok) throw new Error('서버 응답 오류: ' + response.status);
        return await response.json();
      }

      /** POST 요청 (CORS 대응 - text/plain 사용) */
      async function _apiPost(data) {
        var response = await fetch(_WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data),
          redirect: 'follow'
        });

        if (!response.ok) throw new Error('서버 응답 오류: ' + response.status);
        return await response.json();
      }

      // ============================================================
      // 🖥️ 화면 제어 (public)
      // ============================================================
      function _showScreen(screenId) {
        // ✅ 스켈레톤 화면도 함께 숨김 처리
        document.getElementById('skeleton-screen').classList.add('hidden');
        var screens = document.querySelectorAll('[id^="screen-"]');
        screens.forEach(function(s) { s.classList.add('hidden'); });
        var target = document.getElementById(screenId);
        if (target) target.classList.remove('hidden');
      }

      function _showLoading(text) {
        text = text || '처리 중...';
        document.getElementById('loading-text').textContent = text;
        document.getElementById('loading-overlay').classList.remove('hidden');
      }

      function _hideLoading() {
        document.getElementById('loading-overlay').classList.add('hidden');
      }

      // ============================================================
      // ✅ 공통 모달 알림 함수 (alert 대체 - 재사용 가능) (public)
      // ============================================================
      function _showAlert(message, type, callback) {
        // type 기본값 자동 판별: 성공/실패 키워드 기반
        if (!type) {
          if (/완료|성공|발송/.test(message)) type = 'success';
          else if (/오류|실패|올바르지|않습니다|없습니다|아닙니다|일치하지/.test(message)) type = 'error';
          else type = 'info';
        }

        var config = {
          success: { icon: '✅', title: '완료',  btnClass: 'alert-btn-success' },
          error:   { icon: '⚠️', title: '알림',  btnClass: 'alert-btn-error' },
          info:    { icon: 'ℹ️', title: '안내',  btnClass: 'alert-btn-info' },
          warning: { icon: '⚡', title: '주의',  btnClass: 'alert-btn-warning' }
        };

        var cfg = config[type] || config.info;
        _alertCallback = callback || null;

        document.getElementById('modal-alert-icon').textContent = cfg.icon;
        document.getElementById('modal-alert-title').textContent = cfg.title;
        document.getElementById('modal-alert-message').textContent = message;
        document.getElementById('modal-alert-btn').className =
          'w-full font-medium py-2.5 rounded-xl transition text-sm ' + cfg.btnClass;

        var modal = document.getElementById('modal-alert');
        var box = document.getElementById('modal-alert-box');
        modal.classList.remove('hidden');
        box.classList.remove('modal-animate-out');
        box.classList.add('modal-animate-in');
      }

      function _closeAlert() {
        var modal = document.getElementById('modal-alert');
        var box = document.getElementById('modal-alert-box');
        box.classList.remove('modal-animate-in');
        box.classList.add('modal-animate-out');
        setTimeout(function() {
          modal.classList.add('hidden');
          if (_alertCallback) {
            _alertCallback();
            _alertCallback = null;
          }
        }, 200);
      }

      // ============================================================
      // ✅ 스켈레톤 UI 유틸 함수 (public)
      // ============================================================
      function _showSkeleton(text) {
        var el = document.getElementById('skeleton-screen');
        if (el) {
          el.classList.remove('hidden');
          if (text) {
            var statusEl = document.getElementById('skeleton-status-text');
            if (statusEl) statusEl.textContent = text;
          }
        }
      }

      function _hideSkeleton() {
        var el = document.getElementById('skeleton-screen');
        if (el) el.classList.add('hidden');
      }

      // ============================================================
      // ✅ 비밀번호 확인 실시간 체크 (회원가입 & 비밀번호 변경 공용) (private)
      // ============================================================
      function _setupPasswordMatch(pwId, confirmId, msgId) {
        var pwField = document.getElementById(confirmId);
        if (!pwField) return;
        pwField.addEventListener('input', function() {
          var pw = document.getElementById(pwId).value;
          var confirm = this.value;
          var msgEl = document.getElementById(msgId);
          if (!confirm) {
            msgEl.classList.add('hidden');
            return;
          }
          msgEl.classList.remove('hidden');
          if (pw === confirm) {
            msgEl.textContent = '✓ 비밀번호가 일치합니다.';
            msgEl.className = 'text-xs mt-1 text-green-600';
          } else {
            msgEl.textContent = '✗ 비밀번호가 일치하지 않습니다.';
            msgEl.className = 'text-xs mt-1 text-red-500';
          }
        });
      }

      // ============================================================
      // 🚀 초기화 (SH규칙 데이터 로드) (private → 내부 호출)
      // ============================================================
      async function _initialize() {
        _showSkeleton('초기 설정을 불러오는 중...');

        try {
          var result = await _apiGet('getRules');

          if (!result.success) {
            throw new Error(result.message || '규칙 데이터를 가져올 수 없습니다.');
          }

          _rulesData = result.data;
          var today = new Date().toISOString().split('T')[0]; // yyyy-MM-dd

          // 날짜 비교하여 화면 결정
          if (today < _rulesData.registerDate) {
            document.getElementById('preparing-message').textContent =
              _rulesData.registerDate + ' 부터 서비스가 시작됩니다.';
            _showScreen('screen-preparing');

          } else if (today >= _rulesData.closeDate) {
            document.getElementById('closed-message').textContent =
              '마감일(' + _rulesData.closeDate + ')이 지났습니다. 더 이상 이용할 수 없습니다.';
            _showScreen('screen-closed');

          } else {
            document.getElementById('main-title').textContent = _rulesData.title;
            document.getElementById('sub-title').textContent = _rulesData.subtitle;
            _showScreen('screen-login');
          }

        } catch (err) {
          _hideSkeleton();
          _showAlert('초기 설정을 불러오지 못했습니다.\n' + err.message, 'error');
        }
      }

      // ============================================================
      // 📝 회원가입 (public)
      // ============================================================
      async function _doRegister() {
        var studentId = document.getElementById('reg-studentId').value.trim();
        var name      = document.getElementById('reg-name').value.trim();
        var email     = document.getElementById('reg-email').value.trim();
        var password  = document.getElementById('reg-password').value.trim();
        var passwordConfirm = document.getElementById('reg-password-confirm').value.trim();

        if (!studentId || !name || !email || !password) {
          _showAlert('모든 항목을 입력해 주세요.', 'warning');
          return;
        }

        if (!passwordConfirm) {
          _showAlert('비밀번호 확인을 입력해 주세요.', 'warning');
          return;
        }
        if (password !== passwordConfirm) {
          _showAlert('비밀번호와 비밀번호 확인이 일치하지 않습니다.\n비밀번호를 다시 확인해 주세요.', 'error');
          return;
        }

        var koreanRegex = /^[가-힣]+$/;
        if (!koreanRegex.test(name)) {
          _showAlert('이름은 반드시 한글로 입력해 주세요.', 'error');
          return;
        }

        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          _showAlert('올바른 이메일 형식으로 입력해 주세요.', 'error');
          return;
        }

        _showLoading('회원가입 처리 중...');

        try {
          var result = await _apiPost({
            action: 'register',
            studentId: studentId,
            name: name,
            email: email,
            password: password
          });

          if (result.success) {
            _showAlert(result.message, 'success', function() {
              _showScreen('screen-login');
            });
          } else {
            _showAlert(result.message, 'error');
          }
        } catch (err) {
          _showAlert('회원가입 중 오류가 발생했습니다.\n' + err.message, 'error');
        } finally {
          _hideLoading();
        }
      }

      // ============================================================
      // 🔐 로그인 (public)
      // ============================================================
      async function _doLogin() {
        var userId   = document.getElementById('login-id').value.trim();
        var password = document.getElementById('login-pw').value.trim();

        if (!userId || !password) {
          _showAlert('아이디와 비밀번호를 입력해 주세요.', 'warning');
          return;
        }

        _showLoading('로그인 중...');

        try {
          var result = await _apiPost({
            action: 'login',
            userId: userId,
            password: password
          });

          if (!result.success) {
            _showAlert(result.message, 'error');
            return;
          }

          _loginUserData = result.data;

          // ✅ 관리자 로그인이면 바로 admin.html로 이동 (공지·날짜 체크 없이)
          if (_loginUserData.userType === 'admin') {
            sessionStorage.setItem('adminInfo', JSON.stringify(_loginUserData));
            window.location.href = _GITHUB_PAGE_URL + '/admin.html';
            return;
          }

          // ✅ 학생 로그인 - 기존 공지사항 모달 → proceedAfterLogin 흐름 유지
          if (_loginUserData.notices && _loginUserData.notices.length > 0) {
            _showNoticeModal(_loginUserData.notices);
          } else {
            _proceedAfterLogin();
          }

        } catch (err) {
          _showAlert('로그인 중 오류가 발생했습니다.\n' + err.message, 'error');
        } finally {
          _hideLoading();
        }
      }

      // ============================================================
      // 📢 공지사항 모달 (private/public)
      // ============================================================
      function _showNoticeModal(notices) {
        var contentDiv = document.getElementById('modal-notice-content');
        contentDiv.innerHTML = '';

        notices.forEach(function(notice) {
          var div = document.createElement('div');
          div.className = 'notice-item';
          div.innerHTML =
            '<p class="notice-tag">[' + notice.type + ']</p>' +
            '<p class="whitespace-pre-wrap text-sm text-gray-600">' + notice.content + '</p>';
          contentDiv.appendChild(div);
        });

        document.getElementById('modal-notice').classList.remove('hidden');
      }

      function _closeNoticeAndProceed() {
        document.getElementById('modal-notice').classList.add('hidden');
        _proceedAfterLogin();
      }

      // ============================================================
      // ➡️ 로그인 후 이동 처리 (private)
      // ============================================================
      function _proceedAfterLogin() {
        var today = new Date().toISOString().split('T')[0];

        if (today < _rulesData.inputDate) {
          document.getElementById('waiting-message').textContent =
            _rulesData.inputDate + ' 부터 자료 입력이 가능합니다.';
          _showScreen('screen-waiting');
        } else {
          var params = new URLSearchParams({
            studentId: _loginUserData.studentId,
            name: _loginUserData.name
          });
          window.location.href = _GITHUB_PAGE_URL + '/firstpage.html?' + params.toString();
        }
      }

      // ============================================================
      // 🔍 비밀번호 찾기 (public)
      // ============================================================
      async function _doFindPassword() {
        var studentId = document.getElementById('find-studentId').value.trim();
        var name      = document.getElementById('find-name').value.trim();
        var email     = document.getElementById('find-email').value.trim();

        if (!studentId || !name || !email) {
          _showAlert('모든 항목을 입력해 주세요.', 'warning');
          return;
        }

        _showLoading('비밀번호 찾는 중...');

        try {
          var result = await _apiPost({
            action: 'findPassword',
            studentId: studentId,
            name: name,
            email: email
          });

          if (result.success) {
            _showAlert(result.message, 'success', function() {
              _showScreen('screen-login');
            });
          } else {
            _showAlert(result.message, 'error');
          }
        } catch (err) {
          _showAlert('비밀번호 찾기 중 오류가 발생했습니다.\n' + err.message, 'error');
        } finally {
          _hideLoading();
        }
      }

      // ============================================================
      // 🔄 비밀번호 변경 (public)
      // ============================================================
      async function _doChangePassword() {
        var studentId       = document.getElementById('chpw-studentId').value.trim();
        var name            = document.getElementById('chpw-name').value.trim();
        var email           = document.getElementById('chpw-email').value.trim();
        var currentPassword = document.getElementById('chpw-current').value.trim();
        var newPassword     = document.getElementById('chpw-new').value.trim();
        var newPasswordConfirm = document.getElementById('chpw-new-confirm').value.trim();

        if (!studentId || !name || !email || !currentPassword || !newPassword || !newPasswordConfirm) {
          _showAlert('모든 항목을 입력해 주세요.', 'warning');
          return;
        }

        if (newPassword !== newPasswordConfirm) {
          _showAlert('새로운 비밀번호와 재확인 비밀번호가 일치하지 않습니다.\n다시 확인해 주세요.', 'error');
          return;
        }

        if (currentPassword === newPassword) {
          _showAlert('새로운 비밀번호가 기존 비밀번호와 동일합니다.\n다른 비밀번호를 입력해 주세요.', 'warning');
          return;
        }

        _showLoading('비밀번호 변경 중...');

        try {
          var result = await _apiPost({
            action: 'changePassword',
            studentId: studentId,
            name: name,
            email: email,
            currentPassword: currentPassword,
            newPassword: newPassword
          });

          if (result.success) {
            _showAlert(result.message, 'success', function() {
              _showScreen('screen-login');
            });
          } else {
            _showAlert(result.message, 'error');
          }
        } catch (err) {
          _showAlert('비밀번호 변경 중 오류가 발생했습니다.\n' + err.message, 'error');
        } finally {
          _hideLoading();
        }
      }

      // ============================================================
      // 🏁 DOMContentLoaded 이벤트 등록 (내부 자동 실행)
      // ============================================================
      window.addEventListener('DOMContentLoaded', function() {
        // 비밀번호 실시간 일치 체크 등록 (회원가입)
        _setupPasswordMatch('reg-password', 'reg-password-confirm', 'reg-pw-match-msg');
        // 비밀번호 실시간 일치 체크 등록 (비밀번호 변경)
        _setupPasswordMatch('chpw-new', 'chpw-new-confirm', 'chpw-match-msg');
        // 초기화 실행
        _initialize();
      });

      // ============================================================
      // 🔓 공개 API (return)
      // ============================================================
      return {
        // 화면 제어
        showScreen:           _showScreen,
        showLoading:          _showLoading,
        hideLoading:          _hideLoading,

        // 모달 알림
        showAlert:            _showAlert,
        closeAlert:           _closeAlert,

        // 스켈레톤 UI
        showSkeleton:         _showSkeleton,
        hideSkeleton:         _hideSkeleton,

        // 비즈니스 로직
        doLogin:              _doLogin,
        doRegister:           _doRegister,
        doFindPassword:       _doFindPassword,
        doChangePassword:     _doChangePassword,
        closeNoticeAndProceed: _closeNoticeAndProceed
      };

    })();
  </script>
