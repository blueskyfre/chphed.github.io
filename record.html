<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생기부 기초자료 작성</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ============================================================
       ✅ 공통 재사용 스타일 - 스켈레톤 UI & 모달 알림
       ============================================================ */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 0.375rem;
    }
    .skeleton-text  { height: 1rem;   margin-bottom: 0.5rem; }
    .skeleton-title { height: 1.5rem; width: 60%; margin-bottom: 1rem; }
    .skeleton-row   { height: 2.5rem; margin-bottom: 0.5rem; }

    /* 모달 오버레이 */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }

    /* 로딩 오버레이 */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
    }

    /* 로딩 스피너 */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e9d5ff;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* 생기부내용 글상자 */
    .content-textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ============================================================ -->
  <!--  로딩 오버레이 (스피너 + 메시지) -->
  <!-- ============================================================ -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner mb-4"></div>
    <p id="loading-message" class="text-sm font-medium text-purple-700">저장 중입니다...</p>
    <p class="text-xs text-gray-400 mt-1">잠시만 기다려 주세요</p>
  </div>

  <!-- ============================================================ -->
  <!--  모달 알림 -->
  <!-- ============================================================ -->

    <div class="bg-white rounded-xl shadow-xl p-6 mx-4 max-w-sm w-full text-center">
      <p id="modal-message" class="text-gray-800 text-base mb-5"></p>
      <button onclick="Record.closeModal()"
        class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-8 rounded-lg transition text-sm">
        확인

    </div>
  </div>

  <!-- ============================================================ -->
  <!--  행사 입력 모달 (참여 여부 + 설정) -->
  <!-- ============================================================ -->
  <div id="activity-modal" class="modal-overlay hidden">
    <div class="bg-white rounded-xl shadow-xl p-5 mx-4 max-w-lg w-full max-h-screen overflow-y-auto">
      <h3 id="activity-modal-title" class="text-base font-bold text-gray-800 mb-1"></h3>
      <p id="activity-modal-date" class="text-xs text-gray-400 mb-4"></p>

      <!-- 참여 여부 -->

        <div class="flex gap-3">

        <label class="block text-sm font-semibold text-gray-700 mb-2">중점역량</label>
        <div class="flex gap-2 flex-wrap" id="competency-buttons">
          <!-- JS에서 생성 -->
        </div>
      </div>

      <!-- 활동내용 입력 -->

        <label class="block text-sm font-semibold text-gray-700 mb-2">활동 내용 입력</label>

                class="w-16 border border-blue-200 rounded-lg p-1.5 text-sm text-center focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
              <span class="text-xs text-gray-400">년</span>
              <input id="extra-end-month" type="number" placeholder="월" min="1" max="12"

  <!-- ============================================================ -->
  <!--  📜 JavaScript - IIFE 네임스페이스: Record -->
  <!-- ============================================================ -->
  <script>
    var Record = (function () {

      // ============================================================
      // ⚙️ 내부 설정 변수 (private)
      // ▼▼▼ 직접 수정이 필요한 변수 ▼▼▼
      // ============================================================
      var _API_BASE        = 'https://script.google.com/macros/s/AKfycbzJQQTEhSSGAilKc2KBk1n56jPOJE1H4Qbm72cN0vF8WoOCibp59WgPSHXo26Y_8NeZnw/exec';
      var _GITHUB_PAGE_URL = 'https://blueskyfre.github.io/chphed.github.io';
      // ▲▲▲ 직접 수정이 필요한 변수 끝 ▲▲▲

      var _TABS         = ['행사목록', '자율활동', '동아리활동', '진로활동', '개인별세특', '행동발달'];
      var _AREAS        = ['자율활동', '동아리활동', '진로활동', '개인별세특', '행동발달'];
      var _COMPETENCIES = ['교과역량', '진로역량', '공동체역량'];
      var _BYTE_LIMIT   = {
        '자율활동': 1500, '동아리활동': 1500, '진로활동': 2100,
        '개인별세특': 1500, '행동발달': 1500
      };

      var _urlParams  = new URLSearchParams(window.location.search);
      var _studentId  = _urlParams.get('studentId') || '';
      var _userName   = _urlParams.get('name')      || '';

      var _currentTab         = '행사목록';
      var _officialActivities = [];
      var _inProgressData     = [];
      var _doneData           = [];

      var _modalActivity     = null;
      var _modalParticipated = null;
      var _modalArea         = '';
      var _modalCompetency   = '';
      var _viewArea          = '';

      // ============================================================
      // 📡 API 호출 공통 함수 (private)
      // ============================================================
      async function _callAPI(action, params) {
        params = params || {};
        var url = new URL(_API_BASE);
        url.searchParams.set('action', action);
        for (var key in params) {
          if (params.hasOwnProperty(key)) url.searchParams.set(key, String(params[key]));
        }
        var resp = await fetch(url.toString());
        if (!resp.ok) throw new Error('서버 응답 오류: ' + resp.status);
        return await resp.json();
      }

      // ============================================================
      // 🔧 유틸리티 (private)
      // ============================================================
      function _calcBytes(str) {
        if (!str) return 0;
        var count = 0;
        for (var i = 0; i < str.length; i++) {
          var code = str.charCodeAt(i);
          count += (code >= 0xAC00 && code <= 0xD7A3) ? 3 : 1;
        }
        return count;
      }

      function _formatDisplay(dateStr) {
        if (!dateStr) return '-';
        var parts = dateStr.split('-');
        if (parts.length < 3) return dateStr;
        var d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        var dayNames = ['일','월','화','수','목','금','토'];
        return (d.getMonth()+1) + '/' + d.getDate() + '(' + dayNames[d.getDay()] + ')';
      }

      function _escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
      }

      /** 날짜 문자열 → 정렬용 숫자, 날짜 없으면 Infinity */
      function _dateToSortKey(dateStr) {
        if (!dateStr || dateStr.trim() === '' || dateStr === '-') return Infinity;
        return parseInt(dateStr.replace(/-/g, ''), 10) || Infinity;
      }

      function _showLoading(msg) {
        document.getElementById('loading-message').textContent = msg || '저장 중입니다...';
        document.getElementById('loading-overlay').classList.remove('hidden');
      }
      function _hideLoading() {
        document.getElementById('loading-overlay').classList.add('hidden');
      }

      function _showModal(msg) {
        document.getElementById('modal-message').textContent = msg;
        document.getElementById('modal-alert').classList.remove('hidden');
      }
      function _closeModal() {
        document.getElementById('modal-alert').classList.add('hidden');
      }

      // ============================================================
      // 🔡 탭 버튼 렌더링 (private)
      // ============================================================
      function _renderTabs() {
        var container = document.getElementById('tab-buttons');
        var html = '';
        _TABS.forEach(function(tab) {
          var isActive = (tab === _currentTab);
          var style = isActive
            ? 'bg-white text-purple-700 border-b-2 border-purple-600 font-bold'
            : 'text-gray-500 hover:text-gray-700 hover:bg-white';
          html += '<button onclick="Record.switchTab(\'' + tab + '\')"'
                + ' class="flex-shrink-0 px-4 py-3 text-sm font-medium transition ' + style + '">'
                + _escapeHtml(tab) + '</button>';
        });
        container.innerHTML = html;
      }

      // ============================================================
      // 🔄 탭 전환 (public)
      // ============================================================
      function _switchTab(tab) {
        _currentTab = tab;
        _renderTabs();
        document.getElementById('panel-events').classList.add('hidden');
        document.getElementById('panel-area').classList.add('hidden');
        if (tab === '행사목록') {
          document.getElementById('panel-events').classList.remove('hidden');
          _renderEventsList();
        } else {
          document.getElementById('panel-area').classList.remove('hidden');
          _renderAreaPanel(tab);
        }
      }

      // ============================================================
      // 🎪 행사목록 탭 렌더링 (private)
      //    정렬: 미입력 → 참여 → 미참여, 각 그룹 내 활동시작날짜 오름차순
      //    날짜 없는 행사는 각 그룹 내 맨 마지막
      // ============================================================
      function _renderEventsList() {
        var skeleton = document.getElementById('events-skeleton');
        var list     = document.getElementById('events-list');
        var empty    = document.getElementById('events-empty');

        if (_officialActivities.length === 0) {
          skeleton.classList.add('hidden');
          empty.classList.remove('hidden');
          list.classList.add('hidden');
          return;
        }

        // 상태 태깅
        var tagged = _officialActivities.map(function(act) {
          var ip = _findInProgress(act['활동코드']);
          var status = !ip ? 'none' : (ip.생기부영역 === '미참여' ? 'absent' : 'joined');
          return { act: act, ip: ip, status: status };
        });

        function _sortByDate(arr) {
          return arr.slice().sort(function(a, b) {
            return _dateToSortKey(a.act['활동시작날짜']) - _dateToSortKey(b.act['활동시작날짜']);
          });
        }

        var groups = {
          none:   _sortByDate(tagged.filter(function(t) { return t.status === 'none';   })),
          joined: _sortByDate(tagged.filter(function(t) { return t.status === 'joined'; })),
          absent: _sortByDate(tagged.filter(function(t) { return t.status === 'absent'; }))
        };

        var groupDefs = [
          { key: 'none',   wrapClass: 'bg-yellow-50 border border-yellow-200', labelClass: 'text-yellow-700', label: '⬜ 미입력 행사' },
          { key: 'joined', wrapClass: 'bg-purple-50 border border-purple-200', labelClass: 'text-purple-700', label: '✅ 참여한 행사' },
          { key: 'absent', wrapClass: 'bg-gray-100 border border-gray-200',    labelClass: 'text-gray-500',   label: '✖ 미참여 행사'  }
        ];

        var html = '';
        groupDefs.forEach(function(gd) {
          var items = groups[gd.key];
          if (items.length === 0) return;
          html += '<div class="' + gd.wrapClass + ' rounded-xl p-4 space-y-2">';
          html += '<p class="text-xs font-bold mb-2 ' + gd.labelClass + '">' + gd.label + ' (' + items.length + '건)</p>';
          items.forEach(function(item) {
            var act = item.act;
            var ip  = item.ip;
            var badgeHtml = item.status === 'joined'
              ? '<span class="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-medium">' + _escapeHtml(ip.생기부영역) + '</span>'
              : item.status === 'absent'
                ? '<span class="text-xs bg-gray-300 text-gray-600 px-2 py-0.5 rounded-full">미참여</span>'
                : '<span class="text-xs bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded-full">미입력</span>';

            html += '<div class="bg-white rounded-lg border border-gray-100 p-3 flex items-center gap-3 cursor-pointer hover:border-purple-300 transition shadow-sm"'
                 + ' onclick="Record.openActivityModal(\'' + _escapeHtml(act['활동코드']) + '\')">';
            html += '  <div class="flex-1 min-w-0">';
            html += '    <div class="flex items-center gap-2 flex-wrap mb-0.5">';
            html += '      <span class="text-xs text-gray-400 font-mono">' + _escapeHtml(act['활동코드']) + '</span>';
            html += '      ' + badgeHtml;
            html += '    </div>';
            html += '    <p class="font-semibold text-gray-800 text-sm truncate">' + _escapeHtml(act['활동명']) + '</p>';
            html += '    <p class="text-xs text-gray-400 mt-0.5">'
                 + _formatDisplay(act['활동시작날짜']) + ' ~ ' + _formatDisplay(act['활동종료날짜']) + '</p>';
            html += '  </div>';
            html += '  <div class="text-purple-400 text-lg">›</div>';
            html += '</div>';
          });
          html += '</div>';
        });

        list.innerHTML = html || '<p class="text-sm text-gray-400 text-center py-6">행사가 없습니다.</p>';
        skeleton.classList.add('hidden');
        empty.classList.add('hidden');
        list.classList.remove('hidden');
      }

      // ============================================================
      // 📑 생기부영역 탭 패널 렌더링 (private)
      // ============================================================
      function _renderAreaPanel(area) {
        document.getElementById('area-title').textContent = area;

        var doneEntry   = _doneData.find(function(d) { return d.생기부영역 === area; });
        var contentText = doneEntry ? doneEntry.생기부내용 : '';
        var bytes       = doneEntry ? parseInt(doneEntry.글자수 || '0') : 0;
        var limit       = _BYTE_LIMIT[area] || 1500;

        // 미리보기 글상자
        var contentBox = document.getElementById('done-content-box');
        if (contentText) {
          contentBox.textContent = contentText;
          contentBox.className = 'bg-white border border-gray-200 rounded-xl p-4 text-sm text-gray-700 leading-relaxed mb-4 min-h-[56px] shadow-sm overflow-hidden';
        } else {
          contentBox.textContent = '아직 작성된 내용이 없습니다.';
          contentBox.className = 'bg-white border border-gray-200 rounded-xl p-4 text-sm text-gray-400 leading-relaxed mb-4 min-h-[56px] shadow-sm overflow-hidden';
        }

        // 글자수 표시
        var byteColor = bytes > limit ? 'bg-red-100 text-red-600'
                      : bytes > limit * 0.9 ? 'bg-orange-100 text-orange-600'
                      : 'bg-gray-100 text-gray-700';
        var byteEl = document.getElementById('byte-display');
        byteEl.className = 'ml-auto text-sm font-semibold px-3 py-1.5 rounded-lg ' + byteColor;
        byteEl.textContent = bytes + ' / ' + limit + ' bytes';

        // 개인 추가 활동 입력 폼 초기화
        document.getElementById('extra-activity-name').value = '';
        document.getElementById('extra-content-input').value = '';
        ['extra-start-year','extra-start-month','extra-start-day',
         'extra-end-year','extra-end-month','extra-end-day'].forEach(function(id) {
          document.getElementById(id).value = '';
        });

        // ── 이 영역에 배치된 행사 (보라색 배경) ──
        var areaList  = document.getElementById('area-events-list');
        var myEntries = _inProgressData.filter(function(e) {
          return e.생기부영역 === area && e.활동코드 && !e.활동코드.startsWith('EXTRA_');
        });
        if (myEntries.length === 0) {
          areaList.innerHTML = '<p class="text-xs text-gray-400 py-2 pl-1">이 영역에 배치된 공식 행사가 없습니다.</p>';
        } else {
          var h2 = '';
          myEntries.forEach(function(e) {
            h2 += '<div class="bg-purple-50 border border-purple-300 rounded-lg p-3 flex items-center gap-3 cursor-pointer hover:border-purple-500 transition"'
               + ' onclick="Record.openActivityModal(\'' + _escapeHtml(e.활동코드) + '\')">';
            h2 += '  <div class="flex-1 min-w-0">';
            h2 += '    <p class="font-semibold text-sm text-purple-800 truncate">' + _escapeHtml(e.활동명) + '</p>';
            h2 += '    <p class="text-xs text-purple-400 mt-0.5">'
               + _escapeHtml(e.중점역량) + ' · '
               + _formatDisplay(e.활동시작날짜) + ' ~ ' + _formatDisplay(e.활동종료날짜) + '</p>';
            h2 += '  </div>';
            h2 += '  <span class="text-xs text-purple-500 font-medium">편집 ›</span>';
            h2 += '</div>';
          });
          areaList.innerHTML = h2;
        }

        // ── 공식 행사 목록에서 추가 (미입력 행사만, 회색 배경) ──
        var allList      = document.getElementById('area-all-events-list');
        var unenteredActs = _officialActivities.filter(function(act) {
          return !_findInProgress(act['활동코드']);
        });
        if (unenteredActs.length === 0) {
          allList.innerHTML = '<p class="text-xs text-gray-400 py-2 pl-1">추가할 수 있는 미입력 행사가 없습니다.</p>';
        } else {
          var h3 = '';
          unenteredActs.forEach(function(act) {
            h3 += '<div class="bg-gray-50 border border-gray-200 rounded-lg p-3 flex items-center gap-3 cursor-pointer hover:border-purple-300 transition"'
               + ' onclick="Record.openActivityModal(\'' + _escapeHtml(act['활동코드']) + '\')">';
            h3 += '  <div class="flex-1 min-w-0">';
            h3 += '    <div class="flex items-center gap-2 mb-0.5">';
            h3 += '      <span class="text-xs text-gray-400 font-mono">' + _escapeHtml(act['활동코드']) + '</span>';
            h3 += '      <span class="text-xs bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded-full">미입력</span>';
            h3 += '    </div>';
            h3 += '    <p class="font-medium text-sm text-gray-700 truncate">' + _escapeHtml(act['활동명']) + '</p>';
            h3 += '    <p class="text-xs text-gray-400 mt-0.5">'
               + _formatDisplay(act['활동시작날짜']) + ' ~ ' + _formatDisplay(act['활동종료날짜']) + '</p>';
            h3 += '  </div>';
            h3 += '  <span class="text-gray-400 text-lg">›</span>';
            h3 += '</div>';
          });
          allList.innerHTML = h3;
        }
      }

      // ============================================================
      // 🔍 작성중 데이터에서 활동코드로 찾기 (private)
      // ============================================================
      function _findInProgress(activityCode) {
        return _inProgressData.find(function(e) { return e.활동코드 === activityCode; }) || null;
      }

      // ============================================================
      // 📌 행사 입력 모달 열기 (public)
      // ============================================================
      function _openActivityModal(activityCode) {
        var act = _officialActivities.find(function(a) { return a['활동코드'] === activityCode; });
        if (!act) { _showModal('행사 정보를 찾을 수 없습니다.'); return; }

        _modalActivity     = act;
        _modalParticipated = null;
        _modalArea         = '';
        _modalCompetency   = '';

        var existing = _findInProgress(activityCode);
        if (existing && existing.생기부영역 !== '미참여') {
          _modalParticipated = true;
          _modalArea         = existing.생기부영역;
          _modalCompetency   = existing.중점역량;
        } else if (existing && existing.생기부영역 === '미참여') {
          _modalParticipated = false;
        }

        document.getElementById('activity-modal-title').textContent = act['활동명'];
        document.getElementById('activity-modal-date').textContent =
          _formatDisplay(act['활동시작날짜']) + ' ~ ' + _formatDisplay(act['활동종료날짜']);

        // 영역 버튼
        document.getElementById('area-buttons').innerHTML = _AREAS.map(function(a) {
          var cls = (a === _modalArea)
            ? 'border-purple-600 bg-purple-100 text-purple-700'
            : 'border-gray-200 text-gray-600 hover:border-purple-400';
          return '<button onclick="Record.selectArea(\'' + a + '\')" class="py-2 rounded-lg border-2 text-sm font-medium transition ' + cls + '">' + a + '</button>';
        }).join('');

        // 역량 버튼
        document.getElementById('competency-buttons').innerHTML = _COMPETENCIES.map(function(c) {
          var cls = (c === _modalCompetency)
            ? 'border-purple-600 bg-purple-100 text-purple-700'
            : 'border-gray-200 text-gray-500 hover:border-purple-400';
          return '<button onclick="Record.selectCompetency(\'' + c + '\')" class="py-1.5 px-4 rounded-lg border-2 text-sm font-medium transition ' + cls + '">' + c + '</button>';
        }).join('');

        document.getElementById('activity-content-input').value =
          (existing && existing.생기부영역 !== '미참여') ? existing.생기부내용 : '';

        _updateModalSections();
        document.getElementById('activity-modal').classList.remove('hidden');
      }

      function _updateModalSections() {
        var participated = _modalParticipated;
        var hasArea = !!_modalArea;
        var hasComp = !!_modalCompetency;

        // 참여 버튼 강조
        var yesBtn = document.getElementById('btn-participated-yes');
        var noBtn  = document.getElementById('btn-participated-no');
        if (participated === true) {
          yesBtn.className = 'flex-1 py-2 rounded-lg border-2 border-purple-600 bg-purple-100 text-purple-700 text-sm font-medium transition';
          noBtn.className  = 'flex-1 py-2 rounded-lg border-2 border-gray-200 text-gray-600 text-sm font-medium transition';
        } else if (participated === false) {
          yesBtn.className = 'flex-1 py-2 rounded-lg border-2 border-gray-200 text-gray-600 text-sm font-medium transition';
          noBtn.className  = 'flex-1 py-2 rounded-lg border-2 border-red-400 bg-red-50 text-red-600 text-sm font-medium transition';
        } else {
          yesBtn.className = 'flex-1 py-2 rounded-lg border-2 border-gray-200 text-gray-600 text-sm font-medium transition';
          noBtn.className  = 'flex-1 py-2 rounded-lg border-2 border-gray-200 text-gray-600 text-sm font-medium transition';
        }

        // 미참여 경고
        _toggleSection('section-no-warning', participated === false);
        // 참여 섹션
        _toggleSection('section-area',       participated === true);
        _toggleSection('section-competency', participated === true && hasArea);
        _toggleSection('section-content',    participated === true && hasArea && hasComp);

        // 저장 버튼: 참여(영역+역량 완료) 또는 미참여 선택 시 표시
        var saveVisible = (participated === true && hasArea && hasComp) || (participated === false);
        document.getElementById('btn-save-activity').classList.toggle('hidden', !saveVisible);
      }

      function _toggleSection(id, show) {
        var el = document.getElementById(id);
        if (show) el.classList.remove('hidden');
        else el.classList.add('hidden');
      }

      // ============================================================
      // 참여 여부 설정 (public)
      // ============================================================
      function _setParticipated(val) {
        _modalParticipated = val;
        if (!val) { _modalArea = ''; _modalCompetency = ''; }
        _updateModalSections();
      }

      // ============================================================
      // 영역 선택 (public)
      // ============================================================
      function _selectArea(area) {
        _modalArea = area;
        document.getElementById('area-buttons').innerHTML = _AREAS.map(function(a) {
          var cls = (a === _modalArea)
            ? 'border-purple-600 bg-purple-100 text-purple-700'
            : 'border-gray-200 text-gray-600 hover:border-purple-400';
          return '<button onclick="Record.selectArea(\'' + a + '\')" class="py-2 rounded-lg border-2 text-sm font-medium transition ' + cls + '">' + a + '</button>';
        }).join('');
        _updateModalSections();
      }

      // ============================================================
      // 역량 선택 (public)
      // ============================================================
      function _selectCompetency(comp) {
        _modalCompetency = comp;
        document.getElementById('competency-buttons').innerHTML = _COMPETENCIES.map(function(c) {
          var cls = (c === _modalCompetency)
            ? 'border-purple-600 bg-purple-100 text-purple-700'
            : 'border-gray-200 text-gray-500 hover:border-purple-400';
          return '<button onclick="Record.selectCompetency(\'' + c + '\')" class="py-1.5 px-4 rounded-lg border-2 text-sm font-medium transition ' + cls + '">' + c + '</button>';
        }).join('');
        _updateModalSections();
      }

      // ============================================================
      // 💾 행사 저장 (참여 or 미참여) (public)
      // ============================================================
      async function _saveActivity() {
        if (!_modalActivity) return;

        // ── 미참여 저장 ──
        if (_modalParticipated === false) {
          var existing = _findInProgress(_modalActivity['활동코드']);
          _showLoading('미참여로 저장 중...');
          try {
            // 기존 참여 데이터 있으면 삭제 후 compileToDone
            if (existing && existing.생기부영역 !== '미참여') {
              var delResult = await _callAPI('deleteInProgress', {
                studentId: _studentId, activityCode: _modalActivity['활동코드']
              });
              if (!delResult.success) throw new Error(delResult.message);
              await _callAPI('compileToDone', { studentId: _studentId });
            }
            // 미참여 행으로 저장 (생기부영역 = '미참여')
            await _callAPI('saveInProgress', {
              studentId: _studentId, name: _userName,
              activityCode: _modalActivity['활동코드'],
              activityName: _modalActivity['활동명'],
              startDate: _modalActivity['활동시작날짜'],
              endDate:   _modalActivity['활동종료날짜'],
              area: '미참여', competency: '', content: ''
            });
            await _reloadStudentData();
            _closeActivityModal();
            _switchTab(_currentTab);
          } catch(e) {
            _showModal('저장 실패: ' + e.message);
          } finally {
            _hideLoading();
          }
          return;
        }

        // ── 참여 저장 ──
        var content = document.getElementById('activity-content-input').value.trim();
        _showLoading('저장 중입니다...');
        try {
          var result = await _callAPI('saveInProgress', {
            studentId: _studentId, name: _userName,
            activityCode: _modalActivity['활동코드'],
            activityName: _modalActivity['활동명'],
            startDate: _modalActivity['활동시작날짜'],
            endDate:   _modalActivity['활동종료날짜'],
            area: _modalArea, competency: _modalCompetency, content: content
          });
          if (!result.success) throw new Error(result.message);
          await _callAPI('compileToDone', { studentId: _studentId });
          await _reloadStudentData();
          _closeActivityModal();
          _switchTab(_currentTab);
        } catch(e) {
          _showModal('저장 실패: ' + e.message);
        } finally {
          _hideLoading();
        }
      }

      function _closeActivityModal() {
        document.getElementById('activity-modal').classList.add('hidden');
        _modalActivity = null;
      }

      // ============================================================
      // 💾 개인 추가 활동 저장 (public)
      // ============================================================
      async function _saveExtraActivity() {
        var area         = _currentTab;
        var activityName = document.getElementById('extra-activity-name').value.trim();
        var content      = document.getElementById('extra-content-input').value.trim();
        if (!activityName) { _showModal('활동명을 입력하세요.'); return; }
        if (!content)      { _showModal('활동 내용을 입력하세요.'); return; }

        function _buildDate(prefix) {
          var y = document.getElementById(prefix + '-year').value.trim();
          var m = document.getElementById(prefix + '-month').value.trim();
          var d = document.getElementById(prefix + '-day').value.trim();
          if (!y || !m || !d) return '';
          return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        }
        var startDate = _buildDate('extra-start');
        var endDate   = _buildDate('extra-end');

        _showLoading('개인 활동 저장 중...');
        try {
          var result = await _callAPI('saveInProgress', {
            studentId: _studentId, name: _userName,
            activityCode: 'P',
            activityName: activityName,
            startDate: startDate, endDate: endDate,
            area: area, competency: '', content: content
          });
          if (!result.success) throw new Error(result.message);
          await _callAPI('compileToDone', { studentId: _studentId });
          await _reloadStudentData();
          _switchTab(_currentTab);
        } catch(e) {
          _showModal('저장 실패: ' + e.message);
        } finally {
          _hideLoading();
        }
      }

      // ============================================================
      // 👁 전체 내용 보기 모달 (읽기 전용) (public)
      // ============================================================
      function _openViewModal() {
        var area = _currentTab;
        if (!_AREAS.includes(area)) return;
        _viewArea = area;

        var doneEntry   = _doneData.find(function(d) { return d.생기부영역 === area; });
        var contentText = doneEntry ? doneEntry.생기부내용 : '아직 작성된 내용이 없습니다.';
        var bytes       = doneEntry ? parseInt(doneEntry.글자수 || '0') : 0;
        var limit       = _BYTE_LIMIT[area] || 1500;

        document.getElementById('view-modal-title').textContent = area + ' 전체 내용';
        document.getElementById('view-content-text').textContent = contentText;

        var byteEl = document.getElementById('view-byte-info');
        byteEl.textContent = bytes + ' / ' + limit + ' bytes';
        byteEl.className = 'text-sm font-semibold '
          + (bytes > limit ? 'text-red-600' : bytes > limit*0.9 ? 'text-orange-500' : 'text-gray-500');

        document.getElementById('view-modal').classList.remove('hidden');
      }

      function _closeViewModal() {
        document.getElementById('view-modal').classList.add('hidden');
      }

      // ============================================================
      // 🔃 학생 데이터 재로드 (private)
      // ============================================================
      async function _reloadStudentData() {
        var [ipResult, doneResult] = await Promise.all([
          _callAPI('getInProgress', { studentId: _studentId }),
          _callAPI('getDone',       { studentId: _studentId })
        ]);
        _inProgressData = (ipResult.success  && ipResult.data)  || [];
        _doneData       = (doneResult.success && doneResult.data) || [];
      }

      // ============================================================
      // 🚀 초기 데이터 로드 (private)
      // ============================================================
      async function _init() {
        document.getElementById('welcome-text').textContent =
          _userName ? _userName + ' 학생, 환영합니다!' : '';
        _renderTabs();
        document.getElementById('panel-events').classList.remove('hidden');

        try {
          var [actResult, ipResult, doneResult] = await Promise.all([
            _callAPI('getOfficialActivities'),
            _callAPI('getInProgress', { studentId: _studentId }),
            _callAPI('getDone',       { studentId: _studentId })
          ]);
          _officialActivities = (actResult.success  && actResult.data)  || [];
          _inProgressData     = (ipResult.success   && ipResult.data)   || [];
          _doneData           = (doneResult.success  && doneResult.data)  || [];
          _switchTab('행사목록');
        } catch(e) {
          console.error('초기 로드 오류:', e);
          _showModal('데이터를 불러오는 중 오류가 발생했습니다.');
          document.getElementById('events-skeleton').classList.add('hidden');
          document.getElementById('events-empty').classList.remove('hidden');
        }
      }

      // ============================================================
      // 🧭 네비게이션 (public)
      // ============================================================
      function _navigateTo(page) {
        var params = new URLSearchParams({ studentId: _studentId, name: _userName });
        switch (page) {
          case 'home':
            window.location.href = _GITHUB_PAGE_URL + '/firstpage.html?' + params.toString();
            break;
          case 'suneung':
            window.location.href = _GITHUB_PAGE_URL + '/susel.html?' + params.toString();
            break;
          case 'university':
            _showModal('응시희망대학 페이지는 준비 중입니다.');
            break;
        }
      }

      function _doLogout() {
        window.location.href = _GITHUB_PAGE_URL + '/index.html';
      }

      // ============================================================
      // DOMContentLoaded
      // ============================================================
      document.addEventListener('DOMContentLoaded', function() {
        _init();
      });

      // ============================================================
      // 🔓 공개 API
      // ============================================================
      return {
        switchTab:          _switchTab,
        navigateTo:         _navigateTo,
        doLogout:           _doLogout,
        showModal:          _showModal,
        closeModal:         _closeModal,
        openActivityModal:  _openActivityModal,
        closeActivityModal: _closeActivityModal,
        setParticipated:    _setParticipated,
        selectArea:         _selectArea,
        selectCompetency:   _selectCompetency,
        saveActivity:       _saveActivity,
        saveExtraActivity:  _saveExtraActivity,
        openViewModal:      _openViewModal,
        closeViewModal:     _closeViewModal
      };

    })();
  </script>

</body>
</html>
